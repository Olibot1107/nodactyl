version: "3.9"

networks:
  nodactyl:
    driver: bridge

services:
  panel:
    build: ./panel
    ports:
      - "3000:3000"
    volumes:
      - panel_data:/app/data
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-long-random-string}
      - REGISTRATION_OPEN=true
    networks:
      - nodactyl
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/settings/public || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  daemon:
    build: ./daemon
    volumes:
      - ./daemon/config.json:/app/config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/nodactyl:/srv/nodactyl
    networks:
      - nodactyl
    depends_on:
      panel:
        condition: service_healthy
    restart: unless-stopped

  daemon2:
    build: ./daemon
    volumes:
      - ./daemon/config2.json:/app/config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/nodactyl2:/srv/nodactyl2
    networks:
      - nodactyl
    depends_on:
      panel:
        condition: service_healthy
    restart: unless-stopped

volumes:
  panel_data:
