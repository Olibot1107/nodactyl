<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-left {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      justify-content: flex-end;
      gap: 0;
      padding: 36px;
    }

    .auth-left-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 0;
    }

    .auth-deco-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,.04) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
    }

    .auth-deco-glow {
      position: absolute;
      top: -120px;
      left: -80px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(249,115,22,.08) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .auth-brand {
      margin-bottom: auto;
    }

    .auth-terminal {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Cascadia Code','Fira Code',Consolas,monospace;
      font-size: 11.5px;
      line-height: 1.8;
      color: var(--text-dim);
      margin: 28px 0;
      position: relative;
    }

    .auth-terminal-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .term-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .term-dot:nth-child(1) { background: #ef4444; }
    .term-dot:nth-child(2) { background: #f59e0b; }
    .term-dot:nth-child(3) { background: #22c55e; }

    .term-title {
      margin-left: 4px;
      font-size: 10.5px;
      color: var(--text-muted);
    }

    .term-line { display: flex; gap: 8px; }
    .term-prompt { color: #f97316; }
    .term-ok { color: #22c55e; }
    .term-dim { color: var(--text-muted); }

    .auth-statement {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .auth-statement strong {
      color: var(--text-dim);
      font-weight: 600;
    }

    /* right side tweaks */
    .auth-box h1 {
      font-size: 20px;
      letter-spacing: -.35px;
    }

    .auth-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }
    .passkey-btn {
      width: 100%; display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 9px; margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-deco-grid"></div>
    <div class="auth-deco-glow"></div>
    <div class="auth-left-inner">
      <div class="auth-brand">
        <div class="auth-brand" style="display:flex;align-items:center;gap:11px;margin-bottom:0">
          <div class="logo-icon" id="brandLogo" style="overflow:hidden">N</div>
          <div class="auth-brand-name" id="brandName">Nodactyl</div>
        </div>
      </div>

      <div class="auth-terminal">
        <div class="auth-terminal-bar">
          <span class="term-dot"></span>
          <span class="term-dot"></span>
          <span class="term-dot"></span>
          <span class="term-title">node-1 — bash</span>
        </div>
        <div class="term-line"><span class="term-prompt">$</span><span>nodactyl status</span></div>
        <div class="term-line"><span class="term-ok">✓</span><span>daemon connected</span></div>
        <div class="term-line"><span class="term-ok">✓</span><span>3 servers running</span></div>
        <div class="term-line"><span class="term-dim">&nbsp;&nbsp;uptime 14d 6h 22m</span></div>
        <div class="term-line" style="margin-top:6px"><span class="term-prompt">$</span><span style="opacity:.35">_</span></div>
      </div>

      <div class="auth-statement">
        Your servers, your infrastructure.<br>
        <strong>No middlemen.</strong>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <h1>Sign in</h1>
      <p class="auth-sub" style="margin-bottom:20px">Use your panel credentials to continue.</p>

      <div class="alert alert-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="username" autocomplete="username" placeholder="your-username" required>
        </div>
        <div class="form-group" style="margin-bottom:18px">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:9px" id="loginBtn">
          Sign In
        </button>
      </form>

      <div id="passkeySection" style="display:none">
        <div class="auth-divider"></div>
        <button onclick="passkeyLogin()" class="btn btn-ghost passkey-btn" id="passkeyBtn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="8" cy="8" r="4"/><path d="M14 8h6m-3-3v6"/><path d="M2 20v-1a6 6 0 0 1 9.33-5"/></svg>
          Sign in with Passkey
        </button>
      </div>

      <div id="oauthSection" style="display:none">
        <div class="auth-divider"></div>
        <div id="discordSection" style="display:none">
          <button onclick="loginWithDiscord()" class="btn btn-ghost w-full" style="justify-content:center;gap:8px;padding:9px;margin-bottom:8px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:#7289da"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.015.04.038.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            Continue with Discord
          </button>
        </div>
        <div id="githubSection" style="display:none">
          <button onclick="loginWithGithub()" class="btn btn-ghost w-full" style="justify-content:center;gap:8px;padding:9px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
            Continue with GitHub
          </button>
        </div>
      </div>

      <div class="auth-footer">
        No account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  // Handle OAuth token/error from connector callbacks
  (function() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('oauth_token')) {
      const token = params.get('oauth_token');
      history.replaceState({}, '', '/login');
      fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(user => {
          localStorage.setItem('token', token);
          localStorage.setItem('user', JSON.stringify(user));
          window.location.href = '/dashboard';
        })
        .catch(() => {
          const err = document.getElementById('loginError');
          err.textContent = 'OAuth login failed. Please try again.';
          err.classList.add('show');
        });
    }
    if (params.has('oauth_error')) {
      history.replaceState({}, '', '/login');
      const provider = params.get('provider') || 'OAuth';
      const providerName = { discord: 'Discord', github: 'GitHub' }[provider] || provider;
      const msgs = {
        no_account: `No Nodactyl account is linked to that ${providerName}. Log in normally and connect it in Connectors.`,
        suspended:  'Your account has been suspended.',
      };
      const err = document.getElementById('loginError');
      err.textContent = msgs[params.get('oauth_error')] || `${providerName} login failed.`;
      err.classList.add('show');
    }
    if (params.has('error')) {
      history.replaceState({}, '', '/login');
      const err = document.getElementById('loginError');
      err.textContent = 'OAuth error: ' + params.get('error');
      err.classList.add('show');
    }
  })();

  fetch('/api/settings/public').then(r => r.json()).then(s => {
    if (s.panel_name) {
      document.getElementById('brandName').textContent = s.panel_name;
      document.title = 'Sign In — ' + s.panel_name;
    }
    if (s.panel_logo) {
      const el = document.getElementById('brandLogo');
      if (s.panel_logo.startsWith('http') || s.panel_logo.startsWith('/') || s.panel_logo.startsWith('data:')) {
        el.innerHTML = `<img src="${s.panel_logo}" style="width:100%;height:100%;object-fit:cover;border-radius:9px" alt="">`;
      } else {
        el.textContent = s.panel_logo;
      }
    }
    let showOauth = false;
    if (s.discord_enabled === '1') { document.getElementById('discordSection').style.display = ''; showOauth = true; }
    if (s.github_enabled  === '1') { document.getElementById('githubSection').style.display  = ''; showOauth = true; }
    if (showOauth) document.getElementById('oauthSection').style.display = '';
  }).catch(() => {});

  function loginWithDiscord() {
    window.location.href = '/api/connectors/discord/authorize?action=login';
  }

  function loginWithGithub() {
    window.location.href = '/api/connectors/github/authorize?action=login';
  }

  // Show passkey button if WebAuthn is supported
  if (window.PublicKeyCredential) document.getElementById('passkeySection').style.display = '';

  function _b64ToBuf(b64url) {
    const pad = '='.repeat((4 - b64url.length % 4) % 4);
    const b64 = (b64url + pad).replace(/-/g, '+').replace(/_/g, '/');
    return Uint8Array.from(atob(b64), c => c.charCodeAt(0)).buffer;
  }
  function _bufToB64(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  async function passkeyLogin() {
    const btn = document.getElementById('passkeyBtn');
    const err = document.getElementById('loginError');
    err.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Waiting for passkey…';
    try {
      const username = document.getElementById('username').value.trim();
      const opts = await fetch('/api/passkey/auth/options', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username }),
      }).then(r => r.json());
      if (opts.error) throw new Error(opts.error);

      const cred = await navigator.credentials.get({
        publicKey: {
          ...opts,
          challenge: _b64ToBuf(opts.challenge),
          allowCredentials: (opts.allowCredentials || []).map(c => ({ ...c, id: _b64ToBuf(c.id) })),
        },
      });

      const result = await fetch('/api/passkey/auth/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          credential: {
            id: cred.id,
            rawId: _bufToB64(cred.rawId),
            type: cred.type,
            response: {
              clientDataJSON:    _bufToB64(cred.response.clientDataJSON),
              authenticatorData: _bufToB64(cred.response.authenticatorData),
              signature:         _bufToB64(cred.response.signature),
              userHandle:        cred.response.userHandle ? _bufToB64(cred.response.userHandle) : null,
            },
          },
        }),
      }).then(r => r.json());

      if (!result.token) throw new Error(result.error || 'Passkey verification failed');
      localStorage.setItem('token', result.token);
      localStorage.setItem('user', JSON.stringify(result.user));
      window.location.href = '/dashboard';
    } catch (e) {
      if (e.name !== 'NotAllowedError') {
        err.textContent = e.message;
        err.classList.add('show');
      }
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="8" cy="8" r="4"/><path d="M14 8h6m-3-3v6"/><path d="M2 20v-1a6 6 0 0 1 9.33-5"/></svg> Sign in with Passkey';
    }
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    err.classList.remove('show');
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/dashboard';
    } catch (e) {
      err.textContent = e.message;
      err.classList.add('show');
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
