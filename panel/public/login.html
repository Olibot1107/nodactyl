<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="logo-icon" id="brandLogo" style="overflow:hidden">N</div>
      <div class="auth-brand-name" id="brandName">Nodactyl</div>
    </div>
    <div class="auth-tagline">Self-hosted server management, done right.</div>
    <div class="auth-features">
      <div class="auth-feature">Deploy servers from admin-defined presets</div>
      <div class="auth-feature">Real-time logs and resource monitoring</div>
      <div class="auth-feature">Multi-node cluster support</div>
      <div class="auth-feature">Full Docker container isolation</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to your account to continue</p>

      <div class="alert alert-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="username" autocomplete="username" placeholder="your-username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:9px" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  // Load panel branding
  fetch('/api/settings/public').then(r => r.json()).then(s => {
    if (s.panel_name) {
      document.getElementById('brandName').textContent = s.panel_name;
      document.title = 'Sign In — ' + s.panel_name;
    }
    if (s.panel_logo) {
      const el = document.getElementById('brandLogo');
      if (s.panel_logo.startsWith('http') || s.panel_logo.startsWith('/') || s.panel_logo.startsWith('data:')) {
        el.innerHTML = `<img src="${s.panel_logo}" style="width:100%;height:100%;object-fit:cover;border-radius:9px" alt="">`;
      } else {
        el.textContent = s.panel_logo;
      }
    }
  }).catch(() => {});

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    err.classList.remove('show');
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/dashboard';
    } catch (e) {
      err.textContent = e.message;
      err.classList.add('show');
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
