<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl - Files</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .file-list.drag-over { outline: 2px dashed var(--primary,#6366f1); outline-offset: -2px; background: rgba(99,102,241,.04); }
    #editorArea { display: none; flex: 1; min-height: 0; }
    #editorArea.open { display: block; }
    .git-tabs { display:flex; border-bottom:1px solid var(--border); padding:0 16px; }
    .git-tab { padding:8px 14px; font-size:13px; border:none; background:none; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s,border-color .15s; }
    .git-tab:hover { color:var(--text); }
    .git-tab.active { color:var(--primary); border-bottom-color:var(--primary); }
    .upload-zone { border:2px dashed var(--border2,#3f3f46); border-radius:8px; padding:32px 16px; text-align:center; transition:border-color .15s,background .15s; }
    .upload-zone.drag-over { border-color:var(--primary,#6366f1); background:rgba(99,102,241,.05); }
    .file-row.selected { background:rgba(99,102,241,.12); color:var(--text); border-color:rgba(99,102,241,.25); }
    .file-row.selected:hover { background:rgba(99,102,241,.18); }
    .selection-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:5px 10px; border-top:1px solid var(--border); background:rgba(99,102,241,.08); flex-shrink:0; font-size:12px; }

    /* ── Mobile file manager ─────────────────────────────── */
    .mobile-back-btn { display: none; }

    @media (max-width: 720px) {
      .mobile-back-btn { display: inline-flex !important; }

      /* Replace stacked grid with slide-panel navigation */
      .main-flex .file-shell {
        position: relative;
        display: block;
        overflow: hidden;
        height: 100%;
      }
      .file-sidebar {
        position: absolute;
        inset: 0;
        max-height: none !important;
        border-bottom: none !important;
        background: var(--bg2);
        transition: transform .25s cubic-bezier(.25,.46,.45,.94), opacity .2s;
        z-index: 2;
        display: flex;
        flex-direction: column;
      }
      .editor-pane {
        position: absolute;
        inset: 0;
        min-height: 0 !important;
        transform: translateX(100%);
        transition: transform .25s cubic-bezier(.25,.46,.45,.94);
        z-index: 1;
      }
      .file-shell.mobile-editor-open .file-sidebar {
        transform: translateX(-25%);
        opacity: 0;
        pointer-events: none;
      }
      .file-shell.mobile-editor-open .editor-pane {
        transform: translateX(0);
      }

      /* File toolbar: horizontal scroll instead of wrapping */
      .file-toolbar { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding: 5px 8px; }
      .file-toolbar::-webkit-scrollbar { display: none; }

      /* Editor toolbar: tighter on mobile */
      .editor-toolbar { flex-wrap: nowrap; padding: 8px 10px; min-height: 44px; gap: 8px; }

      /* Hide Close btn — the mobile back button replaces it */
      #closeBtn { display: none !important; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <style>
    #imageViewer { display:none; flex:1; min-height:0; overflow:auto; align-items:center; justify-content:center; background:var(--bg2); }
    #imageViewer.open { display:flex; }
    #imageViewer img { max-width:100%; max-height:100%; object-fit:contain; border-radius:4px; }
  </style>
</head>
<body>
<div class="layout" id="app"></div>
<input type="file" id="fileUploadInput" multiple style="display:none">
<input type="file" id="folderUploadInput" webkitdirectory multiple style="display:none">

<!-- Modal: upload -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Upload</div>
      <button class="modal-close" onclick="closeModal('uploadModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="uploadZone" class="upload-zone">
        <svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" width="32" height="32" style="opacity:.3;margin-bottom:8px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div style="font-size:13px;font-weight:500;margin-bottom:4px">Drop files or folders here</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Files and folders can be mixed — drop them all at once</div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('fileUploadInput').click()">Choose Files</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('folderUploadInput').click()">Choose Folder</button>
        </div>
      </div>
      <div id="uploadModalProgress" style="display:none;margin-top:12px">
        <div style="display:flex;align-items:center;gap:8px;font-size:12.5px">
          <span id="uploadModalLabel" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
          <div class="upload-bar-outer" style="width:90px"><div class="upload-bar-inner" id="uploadModalBar" style="width:0%"></div></div>
        </div>
        <div id="uploadModalStatus" style="margin-top:6px;font-size:12px"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('uploadModal')">Close</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu">
  <button class="ctx-item" id="ctxOpen">Open</button>
  <div class="ctx-divider"></div>
  <button class="ctx-item" id="ctxRename">Rename</button>
  <button class="ctx-item" id="ctxMove">Move to…</button>
  <button class="ctx-item ctx-item-danger" id="ctxDelete">Delete</button>
  <div class="ctx-divider" id="ctxDlDivider"></div>
  <button class="ctx-item" id="ctxDownload">Download</button>
  <div class="ctx-divider" id="ctxExtractDivider" style="display:none"></div>
  <button class="ctx-item" id="ctxExtract" style="display:none">Extract here</button>
  <div class="ctx-divider" id="ctxShareDivider" style="display:none"></div>
  <button class="ctx-item" id="ctxShare" style="display:none">Share</button>
</div>

<!-- Modal: new file / folder -->
<div class="modal-overlay" id="newItemModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title" id="newItemTitle">New File</div>
      <button class="modal-close" onclick="closeModal('newItemModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group mb-2">
        <label class="form-label" id="newItemLabel">File name</label>
        <input class="form-input" id="newItemInput" placeholder="e.g. config.yml" autocomplete="off">
        <div class="form-hint mt-2" id="newItemHint"></div>
      </div>
      <div id="newItemError" class="alert alert-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('newItemModal')">Cancel</button>
      <button class="btn btn-primary btn-sm" id="newItemSubmit" onclick="submitNewItem()">Create</button>
    </div>
  </div>
</div>

<!-- Modal: move -->
<div class="modal-overlay" id="moveModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Move</div>
      <button class="modal-close" onclick="closeModal('moveModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group mb-2">
        <label class="form-label">Destination path</label>
        <input class="form-input font-mono" id="moveInput" placeholder="/home/container/subdir/file.txt" autocomplete="off">
        <div class="form-hint mt-2" id="moveHint"></div>
      </div>
      <div id="moveError" class="alert alert-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('moveModal')">Cancel</button>
      <button class="btn btn-primary btn-sm" id="moveSubmit" onclick="submitMove()">Move</button>
    </div>
  </div>
</div>

<!-- Modal: unified git -->
<div class="modal-overlay" id="gitModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Git</div>
      <button class="modal-close" onclick="closeModal('gitModal')">✕</button>
    </div>
    <div class="git-tabs">
      <button class="git-tab active" id="gitTab-clone" onclick="switchGitTab('clone')">Clone</button>
      <button class="git-tab" id="gitTab-pull" onclick="switchGitTab('pull')">Pull</button>
      <button class="git-tab" id="gitTab-reset" onclick="switchGitTab('reset')">Reset</button>
    </div>
    <div class="modal-body">
      <!-- Clone pane -->
      <div id="gitPane-clone">
        <div class="form-group mb-2">
          <label class="form-label">Repository URL <span class="text-muted">(https://)</span></label>
          <input class="form-input font-mono" id="gitUrl" placeholder="https://github.com/user/repo.git" autocomplete="off">
        </div>
        <div class="form-row" style="gap:8px">
          <div class="form-group mb-2" style="flex:1">
            <label class="form-label">Branch <span class="text-muted">(optional)</span></label>
            <input class="form-input" id="gitBranch" placeholder="main" autocomplete="off">
          </div>
          <div class="form-group mb-2" style="flex:1">
            <label class="form-label">Folder name <span class="text-muted">(optional)</span></label>
            <input class="form-input" id="gitFolder" placeholder="auto from URL" autocomplete="off">
          </div>
        </div>
        <div class="form-row" style="gap:8px">
          <div class="form-group mb-2" style="flex:1">
            <label class="form-label">Username <span class="text-muted">(private repos)</span></label>
            <input class="form-input" id="gitUsername" placeholder="optional" autocomplete="off">
          </div>
          <div class="form-group mb-2" style="flex:1">
            <label class="form-label">Token / Password <span class="text-muted">(private repos)</span></label>
            <input class="form-input" id="gitToken" type="password" placeholder="optional" autocomplete="off">
          </div>
        </div>
        <div class="form-hint" id="gitHint"></div>
      </div>
      <!-- Pull pane -->
      <div id="gitPane-pull" style="display:none">
        <div class="form-group mb-3">
          <label class="form-label">Directory <span class="text-muted">(must contain .git)</span></label>
          <input class="form-input font-mono" id="gitPullPath" placeholder="/home/container" autocomplete="off">
        </div>
        <div class="form-row" style="gap:8px;margin-bottom:12px">
          <div class="form-group mb-0" style="flex:1">
            <label class="form-label">Username <span class="text-muted">(private repos)</span></label>
            <input class="form-input" id="gitPullUsername" placeholder="optional" autocomplete="off">
          </div>
          <div class="form-group mb-0" style="flex:1">
            <label class="form-label">Token / Password <span class="text-muted">(private repos)</span></label>
            <input class="form-input" id="gitPullToken" type="password" placeholder="optional" autocomplete="off">
          </div>
        </div>
        <div class="form-group mb-0">
          <label class="form-label mb-2">Strategy</label>
          <div style="display:flex;flex-direction:column;gap:7px">
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px"><input type="radio" name="gitPullStrategy" value="ff-only" checked style="accent-color:var(--primary);margin-top:2px"> <span><b>Fast-forward only</b><br><span style="color:var(--text-muted);font-size:11.5px">Fails if a merge commit would be needed — safest option</span></span></label>
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px"><input type="radio" name="gitPullStrategy" value="merge" style="accent-color:var(--primary);margin-top:2px"> <span><b>Merge</b><br><span style="color:var(--text-muted);font-size:11.5px">Creates a merge commit if diverged</span></span></label>
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px"><input type="radio" name="gitPullStrategy" value="rebase" style="accent-color:var(--primary);margin-top:2px"> <span><b>Rebase</b><br><span style="color:var(--text-muted);font-size:11.5px">Replays local commits on top of upstream</span></span></label>
          </div>
        </div>
      </div>
      <!-- Reset pane -->
      <div id="gitPane-reset" style="display:none">
        <div class="form-group mb-3">
          <label class="form-label">Directory <span class="text-muted">(must contain .git)</span></label>
          <input class="form-input font-mono" id="gitResetPath" placeholder="/home/container" autocomplete="off">
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Target commit</label>
          <input class="form-input font-mono" id="gitResetCommit" placeholder="HEAD~1" value="HEAD~1" autocomplete="off">
          <div class="form-hint mt-1">e.g. HEAD~1 · HEAD~3 · a1b2c3d</div>
        </div>
        <div class="form-group mb-0">
          <label class="form-label mb-2">Mode</label>
          <div style="display:flex;flex-direction:column;gap:7px">
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px"><input type="radio" name="gitResetMode" value="mixed" checked style="accent-color:var(--primary);margin-top:2px"> <span><b>Mixed</b><br><span style="color:var(--text-muted);font-size:11.5px">Unstages changes, keeps files on disk</span></span></label>
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px"><input type="radio" name="gitResetMode" value="soft" style="accent-color:var(--primary);margin-top:2px"> <span><b>Soft</b><br><span style="color:var(--text-muted);font-size:11.5px">Keeps changes staged and ready to re-commit</span></span></label>
            <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px"><input type="radio" name="gitResetMode" value="hard" style="accent-color:var(--danger,#ef4444);margin-top:2px"> <span><b>Hard</b><br><span style="color:var(--danger,#ef4444);font-size:11.5px">Permanently discards all uncommitted changes</span></span></label>
          </div>
        </div>
      </div>
      <div id="gitOutput" class="font-mono" style="display:none;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:11.5px;max-height:160px;overflow:auto;white-space:pre-wrap;margin-top:12px;color:var(--text-dim)"></div>
      <div id="gitError" class="alert alert-error" style="margin-top:8px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('gitModal')">Cancel</button>
      <button class="btn btn-primary btn-sm" id="gitSubmit" onclick="submitGitAction()">Clone</button>
    </div>
  </div>
</div>

<!-- Modal: rename -->
<div class="modal-overlay" id="renameModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Rename</div>
      <button class="modal-close" onclick="closeModal('renameModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group mb-2">
        <label class="form-label">New name</label>
        <input class="form-input" id="renameInput" placeholder="New name" autocomplete="off">
      </div>
      <div id="renameError" class="alert alert-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('renameModal')">Cancel</button>
      <button class="btn btn-primary btn-sm" id="renameSubmit" onclick="submitRename()">Rename</button>
    </div>
  </div>
</div>

<!-- Modal: bulk move -->
<div class="modal-overlay" id="bulkMoveModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title" id="bulkMoveTitle">Move items</div>
      <button class="modal-close" onclick="closeModal('bulkMoveModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group mb-2">
        <label class="form-label">Destination directory</label>
        <input class="form-input font-mono" id="bulkMoveInput" placeholder="/home/container/subdir" autocomplete="off">
        <div class="form-hint mt-1">All selected items will be moved into this directory.</div>
      </div>
      <div id="bulkMoveError" class="alert alert-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('bulkMoveModal')">Cancel</button>
      <button class="btn btn-primary btn-sm" id="bulkMoveSubmit" onclick="submitBulkMove()">Move</button>
    </div>
  </div>
</div>

<!-- Modal: file share -->
<div class="modal-overlay" id="fileShareModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Share File</div>
      <button class="modal-close" onclick="closeModal('fileShareModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group mb-3">
        <label class="form-label">Label <span class="text-muted">(optional)</span></label>
        <input class="form-input" id="fileShareLabel" placeholder="e.g. main config snippet" autocomplete="off">
      </div>
      <div class="form-group mb-3">
        <label class="form-label">Expires after</label>
        <select class="form-input" id="fileShareTtl">
          <option value="3600">1 hour</option>
          <option value="14400">4 hours</option>
          <option value="43200">12 hours</option>
          <option value="86400" selected>1 day</option>
          <option value="259200">3 days</option>
          <option value="604800">7 days</option>
        </select>
      </div>
      <div id="fileShareSuccess" style="display:none;margin-bottom:12px">
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">Share link created:</div>
        <div style="display:flex;gap:6px;align-items:center">
          <input class="form-input font-mono" id="fileShareUrl" readonly style="font-size:12px;flex:1">
          <button class="btn btn-ghost btn-sm" onclick="copyFileShareUrl()">Copy</button>
          <a id="fileShareOpenBtn" class="btn btn-ghost btn-sm" target="_blank" rel="noopener" href="#">Open</a>
        </div>
        <div id="fileShareExpiry" style="font-size:11px;color:var(--text-muted);margin-top:6px"></div>
      </div>
      <div id="fileShareError" class="alert alert-error" style="display:none"></div>
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
        <div id="fileShareListHeader" style="font-size:10.5px;color:var(--text-dim);letter-spacing:.06em;margin-bottom:8px">SHARES</div>
        <div id="fileShareList"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('fileShareModal')">Close</button>
      <button class="btn btn-primary btn-sm" id="createFileShareBtn" onclick="createFileShare()">Create Share</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
requireAuth();

const match = location.pathname.match(/^\/server\/([^/]+)\/files/);
const serverId = match ? match[1] : '';

// Root from the user's perspective
const HOME = '/home/container';

let server = null;
let currentPath = HOME;
let openFile = null;
let cachedDirFiles = [];
let fileSearchQuery = '';
let modified = false;
let ctxTarget = null;
let newItemType = 'file';
let renameTarget = null;
let moveTarget = null;
let monacoEditor = null;
let monacoReady = false;
// path → { path, isDir, name }
let selectedItems = new Map();

// ── Icons ─────────────────────────────────────────────────────────────────────
const UI = {
  back:     `<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>`,
  folder:   `<svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" width="15" height="15"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>`,
  up:       `<svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" width="14" height="14"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>`,
  refresh:  `<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-2.64-6.36"/><path d="M21 3v6h-6"/></svg>`,
  save:     `<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5V3z"/><path d="M8 3v6h8V3"/><path d="M8 21v-7h8v7"/></svg>`,
  close:    `<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>`,
  download: `<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  upload:   `<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
  plus:     `<svg class="icon" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  dots:     `<svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" width="12" height="12"><circle cx="12" cy="5" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/></svg>`,
  extract:  `<svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" width="13" height="13"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/><path d="M9 3h6"/></svg>`,

// ── Monaco language detection ─────────────────────────────────────────────────
function detectLanguage(filename) {
  const ext = filename.includes('.') ? filename.toLowerCase().split('.').pop() : '';
  const lname = filename.toLowerCase();
  const specials = { 'dockerfile':'dockerfile', '.env':'shell', '.gitignore':'shell', '.npmrc':'ini', '.editorconfig':'ini' };
  const map = {
    js:'javascript', cjs:'javascript', mjs:'javascript', jsx:'javascript',
    ts:'typescript', tsx:'typescript',
    json:'json', html:'html', htm:'html',
    css:'css', scss:'scss', sass:'scss',
    py:'python', rb:'ruby', php:'php', go:'go', rs:'rust', java:'java',
    sh:'shell', bash:'shell', zsh:'shell',
    yml:'yaml', yaml:'yaml',
    toml:'ini', ini:'ini', conf:'ini', cfg:'ini', env:'shell',
    md:'markdown', xml:'xml', sql:'sql', dockerfile:'dockerfile',
    c:'c', cpp:'cpp', h:'c', cs:'csharp', kt:'kotlin', swift:'swift',
    lua:'lua', r:'r', scala:'scala', pl:'perl',
  };
  return specials[lname] || map[ext] || 'plaintext';
}

// ── File type detection ───────────────────────────────────────────────────────
const IMAGE_EXTS = new Set(['png','jpg','jpeg','gif','webp','bmp','ico','tiff','tif','avif']);

function getExt(name) { return name.includes('.') ? name.toLowerCase().split('.').pop() : ''; }
function isImageFile(name) { return IMAGE_EXTS.has(getExt(name)); }
const ARCHIVE_EXTS = new Set(['zip','tar','gz','bz2','xz','zst','7z','tgz','tbz2','txz']);
function isArchiveFile(name) {
  const low = name.toLowerCase();
  return ARCHIVE_EXTS.has(getExt(name))
    || low.endsWith('.tar.gz') || low.endsWith('.tar.bz2')
    || low.endsWith('.tar.xz') || low.endsWith('.tar.zst');
}
function isBinaryFile(name) {
  const ext = getExt(name);
  const BINARY_EXTS = new Set([...IMAGE_EXTS,
    'db','sqlite','sqlite3','s3db','sl3',
    'zip','gz','tar','rar','7z','bz2','xz','zst',
    'jar','war','ear','class','pyc','pyd',
    'exe','dll','so','dylib','bin','obj','o','a',
    'pdf','doc','docx','xls','xlsx','ppt','pptx',
    'mp3','mp4','avi','mov','mkv','wav','ogg','flac',
    'ttf','otf','woff','woff2','eot',
  ]);
  return BINARY_EXTS.has(ext);
}

function imgMimeType(name) {
  const m = { png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', gif:'image/gif',
    webp:'image/webp', bmp:'image/bmp', ico:'image/x-icon', tiff:'image/tiff',
    tif:'image/tiff', avif:'image/avif', svg:'image/svg+xml' };
  return m[getExt(name)] || 'image/octet-stream';
}

// ── Binary fetch helper ───────────────────────────────────────────────────────
async function fetchBinary(filePath) {
  const r = await API.get(`/servers/${serverId}/files/read-binary?path=${encodeURIComponent(filePath)}`);
  return r.content; // base64 string
}

function base64ToBlob(b64, mimeType) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mimeType });
}

function renderBreadcrumb(path) {
  const el = document.getElementById('breadcrumb');
  if (!el) return;
  const isHome = path === HOME || path === HOME + '/';
  const rel = isHome ? '' : (path.startsWith(HOME + '/') ? path.slice(HOME.length) : path);
  const parts = rel.split('/').filter(Boolean);

  let html = `<span class="bc-seg" onclick="listDir(HOME)" title="${HOME}">${UI.home}&thinsp;~</span>`;

  el.innerHTML = html;

function syncBanner() {

  if (stopped) {
    el.className = 'file-banner file-banner-info show';

// ── Directory listing ─────────────────────────────────────────────────────────
async function listDir(dirPath) {
  const nextPath = normalizePath(dirPath);
  if (nextPath !== currentPath) {
    clearSelection();
    fileSearchQuery = '';
    const si = document.getElementById('fileSearch');
    const sc = document.getElementById('fileSearchClear');
    if (si) si.value = '';
    if (sc) sc.style.display = 'none';
  }
  currentPath = nextPath;
  // Clamp: never go above HOME
  if (!currentPath.startsWith(HOME)) currentPath = HOME;
  renderBreadcrumb(currentPath);
  document.getElementById('fileList').innerHTML = '<div class="file-state"><span class="spinner"></span></div>';
  setStatusState('Loading...');
  try {
    const { files } = await API.get(`/servers/${serverId}/files?path=${encodeURIComponent(currentPath)}`);
    cachedDirFiles = files || [];
    renderFileList(cachedDirFiles, currentPath);
    setStatusState('Ready');
  } catch (e) {
    showDirError(e.message);
    setStatusState('Error');
  }
}

function onFileSearch(val) {
  fileSearchQuery = val.trim().toLowerCase();
  const sc = document.getElementById('fileSearchClear');
  if (sc) sc.style.display = fileSearchQuery ? '' : 'none';
  renderFileList(cachedDirFiles, currentPath);
}

function clearFileSearch() {
  fileSearchQuery = '';
  const si = document.getElementById('fileSearch');
  const sc = document.getElementById('fileSearchClear');
  if (si) si.value = '';
  if (sc) sc.style.display = 'none';
  renderFileList(cachedDirFiles, currentPath);
}

async function refreshDirectory() { await listDir(currentPath); }

// ── File list ─────────────────────────────────────────────────────────────────
function renderFileList(files, dirPath) {
  const q = fileSearchQuery;
  const visible = q ? files.filter(f => f.name.toLowerCase().includes(q)) : files;
  const dirs = visible.filter(f => f.type === 'dir').sort((a, b) => a.name.localeCompare(b.name));
  const docs = visible.filter(f => f.type !== 'dir').sort((a, b) => a.name.localeCompare(b.name));
  const rows = [];

  // ".." only shown when we're below the home root and not filtering
  if (dirPath !== HOME && !q) {
    rows.push(`
      <button class="file-row" data-dir-path="${esc(parentPath(dirPath))}">
        <span class="file-row-icon ftype-dir">${UI.up}</span>
        <span class="file-row-name">..</span>
        <span class="file-row-meta"></span>
        <span class="file-row-dots"></span>
      </button>`);
  }

  for (const f of [...dirs, ...docs]) {
    const fullPath = joinPath(dirPath, f.name);
    const isDir = f.type === 'dir';
    const isSelected = selectedItems.has(fullPath);
    const isActive = openFile === fullPath;
    rows.push(`
      <button class="file-row${isActive ? ' active' : ''}${isSelected ? ' selected' : ''}"
        ${isDir ? `data-dir-path="${esc(fullPath)}"` : `data-file-path="${esc(fullPath)}"`}
        data-ctx-path="${esc(fullPath)}"
        data-ctx-isdir="${isDir}"
        data-ctx-name="${esc(f.name)}">
        <span class="file-row-icon">${fileIcon(f.name, isDir)}</span>
        <span class="file-row-name">${esc(f.name)}</span>
        <span class="file-row-meta">${isDir ? '' : formatBytes(f.size)}</span>
        <div class="file-row-dots" onclick="openCtxFromDots(event,'${esc(fullPath)}',${isDir},'${esc(f.name)}')" title="More">${UI.dots}</div>
      </button>`);
  }

  if (!rows.length) {
    document.getElementById('fileList').innerHTML = q
      ? `<div class="file-state"><div style="text-align:center"><div style="font-size:11px;color:var(--text-muted)">No files match <b>${esc(q)}</b></div></div></div>`
      : `<div class="file-state"><div style="text-align:center"><div style="font-size:24px;opacity:.15;margin-bottom:8px">📁</div><div>Empty directory</div><div style="font-size:11px;color:var(--text-muted);margin-top:6px">Drop files here to upload</div></div></div>`;
    return;
  }

  document.getElementById('fileList').innerHTML = rows.join('');

  document.querySelectorAll('[data-dir-path]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.file-row-dots')) return;
      const path = el.dataset.dirPath;
      const name = el.dataset.ctxName;
      if ((e.ctrlKey || e.metaKey) && name) { e.preventDefault(); toggleSelect(path, true, name); return; }
      listDir(path);
    });
  });
  document.querySelectorAll('[data-file-path]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.file-row-dots')) return;
      const path = el.dataset.filePath;
      const name = el.dataset.ctxName;
      if ((e.ctrlKey || e.metaKey) && name) { e.preventDefault(); toggleSelect(path, false, name); return; }
      openFileForEdit(path);
    });
  });
  document.querySelectorAll('[data-ctx-path]').forEach(el => {
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      showCtx(e, el.dataset.ctxPath, el.dataset.ctxIsdir === 'true', el.dataset.ctxName);
    });
  });
}

// ── Editor ────────────────────────────────────────────────────────────────────
async function openFileForEdit(filePath) {
  if (modified && openFile && !confirm('You have unsaved changes. Discard them?')) return;
  const fname = filePath.split('/').filter(Boolean).pop();

  if (isImageFile(fname)) { openFile = null; modified = false; return openImageViewer(filePath); }

  if (isBinaryFile(fname)) { return openBinaryViewer(filePath, fname); }

  setActiveRow(filePath);
  setStatusState('Loading...');

  // Close image/binary viewers if open
  document.getElementById('imageViewer').classList.remove('open');
  const _bvEdit = document.getElementById('binaryViewer');
  if (_bvEdit) _bvEdit.style.display = 'none';

  let waited = 0;
  while (!monacoReady) {
    await new Promise(r => setTimeout(r, 100));
    if ((waited += 100) > 15000) { setStatusState('Editor failed to load'); return; }
  }

  try {
    const { content } = await API.get(`/servers/${serverId}/files/read?path=${encodeURIComponent(filePath)}`);
    openFile = filePath;
    modified = false;

    const lang = detectLanguage(fname);
    const relPath = filePath.startsWith(HOME + '/') ? '~/' + filePath.slice(HOME.length + 1) : filePath;

    document.getElementById('editorFilename').textContent = fname;
    document.getElementById('editorFilename').classList.remove('modified');
    document.getElementById('editorSubline').textContent = relPath;
    document.getElementById('editorEmpty').style.display = 'none';

    const area = document.getElementById('editorArea');
    area.classList.add('open');

    monaco.editor.setModelLanguage(monacoEditor.getModel(), lang);
    monacoEditor.setValue(content);
    modified = false; // setValue fires onDidChangeModelContent synchronously, so reset here
    updateDirtyIndicator();
    monacoEditor.setScrollPosition({ scrollTop: 0 });
    // Force Monaco to recalculate its size now the div is visible
    requestAnimationFrame(() => { monacoEditor.layout(); monacoEditor.focus(); });
    mobileOpenEditor();

    document.getElementById('saveBtn').disabled = true;
    document.getElementById('closeBtn').disabled = false;
    document.getElementById('downloadBtn').disabled = false;
    if (canShare()) document.getElementById('shareFileBtn').disabled = false;
    document.getElementById('statusLang').textContent = lang !== 'plaintext' ? lang : '';
    setStatusState('Ready');
    updateStatusBar();
  } catch (e) {
    setStatusState('Error');
    document.getElementById('editorSubline').textContent = e.message;
  }
}

async function saveFile() {
  if (!openFile || !monacoReady) return;
  const btn = document.getElementById('saveBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  setStatusState('Saving...');
  try {
    await API.put(`/servers/${serverId}/files/write`, { path: openFile, content: monacoEditor.getValue() });
    modified = false;
    document.getElementById('editorFilename').classList.remove('modified');
    updateDirtyIndicator();
    setStatusState('Saved');
    setTimeout(() => { if (!modified) setStatusState('Ready'); }, 1500);
  } catch (e) {
    setStatusState('Error: ' + e.message);
    btn.disabled = false;
  } finally {
    btn.innerHTML = `${UI.save} Save`;
  }
}

function closeFile() {
  if (modified && !confirm('You have unsaved changes. Discard them?')) return;
  mobileBackToFiles();
  openFile = null;
  modified = false;
  updateDirtyIndicator();
  setActiveRow(null);
  document.getElementById('editorFilename').textContent = 'No file open';
  document.getElementById('editorFilename').classList.remove('modified');
  document.getElementById('editorSubline').textContent = 'Select a file from the explorer';
  document.getElementById('editorEmpty').style.display = 'flex';
  document.getElementById('editorArea').classList.remove('open');
  document.getElementById('imageViewer').classList.remove('open');
  document.getElementById('imageViewerImg').src = '';
  document.getElementById('binaryViewer').style.display = 'none';
  document.getElementById('saveBtn').disabled = true;
  document.getElementById('closeBtn').disabled = true;
  document.getElementById('downloadBtn').disabled = true;
  if (canShare()) document.getElementById('shareFileBtn').disabled = true;
  document.getElementById('statusLang').textContent = '';
  if (monacoReady) monacoEditor.setValue('');
  updateStatusBar();
}

async function downloadOpenFile() {
  if (!openFile) return;
  const fname = openFile.split('/').filter(Boolean).pop();
  if (isBinaryFile(fname)) {
    await downloadFileBinary(openFile, fname);
  } else {
    const content = (monacoReady && monacoEditor) ? monacoEditor.getValue()
      : (await API.get(`/servers/${serverId}/files/read?path=${encodeURIComponent(openFile)}`)).content;
    const blob = new Blob([content]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
}

async function downloadFileBinary(filePath, name) {
  setStatusState('Downloading...');
  try {
    const b64 = await fetchBinary(filePath);
    const blob = base64ToBlob(b64, 'application/octet-stream');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    setStatusState('Ready');
  } catch (e) {
    setStatusState('Error: ' + e.message);
  }
}

// ── Upload ────────────────────────────────────────────────────────────────────
function openUploadModal() {
  document.getElementById('uploadModalProgress').style.display = 'none';
  document.getElementById('uploadModalStatus').textContent = '';
  document.getElementById('uploadModal').classList.add('open');
}

function setupUploadModalDragDrop() {
  const zone = document.getElementById('uploadZone');
  if (!zone) return;
  let counter = 0;
  zone.addEventListener('dragenter', e => { e.preventDefault(); if (++counter === 1) zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => { if (--counter <= 0) { counter = 0; zone.classList.remove('drag-over'); } });
  zone.addEventListener('dragover', e => e.preventDefault());
  zone.addEventListener('drop', async e => {
    e.preventDefault(); counter = 0; zone.classList.remove('drag-over');
    const items = Array.from(e.dataTransfer.items || []).filter(i => i.kind === 'file');
    if (!items.length) return;
    const entries = items.map(i => i.webkitGetAsEntry?.()).filter(Boolean);
    if (entries.some(en => en.isDirectory)) {
      const uploads = await collectEntryUploads(entries, '');
      if (uploads.length) uploadFromModal(uploads);
    } else {
      const files = Array.from(e.dataTransfer.files);
      if (files.length) uploadFromModal(files.map(f => ({ file: f, destPath: joinPath(currentPath, f.name) })));
    }
  });
}

async function uploadFromModal(uploads) {
  if (!uploads.length) return;
  const progress = document.getElementById('uploadModalProgress');
  const label = document.getElementById('uploadModalLabel');
  const bar = document.getElementById('uploadModalBar');
  const status = document.getElementById('uploadModalStatus');
  progress.style.display = '';
  status.textContent = '';
  bar.style.width = '0%';
  const errors = [];

  for (let i = 0; i < uploads.length; i++) {
    const { file, destPath } = uploads[i];
    label.textContent = uploads.length > 1 ? `${file.name} (${i + 1}/${uploads.length})` : file.name;
    bar.style.width = '0%';
    try {
      await uploadSingleFile(file, destPath, pct => { bar.style.width = pct + '%'; });
    } catch (e) {
      errors.push(`${file.name}: ${e.message}`);
    }
  }

  bar.style.width = '100%';
  label.textContent = errors.length ? `${uploads.length - errors.length}/${uploads.length} uploaded` : 'Done';
  status.textContent = errors.length
    ? `${errors.length} file${errors.length !== 1 ? 's' : ''} failed to upload.`
    : `${uploads.length} file${uploads.length !== 1 ? 's' : ''} uploaded successfully.`;
  status.style.color = errors.length ? 'var(--danger,#ef4444)' : 'var(--success,#22c55e)';
  await listDir(currentPath);
  if (errors.length) alert('Some uploads failed:\n' + errors.join('\n'));
}

function setupDragDrop() {
  const list = document.getElementById('fileList');
  if (!list) return;
  let counter = 0;
  list.addEventListener('dragenter', e => { e.preventDefault(); if (++counter === 1) list.classList.add('drag-over'); });
  list.addEventListener('dragleave', () => { if (--counter <= 0) { counter = 0; list.classList.remove('drag-over'); } });
  list.addEventListener('dragover', e => e.preventDefault());
  list.addEventListener('drop', async e => {
    e.preventDefault(); counter = 0; list.classList.remove('drag-over');
    const items = Array.from(e.dataTransfer.items || []).filter(i => i.kind === 'file');
    if (!items.length) return;
    const entries = items.map(i => i.webkitGetAsEntry?.()).filter(Boolean);
    if (entries.some(en => en.isDirectory)) {
      const uploads = await collectEntryUploads(entries, '');
      if (uploads.length) uploadBatch(uploads);
    } else {
      const files = Array.from(e.dataTransfer.files);
      if (files.length) uploadBatch(files.map(f => ({ file: f, destPath: joinPath(currentPath, f.name) })));
    }
  });
}

async function collectEntryUploads(entries, relDir) {
  const uploads = [];
  for (const entry of entries) {
    if (entry.isFile) {
      const file = await new Promise((res, rej) => entry.file(res, rej));
      uploads.push({ file, destPath: joinPath(currentPath, relDir + entry.name) });
    } else if (entry.isDirectory) {
      const reader = entry.createReader();
      const children = [];
      let batch;
      do {
        batch = await new Promise((res, rej) => reader.readEntries(res, rej));
        children.push(...batch);
      } while (batch.length);
      const sub = await collectEntryUploads(children, relDir + entry.name + '/');
      uploads.push(...sub);
    }
  }
  return uploads;
}

async function uploadBatch(uploads) {
  if (!uploads.length) return;
  const progress = document.getElementById('uploadProgress');
  const label = document.getElementById('uploadLabel');
  const bar = document.getElementById('uploadBar');
  progress.classList.add('show');
  const errors = [];

  for (let i = 0; i < uploads.length; i++) {
    const { file, destPath } = uploads[i];
    label.textContent = uploads.length > 1 ? `${file.name} (${i + 1}/${uploads.length})` : file.name;
    bar.style.width = '0%';
    try {
      await uploadSingleFile(file, destPath, pct => { bar.style.width = pct + '%'; });
    } catch (e) {
      errors.push(`${file.name}: ${e.message}`);
    }
  }

  bar.style.width = '100%';
  label.textContent = errors.length ? `${uploads.length - errors.length}/${uploads.length} uploaded` : 'Done';
  await listDir(currentPath);
  setTimeout(() => { progress.classList.remove('show'); bar.style.width = '0%'; }, 2000);
  if (errors.length) alert('Some uploads failed:\n' + errors.join('\n'));
}

async function uploadSingleFile(file, filePath, onProgress) {
  const CHUNK = 5 * 1024 * 1024; // 5 MB
  const total = file.size;
  if (total === 0) {
    await uploadChunk(new Blob([]), filePath, 0, 0);
    onProgress(100);
    return;
  }
  let offset = 0;
  while (offset < total) {
    const slice = file.slice(offset, offset + CHUNK);
    await uploadChunk(slice, filePath, offset, total);
    offset += slice.size;
    onProgress(Math.min(100, Math.round(offset / total * 100)));
  }
}

function uploadChunk(blob, filePath, offset, total) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `/api/servers/${serverId}/files/upload-chunk?path=${encodeURIComponent(filePath)}&offset=${offset}&total=${total}`);
    xhr.setRequestHeader('Authorization', 'Bearer ' + getToken());
    xhr.setRequestHeader('Content-Type', 'application/octet-stream');
    xhr.addEventListener('load', () => {
      if (xhr.status >= 200 && xhr.status < 300) return resolve();
      try { reject(new Error(JSON.parse(xhr.responseText).error || 'Upload failed')); }
      catch { reject(new Error(`HTTP ${xhr.status}`)); }
    });
    xhr.addEventListener('error', () => reject(new Error('Network error')));
    xhr.send(blob);
  });
}

// ── Context menu ──────────────────────────────────────────────────────────────
function showCtx(e, path, isDir, name) {
  ctxTarget = { path, isDir, name };
  const menu = document.getElementById('ctxMenu');
  document.getElementById('ctxOpen').textContent = isDir ? 'Open folder' : 'Open file';
  document.getElementById('ctxOpen').onclick = () => { closeCtx(); if (isDir) listDir(path); else openFileForEdit(path); };
  document.getElementById('ctxRename').onclick = () => { closeCtx(); startRename({ path, name }); };
  document.getElementById('ctxMove').onclick = () => { closeCtx(); startMove({ path, name }); };
  document.getElementById('ctxDelete').onclick = () => { closeCtx(); confirmDelete({ path, isDir, name }); };

  const dlBtn = document.getElementById('ctxDownload');
  const dlDiv = document.getElementById('ctxDlDivider');
  dlBtn.style.display = isDir ? 'none' : '';
  dlDiv.style.display = isDir ? 'none' : '';
  dlBtn.onclick = () => {
    closeCtx();
    if (isBinaryFile(name)) {
      downloadFileBinary(path, name);
    } else {
      API.get(`/servers/${serverId}/files/read?path=${encodeURIComponent(path)}`).then(({ content }) => {
        const blob = new Blob([content]);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = name; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      });
    }
  };

  const extractBtn = document.getElementById('ctxExtract');
  const extractDiv = document.getElementById('ctxExtractDivider');
  const showExtract = !isDir && isArchiveFile(name);
  extractBtn.style.display = showExtract ? '' : 'none';
  extractDiv.style.display = showExtract ? '' : 'none';
  extractBtn.onclick = () => { closeCtx(); extractArchive(path, name); };

  const shareBtn = document.getElementById('ctxShare');
  const shareDiv = document.getElementById('ctxShareDivider');
  const showShare = !isDir && !isBinaryFile(name) && !isImageFile(name) && canShare();
  shareBtn.style.display = showShare ? '' : 'none';
  shareDiv.style.display = showShare ? '' : 'none';
  if (showShare) shareBtn.onclick = () => { closeCtx(); openFileShareModal(path); };

  menu.style.display = 'block';
  const rx = e.clientX, ry = e.clientY;
  menu.style.left = '0'; menu.style.top = '0';
  requestAnimationFrame(() => {
    let x = rx, y = ry;
    if (x + menu.offsetWidth  > window.innerWidth  - 8) x = window.innerWidth  - menu.offsetWidth  - 8;
    if (y + menu.offsetHeight > window.innerHeight - 8) y = window.innerHeight - menu.offsetHeight - 8;
    menu.style.left = x + 'px'; menu.style.top = y + 'px';
  });
}

function openCtxFromDots(e, path, isDir, name) { e.stopPropagation(); showCtx(e, path, isDir, name); }

async function submitNewItem() {
  const name = document.getElementById('newItemInput').value.trim();
  const errEl = document.getElementById('newItemError');
  errEl.classList.remove('show');
  if (!name) { errEl.textContent = 'Name is required'; errEl.classList.add('show'); return; }
  if (name.includes('/') || name.includes('..')) { errEl.textContent = 'Name cannot contain / or ..'; errEl.classList.add('show'); return; }
  const fullPath = joinPath(currentPath, name);
  const btn = document.getElementById('newItemSubmit');
  btn.disabled = true;
  try {
    if (newItemType === 'dir') {
      await API.post(`/servers/${serverId}/files/mkdir`, { path: fullPath });
    } else {
      await API.put(`/servers/${serverId}/files/write`, { path: fullPath, content: '' });
    }
    closeModal('newItemModal');
    await listDir(currentPath);
    if (newItemType === 'file') openFileForEdit(fullPath);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
  }
}

function startRename({ path, name }) {

  const input = document.getElementById('renameInput');
  input.value = name;
  document.getElementById('renameError').classList.remove('show');
  document.getElementById('renameModal').classList.add('open');
  setTimeout(() => {

    const dot = name.lastIndexOf('.');
    input.setSelectionRange(0, dot > 0 ? dot : name.length);

async function submitRename() {

    errEl.classList.add('show');

function startMove({ path, name }) {

async function submitMove() {

async function confirmDelete({ path, isDir, name }) {
  const what = isDir ? `folder "${name}" and all its contents` : `"${name}"`;
  if (!confirm(`Delete ${what}?\n\nThis cannot be undone.`)) return;
  setStatusState('Deleting...');
  try {
    await API.delete(`/servers/${serverId}/files?path=${encodeURIComponent(path)}`);

    await listDir(currentPath);
    setStatusState('Ready');
  } catch (e) {
    setStatusState('Error');
    alert('Delete failed: ' + e.message);

async function extractArchive(archivePath, name) {
  setStatusState(`Extracting ${name}…`);
  try {
    const res = await API.post(`/servers/${serverId}/files/extract`, { path: archivePath });
    setStatusState('Extracted');
    await listDir(currentPath);
    setTimeout(() => { if (document.getElementById('statusState')?.textContent === 'Extracted') setStatusState('Ready'); }, 2000);
    if (res.output && res.output !== 'Extraction complete.') {
      console.log('[extract]', res.output);
    }
  } catch (e) {
    setStatusState('Ready');
    const msg = e.message || 'Extraction failed';
    // Show inline error below status bar instead of blocking alert

    if (sb) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:absolute;bottom:32px;left:0;right:0;background:var(--danger,#ef4444);color:#fff;font-size:12px;padding:7px 14px;z-index:50;';
      toast.textContent = 'Extract failed: ' + msg;
      sb.parentElement.style.position = 'relative';
      sb.parentElement.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);

}

function onKeyDown(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && openFile) { e.preventDefault(); saveFile(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'a' && !openFile) { e.preventDefault(); selectAll(); }
  if (e.key === 'Escape') {
    closeCtx();
    const openModals = document.querySelectorAll('.modal-overlay.open');
    openModals.forEach(m => m.classList.remove('open'));
    if (!openModals.length) {
      if (fileSearchQuery) { clearFileSearch(); return; }
      clearSelection();

  }
  if (e.key === 'Enter') {
    if (document.getElementById('newItemModal').classList.contains('open')) { e.preventDefault(); submitNewItem(); }
    else if (document.getElementById('renameModal').classList.contains('open')) { e.preventDefault(); submitRename(); }
    else if (document.getElementById('moveModal').classList.contains('open')) { e.preventDefault(); submitMove(); }
    else if (document.getElementById('gitModal').classList.contains('open')) { e.preventDefault(); submitGitAction(); }
  }
}

// Normalize and clamp paths to HOME
function normalizePath(p) {
  const parts = String(p || HOME).replace(/\\/g, '/').split('/').filter(Boolean);
  return parts.length ? '/' + parts.join('/') : '/';
}
function joinPath(dir, name) { return dir === '/' ? '/' + name : dir.replace(/\/$/, '') + '/' + name; }
function parentPath(p) {
  const parts = normalizePath(p).split('/').filter(Boolean);
  parts.pop();
  const result = parts.length ? '/' + parts.join('/') : '/';
  // Never go above HOME
  return result.startsWith(HOME) ? result : HOME;
}
function formatBytes(size) {
  const n = Number(size);
  if (!Number.isFinite(n) || size == null) return '';
  if (n < 1024) return `${n}B`;
  if (n < 1048576) return `${(n / 1024).toFixed(1)}K`;
  return `${(n / 1048576).toFixed(1)}M`;
}

// ── Git unified modal ─────────────────────────────────────────────────────────
let gitActiveTab = 'clone';

function openGitModal(tab = 'clone') {
  gitActiveTab = tab;
  document.getElementById('gitError').classList.remove('show');
  document.getElementById('gitOutput').style.display = 'none';
  document.getElementById('gitOutput').textContent = '';
  if (tab === 'clone') {
    document.getElementById('gitUrl').value = '';
    document.getElementById('gitBranch').value = '';
    document.getElementById('gitFolder').value = '';
    document.getElementById('gitUsername').value = '';
    document.getElementById('gitToken').value = '';
    updateGitCloneHint();
  } else if (tab === 'pull') {
    document.getElementById('gitPullPath').value = currentPath;
  } else if (tab === 'reset') {
    document.getElementById('gitResetPath').value = currentPath;
    document.getElementById('gitResetCommit').value = 'HEAD~1';
  }
  switchGitTab(tab);
  document.getElementById('gitModal').classList.add('open');
  setTimeout(() => {
    const focus = { clone: 'gitUrl', pull: 'gitPullPath', reset: 'gitResetPath' };
    document.getElementById(focus[tab])?.focus();
  }, 60);
}

function switchGitTab(tab) {
  gitActiveTab = tab;
  ['clone', 'pull', 'reset'].forEach(t => {
    document.getElementById(`gitPane-${t}`).style.display = t === tab ? '' : 'none';
    document.getElementById(`gitTab-${t}`).classList.toggle('active', t === tab);
  });
  const btn = document.getElementById('gitSubmit');
  btn.textContent = { clone: 'Clone', pull: 'Pull', reset: 'Reset' }[tab];
  btn.disabled = false;
  btn.className = `btn btn-sm ${tab === 'reset' ? 'btn-danger' : 'btn-primary'}`;
  document.getElementById('gitError').classList.remove('show');
  document.getElementById('gitOutput').style.display = 'none';
  document.getElementById('gitOutput').textContent = '';
}

function updateGitCloneHint() {
  const url = (document.getElementById('gitUrl')?.value || '').trim();
  const folder = (document.getElementById('gitFolder')?.value || '').trim();
  const auto = url.split('/').pop().replace(/\.git$/, '') || 'repo';
  const name = folder || auto;
  const rel = currentPath.startsWith(HOME + '/') ? '~/' + currentPath.slice(HOME.length + 1) : '~';
  const hint = document.getElementById('gitHint');
  if (hint) hint.textContent = 'Will clone into: ' + rel + '/' + name;
}

document.getElementById('gitUrl').addEventListener('input', updateGitCloneHint);
document.getElementById('gitFolder').addEventListener('input', updateGitCloneHint);

async function submitGitAction() {
  if (gitActiveTab === 'clone') return submitGitClone();
  if (gitActiveTab === 'pull') return submitGitPull();
  if (gitActiveTab === 'reset') return submitGitReset();
}

async function submitGitClone() {
  const url      = document.getElementById('gitUrl').value.trim();
  const branch   = document.getElementById('gitBranch').value.trim();
  const folder   = document.getElementById('gitFolder').value.trim();
  const username = document.getElementById('gitUsername').value.trim();
  const token    = document.getElementById('gitToken').value;
  const errEl  = document.getElementById('gitError');
  const outEl  = document.getElementById('gitOutput');
  errEl.classList.remove('show');
  outEl.style.display = 'none';
  if (!url) { errEl.textContent = 'Repository URL is required'; errEl.classList.add('show'); return; }
  if (!/^https?:\/\/.+/.test(url)) { errEl.textContent = 'Only https:// URLs are supported'; errEl.classList.add('show'); return; }
  const btn = document.getElementById('gitSubmit');
  btn.innerHTML = '<span class="spinner"></span> Cloning...';
  btn.disabled = true;
  setStatusState('Cloning...');
  try {
    const body = { url, branch, folder, path: currentPath };
    if (username && token) { body.username = username; body.token = token; }
    const res = await API.post(`/servers/${serverId}/files/git`, body);
    outEl.textContent = res.output || 'Done.';
    outEl.style.display = 'block';
    btn.textContent = res.pulled ? 'Pulled' : 'Cloned';
    await listDir(currentPath);
    setStatusState('Ready');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.textContent = 'Clone';
    btn.disabled = false;
    setStatusState('Error');
  }
}

async function submitGitPull() {
  const targetPath = document.getElementById('gitPullPath').value.trim() || currentPath;
  const strategy   = document.querySelector('input[name="gitPullStrategy"]:checked')?.value || 'ff-only';
  const username   = document.getElementById('gitPullUsername').value.trim();
  const token      = document.getElementById('gitPullToken').value;
  const errEl = document.getElementById('gitError');
  const outEl = document.getElementById('gitOutput');
  const btn = document.getElementById('gitSubmit');
  errEl.classList.remove('show');
  outEl.style.display = 'none';
  btn.innerHTML = '<span class="spinner"></span> Pulling...';
  btn.disabled = true;
  setStatusState('Pulling...');
  try {
    const body = { path: targetPath, strategy };
    if (username && token) { body.username = username; body.token = token; }
    const res = await API.post(`/servers/${serverId}/files/git-pull`, body);
    outEl.textContent = res.output || 'Already up to date.';
    outEl.style.display = 'block';
    btn.textContent = 'Done';
    await listDir(currentPath);
    setStatusState('Ready');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.textContent = 'Pull';
    btn.disabled = false;
    setStatusState('Error');
  }
}

async function submitGitReset() {
  const targetPath = document.getElementById('gitResetPath').value.trim() || currentPath;
  const commit = document.getElementById('gitResetCommit').value.trim() || 'HEAD~1';
  const mode = document.querySelector('input[name="gitResetMode"]:checked')?.value || 'mixed';
  const errEl = document.getElementById('gitError');
  const outEl = document.getElementById('gitOutput');
  const btn = document.getElementById('gitSubmit');
  if (mode === 'hard' && !confirm(`Hard reset to "${commit}"?\n\nThis permanently discards all uncommitted changes and cannot be undone.`)) return;
  errEl.classList.remove('show');
  outEl.style.display = 'none';
  btn.innerHTML = '<span class="spinner"></span> Resetting...';
  btn.disabled = true;
  setStatusState('Resetting...');
  try {
    const res = await API.post(`/servers/${serverId}/files/git-reset`, { path: targetPath, commit, mode });
    outEl.textContent = res.output || 'Reset complete.';
    outEl.style.display = 'block';
    btn.textContent = 'Done';
    await listDir(currentPath);
    setStatusState('Ready');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.textContent = 'Reset';
    btn.disabled = false;
    setStatusState('Error');
  }
}

function updateDirtyIndicator() {
  document.querySelectorAll('.file-row.dirty').forEach(el => el.classList.remove('dirty'));
  if (modified && openFile) {
    document.querySelectorAll('[data-file-path]').forEach(el => {
      if (el.dataset.filePath === openFile) el.classList.add('dirty');
    });
  }
}

// ── Mobile panel navigation ───────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 720; }

function mobileOpenEditor() {
  if (!isMobile()) return;
  document.getElementById('fileShell')?.classList.add('mobile-editor-open');
}

function mobileBackToFiles() {
  document.getElementById('fileShell')?.classList.remove('mobile-editor-open');
}

// ── Multi-select ──────────────────────────────────────────────────────────────
function toggleSelect(path, isDir, name) {
  if (selectedItems.has(path)) {
    selectedItems.delete(path);
    document.querySelectorAll(`[data-ctx-path]`).forEach(el => {
      if (el.dataset.ctxPath === path) el.classList.remove('selected');
    });
  } else {
    selectedItems.set(path, { path, isDir, name });
    document.querySelectorAll(`[data-ctx-path]`).forEach(el => {
      if (el.dataset.ctxPath === path) el.classList.add('selected');
    });
  }
  updateSelectionBar();
}

function updateSelectionBar() {
  const bar = document.getElementById('selectionBar');
  const count = document.getElementById('selectionCount');
  if (!bar) return;
  if (selectedItems.size === 0) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = '';
  const dirs = [...selectedItems.values()].filter(i => i.isDir).length;
  const files = selectedItems.size - dirs;
  const parts = [];
  if (files) parts.push(`${files} file${files !== 1 ? 's' : ''}`);
  if (dirs) parts.push(`${dirs} folder${dirs !== 1 ? 's' : ''}`);
  count.textContent = parts.join(', ') + ' selected';
}

function clearSelection() {
  selectedItems.clear();
  document.querySelectorAll('.file-row.selected').forEach(el => el.classList.remove('selected'));
  updateSelectionBar();
}

async function bulkDelete() {
  if (!selectedItems.size) return;
  const names = [...selectedItems.values()].map(i => i.name);
  const preview = names.slice(0, 5).join('\n') + (names.length > 5 ? `\n…and ${names.length - 5} more` : '');
  if (!confirm(`Delete ${selectedItems.size} item${selectedItems.size !== 1 ? 's' : ''}?\n\n${preview}\n\nThis cannot be undone.`)) return;
  setStatusState('Deleting...');
  const errors = [];
  for (const { path } of selectedItems.values()) {
    try {
      await API.delete(`/servers/${serverId}/files?path=${encodeURIComponent(path)}`);
      if (openFile === path || (openFile && openFile.startsWith(path + '/'))) closeFile();
    } catch (e) {
      errors.push(`${path}: ${e.message}`);
    }
  }
  clearSelection();
  await listDir(currentPath);
  setStatusState('Ready');
  if (errors.length) alert('Some deletes failed:\n' + errors.join('\n'));
}

function openBulkMoveModal() {
  if (!selectedItems.size) return;
  document.getElementById('bulkMoveTitle').textContent = `Move ${selectedItems.size} item${selectedItems.size !== 1 ? 's' : ''}`;
  document.getElementById('bulkMoveInput').value = currentPath;
  document.getElementById('bulkMoveError').classList.remove('show');
  document.getElementById('bulkMoveSubmit').disabled = false;
  document.getElementById('bulkMoveModal').classList.add('open');
  setTimeout(() => { const el = document.getElementById('bulkMoveInput'); el.focus(); el.select(); }, 60);
}

async function submitBulkMove() {
  let dest = document.getElementById('bulkMoveInput').value.trim();
  const errEl = document.getElementById('bulkMoveError');
  errEl.classList.remove('show');
  if (!dest) { errEl.textContent = 'Destination is required'; errEl.classList.add('show'); return; }
  if (dest.startsWith('~/')) dest = HOME + '/' + dest.slice(2);
  else if (dest === '~') dest = HOME;
  const btn = document.getElementById('bulkMoveSubmit');
  btn.disabled = true;
  const errors = [];
  for (const { path, name } of selectedItems.values()) {
    const newPath = joinPath(dest, name);
    if (newPath === path) continue;
    try {
      await API.post(`/servers/${serverId}/files/rename`, { oldPath: path, newPath });
      if (openFile === path) closeFile();
    } catch (e) {
      errors.push(`${name}: ${e.message}`);
    }
  }
  closeModal('bulkMoveModal');
  clearSelection();
  await listDir(currentPath);
  if (errors.length) alert('Some moves failed:\n' + errors.join('\n'));
}

// ── File sharing ──────────────────────────────────────────────────────────────

function canShare() {
  const user = getUser();
  if (!user || !server) return false;
  return user.role === 'admin' || server.owner_id === user.id ||
         (Array.isArray(server.member_permissions) && server.member_permissions.includes('sharefile'));
}

let fileShareTarget = null;

async function openFileShareModal(filePath) {
  if (!filePath || !canShare()) return;
  const fname = filePath.split('/').filter(Boolean).pop();
  if (isBinaryFile(fname) || isImageFile(fname)) return;

  let content;
  if (filePath === openFile && monacoReady && monacoEditor) {
    content = monacoEditor.getValue();
  } else {
    try {
      const res = await API.get(`/servers/${serverId}/files/read?path=${encodeURIComponent(filePath)}`);
      content = res.content;
    } catch (e) {
      alert('Could not read file: ' + e.message);
      return;
    }
  }

  const language = detectLanguage(fname);
  fileShareTarget = { filePath, content, language, fname };

  document.getElementById('fileShareLabel').value = '';
  document.getElementById('fileShareSuccess').style.display = 'none';
  document.getElementById('fileShareError').style.display = 'none';
  const btn = document.getElementById('createFileShareBtn');
  btn.disabled = false;
  btn.textContent = 'Create Share';
  document.getElementById('fileShareList').innerHTML = '<div style="font-size:12.5px;color:var(--text-dim)">Loading...</div>';
  document.getElementById('fileShareModal').classList.add('open');
  setTimeout(() => document.getElementById('fileShareLabel').focus(), 60);
  loadFileShares();
}

async function createFileShare() {
  if (!fileShareTarget) return;
  const { filePath, content, language, fname } = fileShareTarget;
  const label = document.getElementById('fileShareLabel').value.trim() || fname;
  const ttl_seconds = parseInt(document.getElementById('fileShareTtl').value) || 86400;
  const errEl = document.getElementById('fileShareError');
  const btn = document.getElementById('createFileShareBtn');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating...';
  try {
    const result = await API.post(`/servers/${serverId}/file-shares`, {
      content, label, file_path: filePath, language, ttl_seconds,
    });
    const url = location.origin + '/file-share/' + result.id;
    document.getElementById('fileShareUrl').value = url;
    document.getElementById('fileShareOpenBtn').href = url;
    const ttlEl = document.getElementById('fileShareTtl');
    document.getElementById('fileShareExpiry').textContent = 'Expires in ' + ttlEl.options[ttlEl.selectedIndex].text.toLowerCase();
    document.getElementById('fileShareSuccess').style.display = '';
    btn.textContent = 'Create Another';
    btn.disabled = false;
    loadFileShares();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = '';
    btn.textContent = 'Create Share';
    btn.disabled = false;
  }
}

function copyFileShareUrl() {
  const url = document.getElementById('fileShareUrl').value;
  navigator.clipboard.writeText(url).catch(() => {});
}

async function loadFileShares() {
  const el = document.getElementById('fileShareList');
  const hdr = document.getElementById('fileShareListHeader');
  if (!el) return;
  try {
    const shares = await API.get(`/servers/${serverId}/file-shares`);
    if (hdr) hdr.textContent = `SHARES (${shares.length}/10)`;
    if (!shares.length) {
      el.innerHTML = '<div style="font-size:12.5px;color:var(--text-dim);padding:8px 0">No shares yet.</div>';
      return;
    }
    el.innerHTML = shares.map(s => {
      const sname = (s.file_path || '').split('/').filter(Boolean).pop() || 'file';
      const relPath = s.file_path
        ? (s.file_path.startsWith('/home/container/') ? '~/' + s.file_path.slice('/home/container/'.length) : s.file_path)
        : '';
      return `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1;min-width:0">
            <div style="font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(s.label || sname)}</div>
            ${relPath ? `<div style="font-size:11px;color:var(--text-dim);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(relPath)}</div>` : ''}
            <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${s.view_count} view${s.view_count !== 1 ? 's' : ''}</div>
          </div>
          <a href="/file-share/${s.id}" target="_blank" rel="noopener" class="btn btn-ghost btn-xs" style="font-size:11px">Open</a>
          <button class="btn btn-ghost btn-xs" style="font-size:11px" onclick="copyShareLink('/file-share/${s.id}', this)">Copy</button>
          <button class="btn btn-ghost btn-xs" style="font-size:11px" onclick="openFileRedactView('${s.id}', '${esc(s.label || sname).replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')">Edit</button>
          <button class="btn btn-ghost btn-xs" style="font-size:11px;color:var(--danger)" onclick="deleteFileShareItem('${s.id}', this.closest('div[style]'))">Delete</button>
        </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div style="font-size:12.5px;color:var(--danger)">${esc(e.message)}</div>`;
  }
}

function copyShareLink(path, btn) {
  const url = location.origin + path;
  navigator.clipboard.writeText(url).then(() => {
    const prev = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = prev, 1500);
  }).catch(() => {});
}

async function deleteFileShareItem(shareId, row) {
  try {
    await API.delete(`/servers/${serverId}/file-shares/${shareId}`);
    row?.remove();
    const remaining = document.querySelectorAll('#fileShareList [style*="border-bottom"]').length;
    const hdr = document.getElementById('fileShareListHeader');
    if (hdr) hdr.textContent = `SHARES (${remaining}/10)`;
    if (!remaining) document.getElementById('fileShareList').innerHTML = '<div style="font-size:12.5px;color:var(--text-dim);padding:8px 0">No shares yet.</div>';
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

async function openFileRedactView(sid, label) {
  const modal = document.getElementById('fileShareModal');
  if (!modal) return;
  const inner = modal.firstElementChild;
  const origHtml = inner.innerHTML;

  inner.innerHTML = '<div style="padding:40px;text-align:center"><span class="spinner"></span></div>';

  let lines;
  try {
    const res = await fetch('/api/file-shares/' + sid);
    if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).error) || 'Not found');
    const share = await res.json();
    lines = share.content.split('\n');
    if (lines.length > 1 && lines[lines.length - 1] === '') lines.pop();
  } catch (e) {
    inner.innerHTML = origHtml;
    loadFileShares();
    alert('Could not load: ' + e.message);
    return;
  }

  const markedLines = new Set();

  function renderRedact() {
    inner.innerHTML = ''
      + '<div style="padding:14px 18px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border)">'
      +   '<button id="fRedactBackBtn" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:12px;display:flex;align-items:center;gap:4px" onmouseover="this.style.color=\'var(--text)\'" onmouseout="this.style.color=\'var(--text-muted)\'">← Back</button>'
      +   '<span style="font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(label) + '</span>'
      +   '<button onclick="closeModal(\'fileShareModal\')" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;line-height:1;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'none\'">&times;</button>'
      + '</div>'
      + '<div style="padding:7px 18px;font-size:11px;background:rgba(249,115,22,.06);border-bottom:1px solid rgba(249,115,22,.15);flex-shrink:0">'
      +   '<span style="color:#fb923c;font-weight:600">Click lines to redact them.</span> <span style="color:var(--text-muted)">They\'ll show as blurred. Click again to undo.</span>'
      + '</div>'
      + '<div id="fRedactLines" style="flex:1;overflow-y:auto;padding:6px 0;font-family:\'Cascadia Code\',Consolas,monospace;font-size:11.5px;background:var(--bg2)">'
      + lines.map(function(line, i) {
          const fixed = line.trim() === '[REDACTED]';
          const isMarked = markedLines.has(i);
          const bg = isMarked ? 'rgba(239,68,68,.1)' : '';
          const color = (fixed || isMarked) ? '#f87171' : 'var(--text-muted)';
          const blur = (fixed || isMarked) ? 'blur(4px)' : 'none';
          return '<div data-ridx="' + i + '"' + (fixed ? ' data-fixed="1"' : '') + ' class="' + (isMarked ? 'r-marked' : '') + '" style="display:flex;padding:1px 0;cursor:' + (fixed ? 'default' : 'pointer') + ';background:' + bg + '"'
            + (fixed ? '' : ' onmouseover="if(!this.dataset.fixed&&!this.classList.contains(\'r-marked\'))this.style.background=\'rgba(249,115,22,.07)\'" onmouseout="if(!this.classList.contains(\'r-marked\'))this.style.background=\'\'"')
            + '>'
            + '<span style="min-width:38px;color:#3d444d;text-align:right;padding-right:10px;user-select:none;font-size:10.5px;padding-top:1px;flex-shrink:0">' + (i + 1) + '</span>'
            + '<span class="r-content" style="flex:1;white-space:pre-wrap;word-break:break-all;color:' + color + ';filter:' + blur + ';user-select:' + (fixed ? 'none' : 'auto') + '">' + esc(line) + '</span>'
            + '</div>';
        }).join('')
      + '</div>'
      + '<div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0">'
      +   '<button class="btn btn-ghost btn-sm" id="fRedactCancelBtn">Cancel</button>'
      +   '<button class="btn btn-primary btn-sm" id="fRedactSaveBtn">Save</button>'
      + '</div>';

    inner.querySelector('#fRedactLines').addEventListener('click', function(e) {
      const el = e.target.closest('[data-ridx]');
      if (!el || el.dataset.fixed === '1') return;
      const idx = parseInt(el.dataset.ridx);
      const content = el.querySelector('.r-content');
      if (markedLines.has(idx)) {
        markedLines.delete(idx);
        el.classList.remove('r-marked');
        el.style.background = '';
        if (content) { content.style.color = 'var(--text-muted)'; content.style.filter = 'none'; }
      } else {
        markedLines.add(idx);
        el.classList.add('r-marked');
        el.style.background = 'rgba(239,68,68,.1)';
        if (content) { content.style.color = '#f87171'; content.style.filter = 'blur(4px)'; }
      }
    });

    inner.querySelector('#fRedactBackBtn').addEventListener('click', goBack);
    inner.querySelector('#fRedactCancelBtn').addEventListener('click', goBack);
    inner.querySelector('#fRedactSaveBtn').addEventListener('click', doSave);
  }

  function goBack() {
    inner.innerHTML = origHtml;
    loadFileShares();
  }

  async function doSave() {
    if (!markedLines.size && !confirm('No lines marked — save anyway?')) return;
    const btn = inner.querySelector('#fRedactSaveBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    const newLines = lines.map(function(line, i) {
      return markedLines.has(i) ? '[REDACTED]' : line;
    });
    try {
      const res = await fetch('/api/file-shares/' + sid, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
        body: JSON.stringify({ content: newLines.join('\n') }),
      });
      if (!res.ok) {
        const d = await res.json().catch(function() { return {}; });
        alert(d.error || 'Failed to save');
        if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
        return;
      }
      lines = newLines;
      markedLines.clear();
      renderRedact();
    } catch (e) {
      alert('Failed to save: ' + e.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
    }
  }

  renderRedact();
}

init();
