<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout" id="app"></div>

<!-- Deploy from preset modal -->
<div class="modal-overlay" id="deployModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Deploy <span id="deployPresetName" style="color:var(--primary)"></span></h2>
      <button class="modal-close" onclick="closeDeployModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error" id="deployError"></div>
      <div class="form-group">
        <label class="form-label">Server Name</label>
        <div style="display:flex;gap:6px">
          <input type="text" class="form-input" id="d_name" placeholder="my-server" style="flex:1">
          <button class="btn btn-ghost btn-sm" type="button" title="Random name" onclick="randomName('d_name')"><svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg></button>
        </div>
      </div>
      <div class="form-group" id="d_versionGroup" style="display:none">
        <label class="form-label">Version</label>
        <select class="form-select" id="d_version"></select>
      </div>
      <div class="form-group" id="d_nodeGroup">
        <label class="form-label">Node</label>
        <select class="form-select" id="d_node"></select>
      </div>
      <div id="d_setupVars"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDeployModal()">Cancel</button>
      <button class="btn btn-primary" id="deployBtn" onclick="deployServer()">Deploy</button>
    </div>
  </div>
</div>

<!-- Deploy from template modal -->
<div class="modal-overlay" id="deployTemplateModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Deploy <span id="deployTemplateName" style="color:#818cf8"></span></h2>
      <button class="modal-close" onclick="closeDeployTemplateModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error" id="deployTemplateError"></div>
      <div class="form-group">
        <label class="form-label">Server Name</label>
        <div style="display:flex;gap:6px">
          <input type="text" class="form-input" id="dt_name" placeholder="my-server" style="flex:1">
          <button class="btn btn-ghost btn-sm" type="button" title="Random name" onclick="randomName('dt_name')"><svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg></button>
        </div>
      </div>
      <div class="form-group" id="dt_nodeGroup">
        <label class="form-label">Node</label>
        <select class="form-select" id="dt_node"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDeployTemplateModal()">Cancel</button>
      <button class="btn btn-primary" id="deployTemplateBtn" onclick="deployTemplate()">Deploy</button>
    </div>
  </div>
</div>

<!-- Admin: custom create modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Create Server</h2>
      <button class="modal-close" onclick="closeCreateModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error" id="createError"></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Server Name *</label>
          <div style="display:flex;gap:6px">
            <input type="text" class="form-input" id="c_name" placeholder="my-server" style="flex:1">
            <button class="btn btn-ghost btn-sm" type="button" title="Random name" onclick="randomName('c_name')"><svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg></button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Docker Image *</label>
          <input type="text" class="form-input" id="c_image" placeholder="nginx:latest">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="c_desc" placeholder="Optional">
      </div>
      <div class="form-group" id="c_nodeGroup">
        <label class="form-label">Node *</label>
        <select class="form-select" id="c_node"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Memory Limit (MB)</label>
          <input type="number" class="form-input" id="c_memory" value="512" min="64">
        </div>
        <div class="form-group">
          <label class="form-label">CPU Limit (cores)</label>
          <input type="number" class="form-input" id="c_cpu" value="1" step="0.1" min="0.1">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Environment Variables</label>
        <div id="envList"></div>
        <button class="btn btn-ghost btn-sm mt-2" onclick="addEnv()" type="button">+ Add Variable</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeCreateModal()">Cancel</button>
      <button class="btn btn-primary" id="createBtn" onclick="createServer()">Create Server</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script>
requireAuth();
const user = getUser();
let servers = [], nodes = [], presets = [], templates = [];

async function randomName(inputId) {
  const input = document.getElementById(inputId);
  const btn = input.parentElement.querySelector('button');
  if (btn.disabled) return;
  btn.disabled = true;

  const res = await fetch('/api/random-name?count=20');
  if (!res.ok) { btn.disabled = false; return; }
  const { names } = await res.json();

  let i = 0;
  const speeds = [40, 40, 50, 50, 60, 70, 80, 100, 120, 150, 180, 210, 240, 270, 300, 330, 360, 390, 420, 0];
  function step() {
    input.value = names[i];
    if (i < names.length - 1) {
      setTimeout(step, speeds[i]);
      i++;
    } else {
      btn.disabled = false;
    }
  }
  step();
}
let deployPresetId = null;
let deployTemplateId = null;

function fmtMb(mb) {
  if (!mb) return '0 MB';
  if (mb >= 1024) return (mb / 1024 % 1 === 0 ? mb / 1024 : (mb / 1024).toFixed(1)) + ' GB';
  return mb + ' MB';
}

async function init() {
  await loadPanelSettings();
  // Refresh user rank info from server
  try {
    const me = await API.get('/auth/me');
    localStorage.setItem('user', JSON.stringify(me));
  } catch {}

  document.getElementById('app').innerHTML = `
    ${renderSidebar('dashboard')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">My Servers</div>
          <div class="page-sub">Your deployed containers</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${user?.role === 'admin' ? '<button class="btn btn-ghost btn-sm" onclick="openCreateModal()">Custom Create</button>' : ''}
          <button class="btn btn-primary btn-sm" id="newServerBtn" onclick="scrollToDeploy()" style="display:none">+ New Server</button>
        </div>
      </div>
      <div class="content">
        <div id="transferBanner"></div>
        <div class="grid-stats mb-6" id="statsRow"></div>
        <div id="serverSection">
          <div class="empty-state"><span class="spinner"></span></div>
        </div>
        <div id="deploySection"></div>
      </div>
    </div>`;

  await loadData();

  // Live status updates via socket.io
  const socket = io({ auth: { token: getToken() } });
  socket.on('server-status', ({ serverId, status }) => {
    const s = servers.find(x => x.id === serverId);
    if (s) { s.status = status; renderServers(); renderStats(); renderDeploySection(); }
  });
  socket.on('node-status', ({ nodeId, status }) => {
    const n = nodes.find(x => x.id === nodeId);
    if (n) { n.online = status === 'online'; renderServers(); renderStats(); }
  });
}

async function loadData() {
  [servers, nodes, presets, templates] = await Promise.all([
    API.get('/servers').catch(() => []),
    API.get('/nodes').catch(() => []),
    API.get('/presets').catch(() => []),
    API.get('/templates').catch(() => []),
  ]);
  renderStats();
  renderServers();
  renderDeploySection();
  loadPendingTransfers();
}

async function loadPendingTransfers() {
  const el = document.getElementById('transferBanner');
  if (!el) return;
  try {
    const pending = await API.get('/servers/transfers/incoming');
    if (!pending.length) { el.innerHTML = ''; return; }
    el.innerHTML = pending.map(s => `
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 16px;margin-bottom:12px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${esc(s.name)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px"><b>${esc(s.owner_name)}</b> wants to transfer this server to you.</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button class="btn btn-primary btn-sm" onclick="acceptTransfer('${esc(s.id)}',this)">Accept</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="declineTransfer('${esc(s.id)}',this)">Decline</button>
        </div>
      </div>`).join('');
  } catch { el.innerHTML = ''; }
}

async function acceptTransfer(serverId, btn) {
  btn.disabled = true; btn.textContent = '...';
  try {
    await API.post(`/servers/${serverId}/transfer/accept`, {});
    await loadData();
  } catch (e) { alert(e.message); btn.disabled = false; btn.textContent = 'Accept'; }
}

async function declineTransfer(serverId, btn) {
  btn.disabled = true; btn.textContent = '...';
  try {
    await API.post(`/servers/${serverId}/transfer/decline`, {});
    loadPendingTransfers();
  } catch (e) { alert(e.message); btn.disabled = false; btn.textContent = 'Decline'; }
}

function quotaBar(used, limit, label) {
  if (!limit || limit <= 0) return '';
  const pct = Math.min(100, Math.round(used / limit * 100));
  const color = pct >= 90 ? 'var(--danger)' : pct >= 70 ? '#f59e0b' : 'var(--primary)';
  return `
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value" style="font-size:15px">${fmtMb(used)} / ${fmtMb(limit)}</div>
      <div style="margin-top:8px;height:5px;border-radius:3px;background:var(--border);overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .3s"></div>
      </div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">${pct}% used</div>
    </div>`;
}

function renderStats() {
  const freshUser = getUser();
  const ownedServers = servers.filter(s => !s.shared);
  const running = servers.filter(s => s.status === 'running').length;
  const nodesOnline = nodes.filter(n => n.online).length;
  const rank = freshUser?.rank;
  const isAdmin = freshUser?.role === 'admin';
  const maxServers = rank ? rank.max_servers : (isAdmin ? -1 : 1);
  const limitText = maxServers === -1 ? 'Unlimited' : `${ownedServers.length} / ${maxServers}`;
  const limitColor = maxServers !== -1 && ownedServers.length >= maxServers ? 'var(--danger)' : 'inherit';

  const usedMemory = ownedServers.reduce((s, x) => s + (x.memory_limit || 0), 0);
  const usedDisk   = ownedServers.reduce((s, x) => s + (x.disk_limit   || 0), 0);
  const memLimit   = isAdmin ? 0 : (rank?.memory_limit || 0);
  const diskLimit  = isAdmin ? 0 : (rank?.disk_limit   || 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Servers Used</div>
      <div class="stat-value" style="color:${limitColor}">${limitText}</div>
      ${rank ? `<div class="stat-sub" style="color:${rank.color || 'var(--text-muted)'};margin-top:4px;font-weight:600">${esc(rank.name)}</div>` : ''}
    </div>
    <div class="stat-card">
      <div class="stat-label">Running</div>
      <div class="stat-value text-success">${running}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Nodes Online</div>
      <div class="stat-value" style="color:${nodesOnline ? 'var(--success)' : 'var(--danger)'}">${nodesOnline}/${nodes.length}</div>
    </div>
    ${quotaBar(usedMemory, memLimit, 'RAM Quota')}
    ${quotaBar(usedDisk, diskLimit, 'Disk Quota')}`;
}

function renderDeploySection() {
  const el = document.getElementById('deploySection');
  const btn = document.getElementById('newServerBtn');
  const all = [
    ...presets.map(p => ({ ...p, _type: 'preset' })),
    ...templates.map(t => ({ ...t, _type: 'template' })),
  ];

  if (!all.length) { el.innerHTML = ''; if (btn) btn.style.display = 'none'; return; }
  if (btn) btn.style.display = '';

  const freshUser = getUser();
  const isAdmin = freshUser?.role === 'admin';
  const rank = freshUser?.rank;
  const maxServers = isAdmin ? -1 : (rank?.max_servers ?? 1);
  const ownedCount = servers.filter(s => !s.shared).length;
  const atLimit = maxServers !== -1 && ownedCount >= maxServers;

  el.innerHTML = `
    <div class="section-header" style="margin-top:32px;margin-bottom:16px" id="deployAnchor">
      <div>
        <div class="section-title">Deploy a New Server</div>
        ${atLimit ? `<div class="section-sub"><span style="color:var(--danger)">Server limit reached (${ownedCount}/${maxServers}) — contact an admin to upgrade your rank.</span></div>` : ''}
      </div>
    </div>
    <div class="grid-3">
      ${all.map(item => {
        const isTemplate = item._type === 'template';
        const deployClick = isTemplate
          ? `openDeployTemplateModal('${esc(item.id)}', '${esc(item.name)}')`
          : `openDeployModal('${esc(item.id)}', '${esc(item.name)}')`;
        return `
        <div class="preset-card${atLimit ? ' opacity-50' : ''}">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <div class="preset-card-name">${esc(item.name)}</div>
            ${isTemplate ? `<span style="font-size:10px;padding:1px 6px;border-radius:99px;background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3);white-space:nowrap">template</span>` : ''}
          </div>
          ${item.description ? `<div class="preset-card-desc">${esc(item.description)}</div>` : ''}
          <div class="preset-card-image" style="margin-top:8px">${esc(item.image)}</div>
          <div class="preset-card-meta" style="margin-top:8px">
            <span>${item.memory_limit} MB RAM</span>
            <span>${item.cpu_limit} CPU</span>
            ${isTemplate && item.files?.length ? `<span>${item.files.length} file(s)</span>` : ''}
          </div>
          <div class="preset-card-footer">
            ${atLimit
              ? `<button class="btn btn-ghost btn-sm w-full" style="justify-content:center;cursor:not-allowed;opacity:.6" disabled>Deploy</button>`
              : `<button class="btn btn-primary btn-sm w-full" style="justify-content:center" onclick="${deployClick}">Deploy</button>`}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function scrollToDeploy() {
  const el = document.getElementById('deployAnchor');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function serverCard(s, showOwner = false) {
  let permsLine = '';
  if (s.shared && s.member_permissions) {
    try { const p = JSON.parse(s.member_permissions); if (p.length) permsLine = `<div style="font-size:10px;color:var(--text-dim);margin-top:2px">Access: ${p.join(', ')}</div>`; } catch {}
  }
  const inner = `
    <a href="/server/${s.id}" class="server-card">
      <div class="server-card-top">
        <div style="min-width:0;flex:1">
          <div class="server-name" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            ${esc(s.name)}
            ${s.shared ? '<span class="badge" style="font-size:10px;padding:1px 5px;background:var(--bg3);color:var(--text-muted)">Shared</span>' : ''}
          </div>
          <div class="server-image">${esc(s.image)}</div>
          ${showOwner ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px">Owner: ${esc(s.owner_name || 'Unknown')}</div>` : ''}
          ${permsLine}
        </div>
        ${badgeHtml(s.status)}
      </div>
      <div class="server-node">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>
        ${esc(s.node_name || 'Unknown')}
        ${!s.node_online ? '<span class="text-danger text-xs"> — offline</span>' : ''}
      </div>
      <div class="server-mini-stats">
        <div class="server-mini-stat">RAM: <span>${fmtMb(s.memory_limit)}</span></div>
        <div class="server-mini-stat">CPU: <span>${s.cpu_limit}</span></div>
        ${s.port_mappings?.[0]?.hostPort ? `<div class="server-mini-stat">Port: <span>${s.port_mappings[0].hostPort}</span></div>` : ''}
      </div>
    </a>`;
  if (!s.shared) return inner;
  return `<div style="position:relative">${inner}<button class="btn btn-sm" style="position:absolute;bottom:8px;right:8px;font-size:11px;padding:2px 10px;z-index:1;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)" onmouseover="this.style.background='rgba(239,68,68,.28)'" onmouseout="this.style.background='rgba(239,68,68,.15)'" onclick="leaveServer('${s.id}',event)">Leave</button></div>`;
}

async function leaveServer(sid, e) {
  e.preventDefault();
  e.stopPropagation();
  if (!confirm('Leave this shared server? You will lose access immediately.')) return;
  try {
    await API.post(`/servers/${sid}/leave`, {});
    servers = servers.filter(s => s.id !== sid);
    renderServers();
  } catch (err) { alert(err.message); }
}

function renderServers() {
  const el = document.getElementById('serverSection');
  const isAdmin = user?.role === 'admin';

  if (!servers.length) {
    el.innerHTML = `
      <div class="section-header mb-4"><div class="section-title">My Servers</div></div>
      <div class="empty-state">
        <div class="empty-icon" style="font-size:28px">—</div>
        <p>No servers yet.${presets.length || templates.length ? ' Click <strong>+ New Server</strong> to deploy one.' : ' Ask an admin to create presets.'}</p>
      </div>`;
    return;
  }

  if (isAdmin) {
    const mine   = servers.filter(s => s.owner_id === user.id);
    const others = servers.filter(s => s.owner_id !== user.id);
    el.innerHTML = `
      ${mine.length ? `
        <div class="section-header mb-4"><div class="section-title">My Servers</div></div>
        <div class="grid-2 mb-6">${mine.map(s => serverCard(s)).join('')}</div>
      ` : `
        <div class="section-header mb-4"><div class="section-title">My Servers</div></div>
        <div class="empty-state" style="margin-bottom:24px"><p>You have no servers.</p></div>
      `}
      ${others.length ? `
        <div class="section-header mb-4"><div class="section-title">Other Servers</div></div>
        <div class="grid-2">${others.map(s => serverCard(s, true)).join('')}</div>
      ` : ''}`;
  } else {
    const mine   = servers.filter(s => !s.shared);
    const shared = servers.filter(s => s.shared);
    el.innerHTML = `
      <div class="section-header mb-4"><div class="section-title">My Servers</div></div>
      ${mine.length ? `<div class="grid-2 mb-6">${mine.map(s => serverCard(s)).join('')}</div>` : `<div class="empty-state" style="margin-bottom:24px"><p>No servers yet.${presets.length ? ' Choose a preset above to get started.' : ' Ask an admin to create presets.'}</p></div>`}
      ${shared.length ? `
        <div class="section-header mb-4"><div class="section-title">Shared With Me</div></div>
        <div class="grid-2">${shared.map(s => serverCard(s, true)).join('')}</div>
      ` : ''}`;
  }
}

// ── Deploy from preset ────────────────────────────────────────────────────────
let _autoNodeId = null;

function openDeployModal(presetId, presetName) {
  deployPresetId = presetId;
  _autoNodeId = null;
  document.getElementById('deployPresetName').textContent = presetName;
  document.getElementById('d_name').value = '';
  document.getElementById('deployError').classList.remove('show');

  // Version picker
  const preset = presets.find(p => p.id === presetId);
  const versionGroup = document.getElementById('d_versionGroup');
  const versionSelect = document.getElementById('d_version');
  if (preset?.images?.length) {
    versionSelect.innerHTML =
      `<option value="">${esc(preset.image)} (default)</option>` +
      preset.images.map(v => `<option value="${esc(v.image)}">${esc(v.label)} — ${esc(v.image)}</option>`).join('');
    versionGroup.style.display = '';
  } else {
    versionGroup.style.display = 'none';
  }

  const onlineNodes = nodes.filter(n => n.online);
  const nodeGroup = document.getElementById('d_nodeGroup');
  const nodeSelect = document.getElementById('d_node');

  if (onlineNodes.length === 1) {
    _autoNodeId = onlineNodes[0].id;
    nodeGroup.style.display = 'none';
  } else if (onlineNodes.length > 1) {
    _autoNodeId = null;
    nodeGroup.style.display = '';
    nodeSelect.innerHTML = '<option value="">Auto (best available)</option>' + onlineNodes.map(n => `<option value="${n.id}">${esc(n.name)}</option>`).join('');
  } else {
    _autoNodeId = null;
    nodeGroup.style.display = 'none';
  }

  // Setup variables (per-deploy prompts defined on the preset)
  const svWrap = document.getElementById('d_setupVars');
  const setupVars = preset?.setup_vars || [];
  if (setupVars.length > 0) {
    // Find current default value from preset's env_vars for each setup var
    const envDefaults = {};
    for (const ev of (preset?.env_vars || [])) envDefaults[ev.key] = ev.value;
    svWrap.innerHTML = setupVars.map(sv => `
      <div class="form-group">
        <label class="form-label">${esc(sv.label)}</label>
        <input type="text" class="form-input" id="sv_${esc(sv.key)}" placeholder="${esc(sv.description || sv.label)}" value="${esc(envDefaults[sv.key] ?? '')}">
        ${sv.description ? `<div class="form-hint">${esc(sv.description)}</div>` : ''}
      </div>`).join('');
  } else {
    svWrap.innerHTML = '';
  }

  document.getElementById('deployModal').classList.add('open');
}

function closeDeployModal() {
  document.getElementById('deployModal').classList.remove('open');
  deployPresetId = null;
  _autoNodeId = null;
}

async function deployServer() {
  const errEl = document.getElementById('deployError');
  errEl.classList.remove('show');
  const btn = document.getElementById('deployBtn');
  const name = document.getElementById('d_name').value.trim();
  const node_id = _autoNodeId || document.getElementById('d_node').value || null;
  const image = document.getElementById('d_version').value || undefined;
  if (!name) { errEl.textContent = 'Server name is required.'; errEl.classList.add('show'); return; }

  const preset = presets.find(p => p.id === deployPresetId);
  const setup_var_values = {};
  for (const sv of (preset?.setup_vars || [])) {
    const el = document.getElementById(`sv_${sv.key}`);
    if (el) setup_var_values[sv.key] = el.value;
  }

  btn.innerHTML = '<span class="spinner"></span> Deploying...';
  btn.disabled = true;
  try {
    await API.post('/servers/from-preset', { name, preset_id: deployPresetId, node_id, image, setup_var_values });
    closeDeployModal();
    await loadData();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.innerHTML = 'Deploy';
    btn.disabled = false;
  }
}

// ── Deploy from template ──────────────────────────────────────────────────────
let _templateAutoNodeId = null;

function openDeployTemplateModal(templateId, templateName) {
  deployTemplateId = templateId;
  _templateAutoNodeId = null;
  document.getElementById('deployTemplateName').textContent = templateName;
  document.getElementById('dt_name').value = '';
  document.getElementById('deployTemplateError').classList.remove('show');

  const onlineNodes = nodes.filter(n => n.online);
  const nodeGroup = document.getElementById('dt_nodeGroup');
  const nodeSelect = document.getElementById('dt_node');

  if (onlineNodes.length === 1) {
    _templateAutoNodeId = onlineNodes[0].id;
    nodeGroup.style.display = 'none';
  } else if (onlineNodes.length > 1) {
    _templateAutoNodeId = null;
    nodeGroup.style.display = '';
    nodeSelect.innerHTML = '<option value="">Auto (best available)</option>' + onlineNodes.map(n => `<option value="${n.id}">${esc(n.name)}</option>`).join('');
  } else {
    _templateAutoNodeId = null;
    nodeGroup.style.display = 'none';
  }

  document.getElementById('deployTemplateModal').classList.add('open');
}

function closeDeployTemplateModal() {
  document.getElementById('deployTemplateModal').classList.remove('open');
  deployTemplateId = null;
  _templateAutoNodeId = null;
}

async function deployTemplate() {
  const errEl = document.getElementById('deployTemplateError');
  errEl.classList.remove('show');
  const btn = document.getElementById('deployTemplateBtn');
  const name = document.getElementById('dt_name').value.trim();
  const node_id = _templateAutoNodeId || document.getElementById('dt_node').value || null;
  if (!name) { errEl.textContent = 'Server name is required.'; errEl.classList.add('show'); return; }

  btn.innerHTML = '<span class="spinner"></span> Deploying...';
  btn.disabled = true;
  try {
    await API.post('/servers/from-template', { name, template_id: deployTemplateId, node_id });
    closeDeployTemplateModal();
    await loadData();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.innerHTML = 'Deploy';
    btn.disabled = false;
  }
}

// ── Admin custom create ───────────────────────────────────────────────────────
let envCount = 0;
let _createAutoNodeId = null;

function openCreateModal() {
  document.getElementById('envList').innerHTML = '';
  ['c_name','c_image','c_desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c_memory').value = 512;
  document.getElementById('c_cpu').value = 1;
  envCount = 0;
  _createAutoNodeId = null;

  const onlineNodes = nodes.filter(n => n.online);
  const nodeGroup = document.getElementById('c_nodeGroup');
  const nodeSelect = document.getElementById('c_node');

  if (onlineNodes.length === 1) {
    _createAutoNodeId = onlineNodes[0].id;
    nodeGroup.style.display = 'none';
  } else if (onlineNodes.length > 1) {
    nodeGroup.style.display = '';
    nodeSelect.innerHTML = onlineNodes.map(n => `<option value="${n.id}">${esc(n.name)}</option>`).join('');
  } else {
    nodeGroup.style.display = '';
    nodeSelect.innerHTML = '<option value="">— No nodes online —</option>';
  }

  document.getElementById('createError').classList.remove('show');
  document.getElementById('createModal').classList.add('open');
}

function closeCreateModal() { document.getElementById('createModal').classList.remove('open'); }

function addEnv() {
  const id = ++envCount;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-top:6px';
  div.innerHTML = `
    <input type="text" class="form-input" id="ek_${id}" placeholder="KEY" style="flex:1">
    <span class="text-muted">=</span>
    <input type="text" class="form-input" id="ev_${id}" placeholder="value" style="flex:2">
    <button onclick="this.parentNode.remove()" class="btn btn-ghost btn-sm" style="flex-shrink:0;padding:5px 8px">✕</button>`;
  document.getElementById('envList').appendChild(div);
}

function getEnvVars() {
  const envs = [];
  document.querySelectorAll('[id^="ek_"]').forEach(el => {
    const id = el.id.slice(3);
    const key = el.value.trim();
    const value = document.getElementById(`ev_${id}`).value;
    if (key) envs.push({ key, value });
  });
  return envs;
}

async function createServer() {
  const errEl = document.getElementById('createError');
  errEl.classList.remove('show');
  const btn = document.getElementById('createBtn');
  btn.innerHTML = '<span class="spinner"></span> Creating...';
  btn.disabled = true;
  try {
    await API.post('/servers', {
      name: document.getElementById('c_name').value,
      description: document.getElementById('c_desc').value,
      image: document.getElementById('c_image').value,
      node_id: _createAutoNodeId || document.getElementById('c_node').value,
      memory_limit: parseInt(document.getElementById('c_memory').value),
      cpu_limit: parseFloat(document.getElementById('c_cpu').value),
      env_vars: getEnvVars(),
    });
    closeCreateModal();
    await loadData();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.innerHTML = 'Create Server';
    btn.disabled = false;
  }
}

document.getElementById('deployModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDeployModal(); });
document.getElementById('deployTemplateModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDeployTemplateModal(); });
document.getElementById('createModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeCreateModal(); });

// ── Easter egg: type "teddy" ──────────────────────────────────────────────────
(function() {
  const SECRET = 'teddy';
  let buf = '';
  let active = false;

  document.addEventListener('keydown', e => {
    if (active && e.key === 'Escape') { closeTeddy(); return; }
    if (active) return;
    if (e.key.length === 1) {
      buf += e.key.toLowerCase();
      if (buf.length > SECRET.length) buf = buf.slice(-SECRET.length);
      if (buf === SECRET) { buf = ''; triggerTeddy(); }
    }
  });

  function triggerTeddy() {
    active = true;
    const overlay = document.createElement('div');
    overlay.id = 'teddy-overlay';
    overlay.style.cssText = [
      'position:fixed;inset:0;z-index:99999;overflow:hidden',
      'background:#0a0a0a;cursor:pointer',
      'display:flex;flex-wrap:wrap;align-content:flex-start',
      'animation:teddyIn .3s ease'
    ].join(';');

    const style = document.createElement('style');
    style.textContent = `
      @keyframes teddyIn { from{opacity:0;transform:scale(1.05)} to{opacity:1;transform:scale(1)} }
      @keyframes teddyPop { from{opacity:0;transform:scale(.4) rotate(var(--r))} to{opacity:1;transform:scale(1) rotate(var(--r))} }
      #teddy-overlay img {
        animation: teddyPop var(--d) cubic-bezier(.34,1.56,.64,1) forwards;
        opacity: 0;
      }
      #teddy-close {
        position:fixed;top:18px;right:22px;z-index:100000;
        background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
        color:#fff;font-size:13px;padding:6px 16px;border-radius:6px;cursor:pointer;
        backdrop-filter:blur(8px);letter-spacing:.03em;
      }
      #teddy-close:hover { background:rgba(255,255,255,.22); }
      #teddy-label {
        position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100000;
        color:rgba(255,255,255,.55);font-size:12px;pointer-events:none;letter-spacing:.05em;
      }
    `;
    document.head.appendChild(style);

    const COUNT = 120;
    for (let i = 0; i < COUNT; i++) {
      const img = document.createElement('img');
      const size = 100 + Math.floor(Math.random() * 120);
      const rot  = (Math.random() * 16 - 8).toFixed(1);
      const delay = (Math.random() * 0.9).toFixed(2);
      img.src = `https://loremflickr.com/${size}/${size}/teddybear?lock=${i}`;
      img.width = size;
      img.height = size;
      img.style.cssText = `object-fit:cover;flex-shrink:0;--r:${rot}deg;--d:${delay}s;`;
      img.style.animationDelay = delay + 's';
      overlay.appendChild(img);
    }

    const closeBtn = document.createElement('button');
    closeBtn.id = 'teddy-close';
    closeBtn.textContent = '✕  Close';
    closeBtn.onclick = closeTeddy;

    const label = document.createElement('div');
    label.id = 'teddy-label';
    label.textContent = 'press ESC or click × to escape the teddy bears';

    document.body.appendChild(style);
    document.body.appendChild(overlay);
    document.body.appendChild(closeBtn);
    document.body.appendChild(label);
  }

  function closeTeddy() {
    active = false;
    const overlay = document.getElementById('teddy-overlay');
    const closeBtn = document.getElementById('teddy-close');
    const label    = document.getElementById('teddy-label');
    if (overlay) overlay.remove();
    if (closeBtn) closeBtn.remove();
    if (label) label.remove();
  }
})();

init();
</script>
