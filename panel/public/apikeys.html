<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl ├втВмтАЭ API Keys</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .key-table { width: 100%; border-collapse: collapse; }
    .key-table th, .key-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    .key-table th { color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    .key-table tr:last-child td { border-bottom: none; }
    .key-display { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--primary); border-radius: 8px; padding: 12px 14px; margin: 12px 0; font-family: monospace; font-size: 13px; word-break: break-all; color: var(--text); }
    .key-warning { background: #f59e0b11; border: 1px solid #f59e0b44; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #fbbf24; margin-bottom: 12px; }
    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); font-size: 14px; }
    .empty-state svg { display: block; margin: 0 auto 12px; opacity: .4; }
    code { font-family: monospace; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 12px; }
    .method { display: inline-block; font-family: monospace; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; min-width: 46px; text-align: center; letter-spacing: .03em; }
    .method-get    { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
    .method-post   { background: #2563eb22; color: #60a5fa; border: 1px solid #2563eb44; }
    .method-put    { background: #d9770622; color: #fb923c; border: 1px solid #d9770644; }
    .method-patch  { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
    .method-delete { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }
    .ep-group { margin-bottom: 20px; }
    .ep-group-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .ep-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .ep-row:last-child { border-bottom: none; }
    .ep-path { font-family: monospace; font-size: 12px; color: var(--text); flex: 1; }
    .ep-path .param { color: #a78bfa; }
    .ep-desc { font-size: 12px; color: var(--text-muted); min-width: 160px; text-align: right; }
  </style>
</head>
<body>
<div class="layout" id="app"></div>

<!-- Create key modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Create API Key</h2>
      <button class="modal-close" onclick="closeCreate()">├в┼УтАв</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error" id="createError"></div>
      <div id="createForm">
        <div class="form-group">
          <label class="form-label">Key Name</label>
          <input type="text" class="form-input" id="keyName" placeholder="e.g. My Bot" maxlength="64" autofocus>
          <div class="form-hint">A label to identify this key. Not secret.</div>
        </div>
      </div>
      <div id="createSuccess" style="display:none">
        <div class="key-warning">Copy this key now ├втВмтАЭ it will not be shown again.</div>
        <div class="key-display">
          <span id="newKeyText" style="flex:1;overflow:hidden;text-overflow:ellipsis"></span>
          <button class="btn btn-ghost btn-sm" id="copyBtn" onclick="copyKey()">Copy</button>
        </div>
      </div>
    </div>
    <div class="modal-footer" id="createFooter">
      <button class="btn btn-ghost" onclick="closeCreate()">Cancel</button>
      <button class="btn btn-primary" id="createBtn" onclick="createKey()">Create Key</button>
    </div>
    <div class="modal-footer" id="doneFooter" style="display:none">
      <button class="btn btn-primary" onclick="closeCreate()">Done</button>
    </div>
  </div>
</div>

<!-- Revoke confirm modal -->
<div class="modal-overlay" id="revokeModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title" style="color:#f87171">Revoke API Key</h2>
      <button class="modal-close" onclick="closeRevoke()">├в┼УтАв</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-muted)">Revoking <strong id="revokeKeyName" style="color:var(--text)"></strong> will immediately invalidate it. Any services using this key will stop working.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeRevoke()">Cancel</button>
      <button class="btn btn-danger" id="revokeBtn" onclick="confirmRevoke()">Revoke Key</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
requireAuth();

let keys = [];
let revokeId = null;

async function init() {
  await loadPanelSettings();
  const ps = getPanelSettings();
  if (ps.api_enabled === '0') {
    document.getElementById('app').innerHTML = `
      ${renderSidebar('apikeys')}
      <div class="main">
        <div class="topbar"><div><div class="page-title">API Keys</div></div></div>
        <div class="content">
          <div class="card" style="max-width:480px;text-align:center;padding:40px 24px">
            <div style="font-size:32px;margin-bottom:12px">├░┼╕тАЭтАЩ</div>
            <div style="font-size:16px;font-weight:700;margin-bottom:8px">API Access Disabled</div>
            <div style="font-size:13px;color:var(--text-muted)">The REST API has been disabled by an administrator. API keys cannot be created or used while the API is off.</div>
          </div>
        </div>
      </div>`;
    return;
  }
  document.getElementById('app').innerHTML = `
    ${renderSidebar('apikeys')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">API Keys</div>
          <div class="page-sub">Create keys to access your servers programmatically</div>
        </div>
        <button class="btn btn-primary" onclick="openCreate()">+ New Key</button>
      </div>
      <div class="content">
        <div class="alert alert-error"   id="pageError"></div>
        <div class="alert alert-success" id="pageSuccess"></div>

        <div class="card" style="margin-bottom:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div class="card-title" style="margin:0">Your Keys</div>
            <span style="font-size:12px;color:var(--text-muted)" id="keyCount"></span>
          </div>
          <div id="keyList"></div>
        </div>

        <div class="card" style="max-width:680px">
          <div class="card-title mb-3">Using the API</div>

          <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px">
            <div style="flex:1">
              <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Authentication</div>
              <div style="font-size:13px;color:var(--text)">Add your key as an <code>X-API-Key</code> header on every request.</div>
            </div>
          </div>

          <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:12px;overflow-x:auto;margin:0 0 16px;color:var(--text);line-height:1.6">curl /api/v1/servers \\
  -H <span style="color:#4ade80">"X-API-Key: ndl_your_key_here"</span></pre>

          <div style="display:flex;gap:20px;margin-bottom:20px;font-size:12px">
            <div style="display:flex;align-items:center;gap:6px;color:var(--text-muted)">
              <code style="font-size:11px">X-RateLimit-Remaining-Min</code>
              <span>requests left this minute</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;color:var(--text-muted)">
              <code style="font-size:11px">X-RateLimit-Remaining-Hour</code>
              <span>requests left this hour</span>
            </div>
          </div>

          <div style="font-size:13px;font-weight:600;margin-bottom:12px">Endpoints</div>

          <div class="ep-group">
            <div class="ep-group-title">General</div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/nodes</span><span class="ep-desc">List all nodes</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/presets</span><span class="ep-desc">List available presets</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/presets/<span class="param">:id</span></span><span class="ep-desc">Get preset details</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/templates</span><span class="ep-desc">List available templates</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/templates/<span class="param">:id</span></span><span class="ep-desc">Get template details</span></div>
          </div>

          <div class="ep-group">
            <div class="ep-group-title">Servers</div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/servers</span><span class="ep-desc">List your servers</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span></span><span class="ep-desc">Get server info</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/stats</span><span class="ep-desc">CPU / RAM / disk</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/from-preset</span><span class="ep-desc">Create from preset</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/from-template</span><span class="ep-desc">Create from template</span></div>
          </div>

          <div class="ep-group">
            <div class="ep-group-title">Server Control</div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/action</span><span class="ep-desc">start ├В┬╖ stop ├В┬╖ restart ├В┬╖ kill</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/stdin</span><span class="ep-desc">Send console command</span></div>
            <div class="ep-row"><span class="method method-patch">PATCH</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/settings</span><span class="ep-desc">Update name / startup / env vars</span></div>
            <div class="ep-row"><span class="method method-delete">DELETE</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span></span><span class="ep-desc">Delete server</span></div>
          </div>

          <div class="ep-group">
            <div class="ep-group-title">Activity &amp; Members</div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/activity</span><span class="ep-desc">Audit log (limit / offset)</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/members</span><span class="ep-desc">List shared members</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/members</span><span class="ep-desc">Add member + permissions</span></div>
            <div class="ep-row"><span class="method method-patch">PATCH</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/members/<span class="param">:userId</span></span><span class="ep-desc">Update permissions</span></div>
            <div class="ep-row"><span class="method method-delete">DELETE</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/members/<span class="param">:userId</span></span><span class="ep-desc">Remove member</span></div>
          </div>

          <div class="ep-group">
            <div class="ep-group-title">Files</div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files</span><span class="ep-desc">List directory</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/read</span><span class="ep-desc">Read text file</span></div>
            <div class="ep-row"><span class="method method-get">GET</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/read-binary</span><span class="ep-desc">Read file as base64</span></div>
            <div class="ep-row"><span class="method method-put">PUT</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/write</span><span class="ep-desc">Write text file</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/upload</span><span class="ep-desc">Upload binary file (single request)</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/upload-chunk</span><span class="ep-desc">Upload file in 5 MB chunks ├втВмтАЭ <code>?path=&amp;offset=&amp;total=</code></span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/mkdir</span><span class="ep-desc">Create directory</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/rename</span><span class="ep-desc">Rename file or folder</span></div>
            <div class="ep-row"><span class="method method-delete">DELETE</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files</span><span class="ep-desc">Delete file or folder</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/extract</span><span class="ep-desc">Extract archive</span></div>
          </div>

          <div class="ep-group" style="margin-bottom:0">
            <div class="ep-group-title">Git</div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/git</span><span class="ep-desc">Clone repository</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/git-pull</span><span class="ep-desc">Pull latest changes</span></div>
            <div class="ep-row"><span class="method method-post">POST</span><span class="ep-path">/api/v1/servers/<span class="param">:id</span>/files/git-reset</span><span class="ep-desc">Reset to commit</span></div>
          </div>
        </div>
      </div>
    </div>`;

  await loadKeys();
}

async function loadKeys() {
  try {
    keys = await API.get('/apikeys');
    renderKeys();
  } catch (e) { showErr(e.message); }
}

function renderKeys() {
  const el = document.getElementById('keyList');
  const kc = document.getElementById('keyCount');
  kc.textContent = `${keys.length} / 10 keys`;
  if (!keys.length) {
    el.innerHTML = `<div class="empty-state"><svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24"><circle cx="8" cy="15" r="4"/><path d="M12 11.5l8-8M18 6l2 2M15 9l2 2"/></svg>No API keys yet. Create one to get started.</div>`;
    return;
  }
  el.innerHTML = `<table class="key-table">
    <thead><tr>
      <th>Name</th><th>Created</th><th>Last Used</th><th></th>
    </tr></thead>
    <tbody>${keys.map(k => `<tr>
      <td style="font-weight:600">${esc(k.name)}</td>
      <td style="color:var(--text-muted)">${fmtDate(k.created_at)}</td>
      <td style="color:var(--text-muted)">${k.last_used_at ? fmtDate(k.last_used_at) : 'Never'}</td>
      <td style="text-align:right"><button class="btn btn-danger btn-sm" onclick="openRevoke('${esc(k.id)}','${esc(k.name)}')">Revoke</button></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function fmtDate(unix) {
  return new Date(unix * 1000).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
}

// ├втАЭтВм├втАЭтВм Create modal ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм

function openCreate() {
  document.getElementById('keyName').value = '';
  document.getElementById('createError').textContent = '';
  document.getElementById('createError').classList.remove('show');
  document.getElementById('createForm').style.display = '';
  document.getElementById('createSuccess').style.display = 'none';
  document.getElementById('createFooter').style.display = '';
  document.getElementById('doneFooter').style.display = 'none';
  document.getElementById('createBtn').disabled = false;
  document.getElementById('createBtn').textContent = 'Create Key';
  document.getElementById('createModal').classList.add('open');
  setTimeout(() => document.getElementById('keyName').focus(), 50);
}

function closeCreate() {
  document.getElementById('createModal').classList.remove('open');
  loadKeys();
}

async function createKey() {
  const name = document.getElementById('keyName').value.trim();
  if (!name) { showCreateErr('Key name is required'); return; }
  const btn = document.getElementById('createBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const result = await API.post('/apikeys', { name });
    document.getElementById('newKeyText').textContent = result.key;
    document.getElementById('createForm').style.display = 'none';
    document.getElementById('createSuccess').style.display = '';
    document.getElementById('createFooter').style.display = 'none';
    document.getElementById('doneFooter').style.display = '';
  } catch (e) {
    showCreateErr(e.message);
    btn.disabled = false; btn.textContent = 'Create Key';
  }
}

function copyKey() {
  const key = document.getElementById('newKeyText').textContent;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
  }).catch(() => { /* fallback: select text */ });
}

function showCreateErr(msg) {
  const el = document.getElementById('createError');
  el.textContent = msg; el.classList.add('show');
}

// ├втАЭтВм├втАЭтВм Revoke modal ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм

function openRevoke(id, name) {
  revokeId = id;
  document.getElementById('revokeKeyName').textContent = name;
  document.getElementById('revokeBtn').disabled = false;
  document.getElementById('revokeBtn').textContent = 'Revoke Key';
  document.getElementById('revokeModal').classList.add('open');
}

function closeRevoke() {
  document.getElementById('revokeModal').classList.remove('open');
  revokeId = null;
}

async function confirmRevoke() {
  if (!revokeId) return;
  const btn = document.getElementById('revokeBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    await API.delete('/apikeys/' + revokeId);
    closeRevoke();
    await loadKeys();
    showOk('Key revoked.');
  } catch (e) {
    showErr(e.message);
    closeRevoke();
  }
}
