<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Discord</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .status-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .status-row:last-child { border-bottom:none; }
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .status-dot.green { background:#22c55e; box-shadow:0 0 6px #22c55e88; }
    .status-dot.red   { background:#ef4444; }
    .status-dot.gray  { background:var(--text-muted); }
    .status-label { font-weight:500; min-width:90px; color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
    .bot-avatar { width:24px; height:24px; border-radius:50%; object-fit:cover; }
    .tab-bar { display:flex; gap:2px; margin-bottom:16px; border-bottom:1px solid var(--border); }
    .tab-btn { padding:8px 16px; font-size:13px; font-weight:500; background:none; border:none; border-bottom:2px solid transparent; color:var(--text-muted); cursor:pointer; margin-bottom:-1px; transition:color .15s, border-color .15s; }
    .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
    .tab-pane { display:none; }
    .tab-pane.active { display:flex; flex-direction:column; gap:16px; }
  </style>
</head>
<body>
<div class="layout" id="app"></div>
<script src="/js/api.js"></script>
<script>
requireAdmin();

let cfg = {}, botInfo = {}, ranks = [], guildRoles = [], rankRolesMap = {}, linkedRole = null;
let activeTab = 'stats';

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('admin-discord-status')}
    <div class="main">
      <div class="topbar">
        <div><div class="page-title">Discord</div><div class="page-sub">Node stats and role sync via Discord bot</div></div>
      </div>
      <div class="content" id="content"><div class="empty-state"><span class="spinner"></span></div></div>
    </div>`;

  try {
    [cfg, botInfo] = await Promise.all([
      API.get('/discord'),
      API.get('/discord/bot').catch(() => ({ online: false })),
    ]);
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><p>${esc(e.message)}</p></div>`;
  }
}

function render() {
  document.getElementById('content').innerHTML = `
    <div style="max-width:580px">

      <!-- Status -->
      <div class="card mb-4">
        <div class="card-title mb-2">Status</div>
        <div class="status-row">
          <div class="status-dot green"></div><div class="status-label">Panel</div><div>Online</div>
        </div>
        <div class="status-row">
          <div class="status-dot ${botInfo.online ? 'green' : cfg.hasToken ? 'red' : 'gray'}"></div>
          <div class="status-label">Discord Bot</div>
          <div style="display:flex;align-items:center;gap:8px">
            ${botInfo.online
              ? `${botInfo.avatarUrl ? `<img class="bot-avatar" src="${esc(botInfo.avatarUrl)}" alt="">` : ''}<b>${esc(botInfo.username)}</b>`
              : cfg.hasToken ? `<span class="text-muted">Cannot reach Discord API</span>` : `<span class="text-muted">Not configured</span>`}
          </div>
        </div>
        <div class="status-row">
          <div class="status-dot ${cfg.statsEnabled ? 'green' : 'gray'}"></div>
          <div class="status-label">Stats Message</div>
          <div>${cfg.statsEnabled
            ? `Active in <b>#${esc(cfg.statsChannelName || cfg.statsChannelId)}</b> <span class="text-muted">· ${esc(cfg.statsGuildName || '')}</span>`
            : `<span class="text-muted">Stopped</span>`}</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn ${activeTab==='stats'?'active':''}" data-tab="stats" onclick="switchTab('stats')">Stats Message</button>
        ${cfg.hasToken && getPanelSettings().discord_enabled === '1' ? `<button class="tab-btn ${activeTab==='roles'?'active':''}" data-tab="roles" onclick="switchTab('roles')">Role Sync</button>` : ''}
        <button class="tab-btn ${activeTab==='token'?'active':''}" data-tab="token" onclick="switchTab('token')">Bot Token</button>
      </div>

      <!-- Stats tab -->
      <div id="tab-stats" class="tab-pane ${activeTab==='stats'?'active':''}">
        <div class="card">
          ${!cfg.hasToken ? `<div class="alert alert-error">Configure a bot token first.</div>` : `
          <div class="form-group mb-3">
            <label class="form-label">Server (Guild)</label>
            <select class="form-input" id="statsGuildSelect" onchange="onStatsGuildChange()"><option>Loading...</option></select>
          </div>
          <div class="form-group mb-3">
            <label class="form-label">Channel</label>
            <select class="form-input" id="statsChannelSelect"><option>— Select a server first —</option></select>
          </div>
          <div class="form-group mb-4">
            <label class="form-label">Update interval <span class="text-muted">(seconds, min 30)</span></label>
            <input type="number" class="form-input" id="statsInterval" min="30" step="10" value="${cfg.interval||60}" style="width:110px">
          </div>
          <div id="statsAlert" class="alert mb-3" style="display:none"></div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="saveStatsChannel()">Save</button>
            ${cfg.statsEnabled ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="clearStatsMessage()">Stop</button>` : ''}
          </div>`}
        </div>
      </div>

      <!-- Role Sync tab -->
      <div id="tab-roles" class="tab-pane ${activeTab==='roles'?'active':''}">
        <div class="card" id="roleCard">
          ${!cfg.hasToken ? `<div class="alert alert-error">Configure a bot token first.</div>` : `
          <div class="form-group mb-4">
            <label class="form-label">Server (Guild)</label>
            <select class="form-input" id="rolesGuildSelect" onchange="onRolesGuildChange()"><option>Loading...</option></select>
          </div>
          <div class="text-muted mb-4" style="font-size:12.5px">Map panel ranks to Discord roles. Users with a linked Discord account get these roles automatically when their rank changes. The bot must have <b>Manage Roles</b> permission and its role must be above the roles it assigns.</div>
          <div id="roleSyncContent"></div>
          <div id="roleAlert" class="alert mt-3" style="display:none"></div>
          <div style="display:flex;gap:8px;margin-top:14px">
            <button class="btn btn-primary btn-sm" onclick="saveRoleSync()">Save Mappings</button>
            <button class="btn btn-ghost btn-sm" onclick="syncNow()">Sync All Users Now</button>
          </div>`}
        </div>
      </div>

      <!-- Token tab -->
      <div id="tab-token" class="tab-pane ${activeTab==='token'?'active':''}">
        <div class="card">
          <div class="form-group mb-3">
            <label class="form-label">Bot Token</label>
            <input type="password" class="form-input font-mono" id="tokenInput" placeholder="${cfg.hasToken ? 'Leave blank to keep current token' : 'Paste your bot token'}">
            <div class="form-hint mt-2">Create a bot at discord.com/developers/applications. Add it to your server with <b>Send Messages</b> and <b>Manage Roles</b> permissions.</div>
          </div>
          <div id="tokenAlert" class="alert mb-3" style="display:none"></div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="saveToken()">Save Token</button>
            ${cfg.hasToken ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="disconnect()">Disconnect</button>` : ''}
          </div>
        </div>
      </div>

    </div>`;

  if (cfg.hasToken) loadStatsGuilds();
  if (cfg.hasToken && activeTab === 'roles') loadRolesGuilds();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`)?.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'roles' && cfg.hasToken) loadRolesGuilds();
}

// ── Stats Message ─────────────────────────────────────────────────────────────

async function loadStatsGuilds() {
  const sel = document.getElementById('statsGuildSelect');
  if (!sel) return;
  try {
    const guilds = await API.get('/discord/guilds');
    sel.innerHTML = `<option value="">— Select a server —</option>` +
      guilds.map(g => `<option value="${esc(g.id)}" ${cfg.statsGuildId===g.id?'selected':''}>${esc(g.name)}</option>`).join('');
    if (cfg.statsGuildId) loadStatsChannels(cfg.statsGuildId);
  } catch (e) { if (sel) sel.innerHTML = `<option>Failed: ${esc(e.message)}</option>`; }
}

async function onStatsGuildChange() {
  const guildId = document.getElementById('statsGuildSelect')?.value;
  const channelSel = document.getElementById('statsChannelSelect');
  if (!guildId) { if (channelSel) channelSel.innerHTML = '<option>— Select a server first —</option>'; return; }
  await loadStatsChannels(guildId);
}

async function loadStatsChannels(guildId) {
  const sel = document.getElementById('statsChannelSelect');
  if (!sel) return;
  sel.innerHTML = '<option>Loading...</option>';
  try {
    const channels = await API.get(`/discord/guilds/${guildId}/channels`);
    sel.innerHTML = `<option value="">— Select a channel —</option>` +
      channels.map(c => `<option value="${esc(c.id)}" ${cfg.statsChannelId===c.id?'selected':''}>#${esc(c.name)}</option>`).join('');
  } catch (e) { if (sel) sel.innerHTML = `<option>Failed: ${esc(e.message)}</option>`; }
}

async function saveStatsChannel() {
  const guildSel = document.getElementById('statsGuildSelect');
  const channelSel = document.getElementById('statsChannelSelect');
  const guildId = guildSel?.value;
  const guildName = guildSel?.options[guildSel.selectedIndex]?.text;
  const channelId = channelSel?.value;
  const channelName = channelSel?.options[channelSel.selectedIndex]?.text?.replace(/^#/,'');
  const interval = Math.max(30, parseInt(document.getElementById('statsInterval')?.value)||60);
  if (!guildId || !channelId) { showAlert('statsAlert','error','Select both a server and a channel.'); return; }
  try {
    const res = await API.patch('/discord/stats-channel', { guildId, guildName, channelId, channelName, interval });
    cfg.statsGuildId=guildId; cfg.statsGuildName=guildName;
    cfg.statsChannelId=channelId; cfg.statsChannelName=channelName;
    cfg.interval=interval; cfg.statsEnabled=true; cfg.messageId=res.messageId||cfg.messageId;
    showAlert('statsAlert','success','Saved and posted to Discord.');
    setTimeout(()=>render(),600);
  } catch (e) { showAlert('statsAlert','error',e.message); }
}

async function clearStatsMessage() {
  if (!confirm('Stop updating the stats message?')) return;
  try {
    await API.delete('/discord/stats-message');
    cfg.messageId=null; cfg.statsEnabled=false; render();
  } catch (e) { showAlert('statsAlert','error',e.message); }
}

// ── Role Sync ─────────────────────────────────────────────────────────────────

async function loadRolesGuilds() {
  const sel = document.getElementById('rolesGuildSelect');
  if (!sel) return;
  try {
    const guilds = await API.get('/discord/guilds');
    const savedGuild = cfg.statsGuildId || (guilds[0]?.id || '');
    sel.innerHTML = `<option value="">— Select a server —</option>` +
      guilds.map(g => `<option value="${esc(g.id)}" ${savedGuild===g.id?'selected':''}>${esc(g.name)}</option>`).join('');
    if (savedGuild) loadRoleSync(savedGuild);
  } catch (e) { if (sel) sel.innerHTML = `<option>Failed: ${esc(e.message)}</option>`; }
}

async function onRolesGuildChange() {
  const guildId = document.getElementById('rolesGuildSelect')?.value;
  const el = document.getElementById('roleSyncContent');
  if (!guildId) { if (el) el.innerHTML = ''; return; }
  loadRoleSync(guildId);
}

async function loadRoleSync(guildId) {
  const el = document.getElementById('roleSyncContent');
  if (!el) return;
  el.innerHTML = `<div class="text-muted" style="font-size:13px">Loading...</div>`;
  try {
    [ranks, guildRoles, { rankRoles: rankRolesMap, linkedRole }] = await Promise.all([
      API.get('/ranks'),
      API.get(`/discord/guild-roles?guildId=${encodeURIComponent(guildId)}`),
      API.get('/discord/rank-roles'),
    ]);
    renderRoleSync();
  } catch (e) { if (el) el.innerHTML = `<div class="text-muted">${esc(e.message)}</div>`; }
}

function roleSelect(id, current) {
  return `<select class="form-input" id="${id}" style="width:100%">
    <option value="">— No role —</option>
    ${guildRoles.map(r => `<option value="${esc(r.id)}" ${current===r.id?'selected':''}
      style="color:#${r.color?r.color.toString(16).padStart(6,'0'):'ccc'}">${esc(r.name)}</option>`).join('')}
  </select>`;
}

function renderRoleSync() {
  const el = document.getElementById('roleSyncContent');
  if (!el) return;
  el.innerHTML = `
    <div class="form-group mb-4">
      <label class="form-label mb-2">Linked Role <span class="text-muted">(given to any user who links their Discord account)</span></label>
      ${roleSelect('linkedRoleSelect', linkedRole)}
    </div>
    <div class="form-label mb-2">Rank Roles</div>
    ${ranks.length === 0 ? `<div class="text-muted" style="font-size:13px">No ranks configured yet.</div>` :
      ranks.map(r => `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="min-width:110px;font-size:13px">
          <span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${esc(r.color||'#888')};margin-right:6px;vertical-align:middle"></span>
          ${esc(r.name)}
        </div>
        ${roleSelect(`rankRole_${r.id}`, rankRolesMap[r.id] || '')}
      </div>`).join('')}`;
}

async function saveRoleSync() {
  const newLinkedRole = document.getElementById('linkedRoleSelect')?.value || null;
  const newRankRoles = {};
  for (const r of ranks) {
    const val = document.getElementById(`rankRole_${r.id}`)?.value;
    if (val) newRankRoles[r.id] = val;
  }
  try {
    await API.patch('/discord/rank-roles', { rankRoles: newRankRoles, linkedRole: newLinkedRole });
    rankRolesMap = newRankRoles; linkedRole = newLinkedRole;
    showAlert('roleAlert','success','Mappings saved.');
  } catch (e) { showAlert('roleAlert','error',e.message); }
}

async function syncNow() {
  try {
    await API.post('/discord/sync-roles', {});
    showAlert('roleAlert','success','Synced all linked users.');
  } catch (e) { showAlert('roleAlert','error',e.message); }
}

// ── Bot Token ─────────────────────────────────────────────────────────────────

async function saveToken() {
  const token = document.getElementById('tokenInput')?.value.trim();
  if (!token && cfg.hasToken) { showAlert('tokenAlert','error','Enter a new token or use Disconnect.'); return; }
  if (!token) { showAlert('tokenAlert','error','Token is required.'); return; }
  try {
    const res = await API.post('/discord/token', { token });
    cfg.hasToken=true;
    botInfo = await API.get('/discord/bot').catch(()=>({online:false}));
    showAlert('tokenAlert','success',`Connected as ${res.botName}`);
    setTimeout(()=>render(),800);
  } catch (e) { showAlert('tokenAlert','error',e.message); }
}

async function disconnect() {
  if (!confirm('Remove the Discord bot token and all configuration?')) return;
  try {
    await API.delete('/discord/token');
    cfg={hasToken:false}; botInfo={online:false}; render();
  } catch (e) { showAlert('tokenAlert','error',e.message); }
}

// ── Util ─────────────────────────────────────────────────────────────────────

function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = `alert alert-${type==='error'?'error':'success'} show`;
  el.textContent = msg; el.style.display = '';
  if (type === 'success') setTimeout(()=>{el.style.display='none';}, 3000);
}

init();
</script>
</body>
</html>
