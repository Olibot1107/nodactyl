<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — All Servers</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout" id="app"></div>

<!-- Migrate modal -->
<div class="modal-overlay" id="migrateModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Migrate Server</h2>
      <button class="modal-close" onclick="closeMigrateModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-muted);margin:0 0 14px">Move this server to another node. The server must be stopped. All files will be copied to the new node and the port will be reassigned. This may take a few minutes for large servers.</p>
      <div class="form-group mb-0">
        <label class="form-label">Target Node</label>
        <select class="form-input" id="m_node"></select>
      </div>
      <div class="alert alert-error mt-3" id="migrateError"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeMigrateModal()">Cancel</button>
      <button class="btn btn-primary" id="migrateSaveBtn" onclick="saveMigrate()">Migrate</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 class="modal-title" id="editModalTitle">Edit Server</h2>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error" id="editError"></div>

      <!-- Read-only info strip -->
      <div id="editInfoStrip" style="display:flex;gap:16px;flex-wrap:wrap;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:18px;font-size:12px;color:var(--text-muted)"></div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" id="e_name" placeholder="Server name">
        </div>
        <div class="form-group">
          <label class="form-label">Description <span class="text-muted">(optional)</span></label>
          <input class="form-input" id="e_desc" placeholder="What is this server for?">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Memory (MB)</label>
          <input class="form-input" id="e_memory" type="number" min="64" step="128" placeholder="512">
        </div>
        <div class="form-group">
          <label class="form-label">CPU (cores)</label>
          <input class="form-input" id="e_cpu" type="number" min="0.1" step="0.1" placeholder="1">
        </div>
        <div class="form-group">
          <label class="form-label">Disk Limit (MB) <span class="text-muted">0 = unlimited</span></label>
          <input class="form-input" id="e_disk" type="number" min="0" step="512" placeholder="0">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Startup Command <span class="text-muted">(optional)</span></label>
        <input class="form-input font-mono" id="e_startup" placeholder="Leave blank for image default">
      </div>

      <div class="form-group">
        <label class="form-label">Pre-Start Script <span class="text-muted">(optional)</span></label>
        <textarea class="form-input font-mono" id="e_prestart" rows="3" placeholder="e.g. apk add --no-cache curl"></textarea>
        <div class="form-hint">Runs every time the server starts, before the startup command.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Environment Variables</label>
        <div id="e_envList"></div>
        <button class="btn btn-ghost btn-sm mt-2" type="button" onclick="addEditEnv()">+ Add Variable</button>
      </div>

      <div class="form-group mb-0">
        <label class="form-label">Feature Pages</label>
        <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:6px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="e_enable_mods" style="width:15px;height:15px;accent-color:var(--primary)">
            Enable Mods page
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="e_enable_packages" style="width:15px;height:15px;accent-color:var(--primary)">
            Enable Packages page
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" id="editSaveBtn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
requireAdmin();
let servers = [];
let nodes = [];
let editTarget = null;
let migrateTarget = null;

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('admin-servers')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">All Servers</div>
          <div class="page-sub">Every server across all users</div>
        </div>
        <div class="flex gap-2 flex-center">
          <input type="text" class="form-input" id="searchInput" placeholder="Search by name or owner..." style="width:220px;max-width:100%" oninput="renderTable()">
          <button class="btn btn-ghost btn-sm" onclick="loadServers()">Refresh</button>
        </div>
      </div>
      <div class="content">
        <div class="grid-stats mb-6" id="statsRow"></div>
        <div class="alert alert-error" id="pageError"></div>
        <div class="alert alert-success" id="pageSuccess"></div>
        <div class="card">
          <div class="table-wrap" id="tableWrap">
            <div class="empty-state"><span class="spinner"></span></div>
          </div>
        </div>
      </div>
    </div>`;

  await loadServers();
}

async function loadServers() {
  try {
    [servers, nodes] = await Promise.all([API.get('/servers'), API.get('/nodes')]);
    renderStats();
    renderTable();
  } catch (e) {
    showErr(e.message);
  }
}

function renderStats() {
  const running = servers.filter(s => s.status === 'running').length;
  const error   = servers.filter(s => s.status === 'error').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${servers.length}</div></div>
    <div class="stat-card"><div class="stat-label">Running</div><div class="stat-value text-success">${running}</div></div>
    <div class="stat-card"><div class="stat-label">Stopped</div><div class="stat-value">${servers.filter(s=>s.status==='stopped').length}</div></div>
    <div class="stat-card"><div class="stat-label">Errors</div><div class="stat-value" style="color:${error?'var(--danger)':'inherit'}">${error}</div></div>`;
}

function renderTable() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const filtered = servers.filter(s =>
    s.name.toLowerCase().includes(q) ||
    (s.owner_name || '').toLowerCase().includes(q) ||
    (s.image || '').toLowerCase().includes(q)
  );

  document.getElementById('tableWrap').innerHTML = filtered.length ? `
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Owner</th>
          <th>Node</th>
          <th>Status</th>
          <th>RAM</th>
          <th>CPU</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(s => `
          <tr>
            <td>
              <a href="/server/${s.id}" style="color:var(--text);font-weight:600">${esc(s.name)}</a>
              ${s.description ? `<div class="text-xs text-muted">${esc(s.description)}</div>` : ''}
            </td>
            <td class="text-dim">${esc(s.owner_name || '—')}</td>
            <td>
              <div>${esc(s.node_name || '—')}</div>
              ${!s.node_online ? '<div class="text-xs text-danger">offline</div>' : ''}
            </td>
            <td>
              ${badgeHtml(s.status)}
              ${s.suspended ? '<span class="badge badge-warn" style="margin-left:4px">Suspended</span>' : ''}
            </td>
            <td class="text-dim text-sm">${s.memory_limit} MB</td>
            <td class="text-dim text-sm">${s.cpu_limit}</td>
            <td>
              <div class="flex gap-2" style="flex-wrap:wrap">
                <a href="/server/${s.id}" class="btn btn-ghost btn-xs">Open</a>
                <button class="btn btn-ghost btn-xs" onclick="openEdit('${s.id}')">Edit</button>
                ${s.status === 'running' ? `<button class="btn btn-ghost btn-xs" onclick="doAction('${s.id}','stop','${esc(s.name)}')">Stop</button>` : ''}
                ${s.status === 'stopped' && s.node_online && !s.suspended ? `<button class="btn btn-success btn-xs" onclick="doAction('${s.id}','start','${esc(s.name)}')">Start</button>` : ''}
                ${s.suspended
                  ? `<button class="btn btn-success btn-xs" onclick="setSuspend('${s.id}', false, '${esc(s.name)}')">Unsuspend</button>`
                  : `<button class="btn btn-warning btn-xs" onclick="setSuspend('${s.id}', true, '${esc(s.name)}')">Suspend</button>`}
                <button class="btn btn-ghost btn-xs" onclick="openMigrate('${s.id}')">Migrate</button>
                <button class="btn btn-danger btn-xs" onclick="deleteServer('${s.id}','${esc(s.name)}')">Delete</button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>` : `<div class="empty-state"><p>${servers.length ? 'No results match your search.' : 'No servers found.'}</p></div>`;
}

// ── Edit modal ────────────────────────────────────────────────────────────────
let editEnvCount = 0;

function addEditEnv(key = '', value = '') {
  const id = ++editEnvCount;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-top:6px';
  div.innerHTML = `
    <input type="text" class="form-input" id="eek_${id}" placeholder="KEY" value="${esc(key)}" style="flex:1;font-family:monospace">
    <span class="text-muted">=</span>
    <input type="text" class="form-input" id="eev_${id}" placeholder="value" value="${esc(value)}" style="flex:2">
    <button onclick="this.parentNode.remove()" class="btn btn-ghost btn-sm" style="flex-shrink:0;padding:5px 8px" type="button">✕</button>`;
  document.getElementById('e_envList').appendChild(div);
}

function getEditEnvVars() {
  const envs = [];
  document.querySelectorAll('[id^="eek_"]').forEach(el => {
    const id = el.id.slice(4);
    const key = el.value.trim();
    const value = document.getElementById(`eev_${id}`)?.value ?? '';
    if (key) envs.push({ key, value });
  });
  return envs;
}

function openEdit(id) {
  editTarget = servers.find(s => s.id === id);
  if (!editTarget) return;

  document.getElementById('editModalTitle').textContent = `Edit — ${editTarget.name}`;
  document.getElementById('e_name').value       = editTarget.name;
  document.getElementById('e_desc').value       = editTarget.description || '';
  document.getElementById('e_memory').value     = editTarget.memory_limit;
  document.getElementById('e_cpu').value        = editTarget.cpu_limit;
  document.getElementById('e_disk').value       = editTarget.disk_limit || 0;
  document.getElementById('e_startup').value    = editTarget.startup_command || '';
  document.getElementById('e_prestart').value   = editTarget.pre_start_script || '';
  document.getElementById('e_enable_mods').checked     = editTarget.enable_mods !== 0;
  document.getElementById('e_enable_packages').checked = editTarget.enable_packages !== 0;

  // Env vars
  document.getElementById('e_envList').innerHTML = '';
  editEnvCount = 0;
  (editTarget.env_vars || []).forEach(e => addEditEnv(e.key, e.value));

  // Info strip
  document.getElementById('editInfoStrip').innerHTML = [
    `<span><b>ID</b> <code style="font-size:11px">${esc(editTarget.id)}</code></span>`,
    `<span><b>Image</b> <code style="font-size:11px">${esc(editTarget.image)}</code></span>`,
    `<span><b>Owner</b> ${esc(editTarget.owner_name || '—')}</span>`,
    `<span><b>Node</b> ${esc(editTarget.node_name || '—')}${editTarget.node_online ? '' : ' <span style="color:var(--danger)">(offline)</span>'}</span>`,
    `<span><b>Status</b> ${editTarget.status}</span>`,
  ].join('');

  document.getElementById('editError').classList.remove('show');
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  editTarget = null;
}

async function saveEdit() {
  if (!editTarget) return;
  const errEl = document.getElementById('editError');
  errEl.classList.remove('show');

  const name     = document.getElementById('e_name').value.trim();
  const memory   = parseInt(document.getElementById('e_memory').value);
  const cpu      = parseFloat(document.getElementById('e_cpu').value);
  const disk     = parseInt(document.getElementById('e_disk').value) || 0;
  const startup  = document.getElementById('e_startup').value.trim();
  const prestart = document.getElementById('e_prestart').value;
  const desc     = document.getElementById('e_desc').value.trim();
  const enable_mods     = document.getElementById('e_enable_mods').checked ? 1 : 0;
  const enable_packages = document.getElementById('e_enable_packages').checked ? 1 : 0;

  if (!name)           { errEl.textContent = 'Name is required.'; errEl.classList.add('show'); return; }
  if (memory < 64)     { errEl.textContent = 'Memory must be at least 64 MB.'; errEl.classList.add('show'); return; }
  if (cpu < 0.1)       { errEl.textContent = 'CPU must be at least 0.1 cores.'; errEl.classList.add('show'); return; }

  const btn = document.getElementById('editSaveBtn');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;

  try {
    await API.patch(`/servers/${editTarget.id}/settings`, {
      name, description: desc, memory_limit: memory, cpu_limit: cpu, disk_limit: disk,
      startup_command: startup, pre_start_script: prestart,
      enable_mods, enable_packages,
      env_vars: getEditEnvVars(),
    });
    Object.assign(editTarget, {
      name, description: desc, memory_limit: memory, cpu_limit: cpu, disk_limit: disk,
      startup_command: startup, pre_start_script: prestart,
      enable_mods, enable_packages,
    });
    closeEditModal();
    renderTable();
    showOk('Server updated.');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.innerHTML = 'Save Changes'; btn.disabled = false;
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function doAction(id, action, name) {
  try {
    await API.post(`/servers/${id}/action`, { action });
    showOk(`"${name}" ${action === 'start' ? 'started' : 'stopped'}.`);
    await loadServers();
  } catch (e) { showErr(e.message); }
}

async function setSuspend(id, suspend, name) {
  try {
    await API.post(`/servers/${id}/${suspend ? 'suspend' : 'unsuspend'}`, {});
    showOk(`"${name}" ${suspend ? 'suspended' : 'unsuspended'}.`);
    await loadServers();
  } catch (e) { showErr(e.message); }
}

async function deleteServer(id, name) {
  if (!confirm(`Delete "${name}"? The container will be permanently removed.`)) return;
  try {
    await API.delete(`/servers/${id}`);
    showOk('Server deleted.');
    await loadServers();
  } catch (e) { showErr(e.message); }
}

// ── Migrate modal ─────────────────────────────────────────────────────────────
function openMigrate(id) {
  migrateTarget = servers.find(s => s.id === id);
  if (!migrateTarget) return;
  const errEl = document.getElementById('migrateError');
  errEl.classList.remove('show');
  const sel = document.getElementById('m_node');
  const others = nodes.filter(n => n.id !== migrateTarget.node_id);
  if (!others.length) {
    sel.innerHTML = '<option value="">No other nodes available</option>';
  } else {
    sel.innerHTML = others.map(n =>
      `<option value="${esc(n.id)}">${esc(n.name)}${n.status === 'online' ? '' : ' (offline)'}</option>`
    ).join('');
  }
  document.getElementById('migrateModal').classList.add('open');
}

function closeMigrateModal() {
  document.getElementById('migrateModal').classList.remove('open');
  migrateTarget = null;
}

async function saveMigrate() {
  if (!migrateTarget) return;
  const nodeId = document.getElementById('m_node').value;
  const errEl = document.getElementById('migrateError');
  errEl.classList.remove('show');
  if (!nodeId) { errEl.textContent = 'Select a target node.'; errEl.classList.add('show'); return; }
  const btn = document.getElementById('migrateSaveBtn');
  btn.innerHTML = '<span class="spinner"></span> Migrating…'; btn.disabled = true;
  try {
    const result = await API.post(`/servers/${migrateTarget.id}/migrate`, { node_id: nodeId });
    closeMigrateModal();
    const filesNote = result.files_transferred === false ? ' (no files — node has no data path)' : '';
    showOk(`"${migrateTarget.name}" migrated to ${result.node_name}${filesNote}.`);
    await loadServers();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  } finally {
    btn.textContent = 'Migrate'; btn.disabled = false;
  }
}

function showErr(msg) {
  const el = document.getElementById('pageError');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}
function showOk(msg) {
  const el = document.getElementById('pageSuccess');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });
document.getElementById('migrateModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeMigrateModal(); });

init();
</script>
</body>
</html>
