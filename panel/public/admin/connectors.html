<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Connectors</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .connectors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
      gap: 20px;
      align-items: start;
    }
    .connector-admin-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .connector-admin-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .connector-service-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .connector-service-icon.discord { background: #5865f2; }
    .connector-service-icon.github  { background: #24292f; }
    .connector-header-info { flex: 1; min-width: 0; }
    .connector-header-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .connector-header-sub  { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .connector-admin-body  { padding: 20px 22px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      display: inline-block; margin-right: 5px;
    }
    .status-dot.ok      { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.5); }
    .status-dot.partial { background: #f59e0b; }
    .status-dot.off     { background: var(--text-dim); }
    .toggle-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .toggle-label { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
    .toggle-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    /* toggle switch */
    .toggle-switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 99px;
      background: var(--border2); cursor: pointer; transition: background .2s;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; transition: transform .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: #5865f2; }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }
    .copy-hint {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px;
      font-family: monospace; font-size: 12px; color: var(--text-dim);
      margin-top: 4px; cursor: pointer; transition: border-color .15s;
    }
    .copy-hint:hover { border-color: var(--primary); }
    .copy-hint svg { width: 12px; height: 12px; flex-shrink: 0; opacity: .6; }
    .toggle-switch.orange input:checked + .toggle-track { background: var(--primary); }
  </style>
</head>
<body>
<div class="layout" id="app"></div>

<script src="/js/api.js"></script>
<script>
requireAdmin();

const DISCORD_ICON = `<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.015.04.038.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`;
const GITHUB_ICON = `<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>`;

let settings = {};

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('admin-connectors')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">Connectors</div>
          <div class="page-sub">Configure external service integrations</div>
        </div>
      </div>
      <div class="content">
        <div class="alert alert-error"   id="pageError"></div>
        <div class="alert alert-success" id="pageSuccess"></div>
        <div id="connectorsContent">
          <div class="empty-state"><span class="spinner"></span></div>
        </div>
      </div>
    </div>`;

  await loadSettings();
}

async function loadSettings() {
  try {
    settings = await API.get('/settings');
    render();
  } catch (e) { showErr(e.message); }
}

function makeBadge(enabled, hasId, hasSecret, hasUri) {
  const fullySet = enabled && hasId && hasSecret && hasUri;
  const partSet  = hasId || hasSecret || hasUri;
  if (fullySet) return `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:#4ade80"><span class="status-dot ok"></span>Active</span>`;
  if (partSet)  return `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:#f59e0b"><span class="status-dot partial"></span>Incomplete</span>`;
  return `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:var(--text-dim)"><span class="status-dot off"></span>Not configured</span>`;
}

function discordBadge() {
  return makeBadge(
    settings.discord_enabled === '1',
    !!(settings.discord_client_id || '').trim(),
    !!(settings.discord_client_secret || '').trim(),
    !!(settings.discord_redirect_uri || '').trim()
  );
}

function githubBadge() {
  return makeBadge(
    settings.github_enabled === '1',
    !!(settings.github_client_id || '').trim(),
    !!(settings.github_client_secret || '').trim(),
    !!(settings.github_redirect_uri || '').trim()
  );
}

function callbackUrl(provider) {
  return location.origin + '/api/connectors/' + provider + '/callback';
}

function totpBadge() {
  const on = settings.totp_enabled !== '0';
  return on
    ? `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:#4ade80"><span class="status-dot ok"></span>Enabled</span>`
    : `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:var(--text-dim)"><span class="status-dot off"></span>Disabled</span>`;
}
function passkeyBadge() {
  const on = settings.passkeys_enabled !== '0';
  return on
    ? `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:#4ade80"><span class="status-dot ok"></span>Enabled</span>`
    : `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:var(--text-dim)"><span class="status-dot off"></span>Disabled</span>`;
}

function render() {
  const discordEnabled = settings.discord_enabled === '1';
  const githubEnabled  = settings.github_enabled  === '1';
  const totpEnabled    = settings.totp_enabled    !== '0';
  const passkeysEnabled = settings.passkeys_enabled !== '0';
  const discordCb = esc(callbackUrl('discord'));
  const githubCb  = esc(callbackUrl('github'));

  document.getElementById('connectorsContent').innerHTML = `
    <div class="connectors-grid">
    <div class="connector-admin-card">
      <div class="connector-admin-header">
        <div class="connector-service-icon discord">${DISCORD_ICON}</div>
        <div class="connector-header-info">
          <div class="connector-header-name">Discord</div>
          <div class="connector-header-sub">OAuth2 — let users link their Discord account and log in with Discord</div>
        </div>
        ${discordBadge()}
      </div>
      <div class="connector-admin-body">
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Enable Discord login</div>
            <div class="toggle-sub">Shows "Login with Discord" on the sign-in page and the Connectors section in user sidebar</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="discord_enabled" ${discordEnabled ? 'checked' : ''}>
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="form-group">
          <label class="form-label">Client ID</label>
          <input type="text" class="form-input" id="discord_client_id"
            value="${esc(settings.discord_client_id || '')}"
            placeholder="1234567890123456789">
          <div class="form-hint">From your Discord application's OAuth2 page.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Client Secret</label>
          <input type="password" class="form-input" id="discord_client_secret"
            placeholder="${settings.discord_client_secret ? '(saved — leave blank to keep)' : 'Paste your client secret'}">
          <div class="form-hint">Keep this secret. Not shown after saving.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Redirect URI</label>
          <input type="text" class="form-input" id="discord_redirect_uri"
            value="${esc(settings.discord_redirect_uri || '')}"
            placeholder="${discordCb}">
          <div class="form-hint">Must be registered exactly in Discord's OAuth2 Redirects list.</div>
          <div style="margin-top:6px;font-size:12px;color:var(--text-muted)">Your callback URL:</div>
          <div class="copy-hint" onclick="copyText(this, '${discordCb}')" title="Click to copy">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span>${discordCb}</span>
          </div>
        </div>

        <div style="background:rgba(88,101,242,.08);border:1px solid rgba(88,101,242,.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:18px">
          <strong style="color:#818cf8">Setup guide:</strong><br>
          1. Go to <a href="https://discord.com/developers/applications" target="_blank" rel="noopener" style="color:#7289da">discord.com/developers</a> → New Application<br>
          2. OAuth2 tab → copy <strong>Client ID</strong> and <strong>Client Secret</strong><br>
          3. Under <strong>Redirects</strong>, add the callback URL above exactly<br>
          4. Paste credentials here and save
        </div>

        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" id="discordSaveBtn" onclick="saveDiscord()">Save</button>
          <button class="btn btn-danger btn-sm" onclick="clearDiscord()" style="opacity:.7">Clear All</button>
        </div>
      </div>
    </div>

    <div class="connector-admin-card">
      <div class="connector-admin-header">
        <div class="connector-service-icon github">${GITHUB_ICON}</div>
        <div class="connector-header-info">
          <div class="connector-header-name">GitHub</div>
          <div class="connector-header-sub">OAuth2 — let users link their GitHub account and log in with GitHub</div>
        </div>
        ${githubBadge()}
      </div>
      <div class="connector-admin-body">
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Enable GitHub login</div>
            <div class="toggle-sub">Shows "Login with GitHub" on the sign-in page and the Connectors section in user sidebar</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="github_enabled" ${githubEnabled ? 'checked' : ''}>
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="form-group">
          <label class="form-label">Client ID</label>
          <input type="text" class="form-input" id="github_client_id"
            value="${esc(settings.github_client_id || '')}"
            placeholder="Ov23liXXXXXXXXXXXXXX">
          <div class="form-hint">From your GitHub OAuth App settings.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Client Secret</label>
          <input type="password" class="form-input" id="github_client_secret"
            placeholder="${settings.github_client_secret ? '(saved — leave blank to keep)' : 'Paste your client secret'}">
          <div class="form-hint">Keep this secret. Not shown after saving.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Authorization callback URL</label>
          <input type="text" class="form-input" id="github_redirect_uri"
            value="${esc(settings.github_redirect_uri || '')}"
            placeholder="${githubCb}">
          <div class="form-hint">Must match exactly what you enter in GitHub OAuth App settings.</div>
          <div style="margin-top:6px;font-size:12px;color:var(--text-muted)">Your callback URL:</div>
          <div class="copy-hint" onclick="copyText(this, '${githubCb}')" title="Click to copy">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span>${githubCb}</span>
          </div>
        </div>

        <div style="background:rgba(36,41,47,.2);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:18px">
          <strong style="color:var(--text-dim)">Setup guide:</strong><br>
          1. Go to <strong>GitHub → Settings → Developer settings → OAuth Apps → New OAuth App</strong><br>
          2. Set <strong>Homepage URL</strong> to your panel's origin (e.g. <code style="font-size:11px">${esc(location.origin)}</code>)<br>
          3. Set <strong>Authorization callback URL</strong> to the callback URL above<br>
          4. Copy <strong>Client ID</strong> and generate a <strong>Client Secret</strong>, then paste them here and save
        </div>

        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" id="githubSaveBtn" onclick="saveGithub()">Save</button>
          <button class="btn btn-danger btn-sm" onclick="clearGithub()" style="opacity:.7">Clear All</button>
        </div>
      </div>
    </div>
    <div class="connector-admin-card">
      <div class="connector-admin-header">
        <div class="connector-service-icon" style="background:var(--primary)">
          <svg width="22" height="22" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <div class="connector-header-info">
          <div class="connector-header-name">Two-Factor Authentication</div>
          <div class="connector-header-sub">TOTP 2FA — Authy, Google Authenticator, etc.</div>
        </div>
        ${totpBadge()}
      </div>
      <div class="connector-admin-body">
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Allow users to enable 2FA</div>
            <div class="toggle-sub">When off, the 2FA option is hidden from accounts and existing 2FA is bypassed at login</div>
          </div>
          <label class="toggle-switch orange">
            <input type="checkbox" id="totp_enabled" ${totpEnabled ? 'checked' : ''}>
            <span class="toggle-track"></span>
          </label>
        </div>
        <div style="font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:18px">
          Users can set up TOTP 2FA from their account page. Each user controls their own — this toggle enables or disables the feature panel-wide.
        </div>
        <button class="btn btn-primary" id="totpSaveBtn" onclick="saveTotp()">Save</button>
      </div>
    </div>

    <div class="connector-admin-card">
      <div class="connector-admin-header">
        <div class="connector-service-icon" style="background:#6366f1">
          <svg width="22" height="22" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="8" cy="8" r="4"/><path d="M14 8h6m-3-3v6"/><path d="M2 20v-1a6 6 0 019.33-5"/></svg>
        </div>
        <div class="connector-header-info">
          <div class="connector-header-name">Passkeys</div>
          <div class="connector-header-sub">WebAuthn — biometric or device PIN login</div>
        </div>
        ${passkeyBadge()}
      </div>
      <div class="connector-admin-body">
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Allow users to register passkeys</div>
            <div class="toggle-sub">When off, the passkey login button and account registration are hidden</div>
          </div>
          <label class="toggle-switch orange">
            <input type="checkbox" id="passkeys_enabled" ${passkeysEnabled ? 'checked' : ''}>
            <span class="toggle-track"></span>
          </label>
        </div>
        <div style="font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:18px">
          Passkeys let users sign in using Face ID, Touch ID, Windows Hello, or a hardware key — no password needed. Requires a modern browser.
        </div>
        <button class="btn btn-primary" id="passkeysSaveBtn" onclick="savePasskeys()">Save</button>
      </div>
    </div>

    </div>`;
}

function copyText(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    const span = el.querySelector('span');
    const prev = span.textContent;
    span.textContent = 'Copied!';
    setTimeout(() => { span.textContent = prev; }, 1500);
  });
}

async function saveDiscord() {
  const btn = document.getElementById('discordSaveBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  btn.disabled = true;
  try {
    const body = {
      discord_enabled:      document.getElementById('discord_enabled').checked ? '1' : '0',
      discord_client_id:    document.getElementById('discord_client_id').value.trim() || '',
      discord_redirect_uri: document.getElementById('discord_redirect_uri').value.trim() || '',
    };
    const secret = document.getElementById('discord_client_secret').value;
    if (secret) body.discord_client_secret = secret;
    await API.patch('/settings', body);
    settings = await API.get('/settings');
    render();
    showOk('Discord settings saved.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save';
    btn.disabled = false;
  }
}

async function clearDiscord() {
  if (!confirm('Clear all Discord OAuth settings? Users will no longer be able to log in with Discord.')) return;
  try {
    await API.patch('/settings', { discord_enabled: '0', discord_client_id: '', discord_client_secret: '', discord_redirect_uri: '' });
    settings = await API.get('/settings');
    render();
    showOk('Discord connector cleared.');
  } catch (e) { showErr(e.message); }
}

async function saveGithub() {
  const btn = document.getElementById('githubSaveBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  btn.disabled = true;
  try {
    const body = {
      github_enabled:      document.getElementById('github_enabled').checked ? '1' : '0',
      github_client_id:    document.getElementById('github_client_id').value.trim() || '',
      github_redirect_uri: document.getElementById('github_redirect_uri').value.trim() || '',
    };
    const secret = document.getElementById('github_client_secret').value;
    if (secret) body.github_client_secret = secret;
    await API.patch('/settings', body);
    settings = await API.get('/settings');
    render();
    showOk('GitHub settings saved.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save';
    btn.disabled = false;
  }
}

async function clearGithub() {
  if (!confirm('Clear all GitHub OAuth settings? Users will no longer be able to log in with GitHub.')) return;
  try {
    await API.patch('/settings', { github_enabled: '0', github_client_id: '', github_client_secret: '', github_redirect_uri: '' });
    settings = await API.get('/settings');
    render();
    showOk('GitHub connector cleared.');
  } catch (e) { showErr(e.message); }
}

async function saveTotp() {
  const btn = document.getElementById('totpSaveBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving…'; btn.disabled = true;
  try {
    await API.patch('/settings', { totp_enabled: document.getElementById('totp_enabled').checked ? '1' : '0' });
    settings = await API.get('/settings');
    render();
    showOk('2FA setting saved.');
  } catch (e) { showErr(e.message); } finally { btn.innerHTML = 'Save'; btn.disabled = false; }
}

async function savePasskeys() {
  const btn = document.getElementById('passkeysSaveBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving…'; btn.disabled = true;
  try {
    await API.patch('/settings', { passkeys_enabled: document.getElementById('passkeys_enabled').checked ? '1' : '0' });
    settings = await API.get('/settings');
    render();
    showOk('Passkeys setting saved.');
  } catch (e) { showErr(e.message); } finally { btn.innerHTML = 'Save'; btn.disabled = false; }
}

function showErr(msg) { const el = document.getElementById('pageError'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000); }
function showOk(msg)  { const el = document.getElementById('pageSuccess'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 4000); }

init();
</script>
</body>
</html>
