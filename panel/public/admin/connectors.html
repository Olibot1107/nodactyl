<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Connectors</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .connector-admin-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 560px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .connector-admin-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .connector-service-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .connector-service-icon.discord { background: #5865f2; }
    .connector-header-info { flex: 1; min-width: 0; }
    .connector-header-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .connector-header-sub  { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .connector-admin-body  { padding: 20px 22px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      display: inline-block; margin-right: 5px;
    }
    .status-dot.ok      { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.5); }
    .status-dot.partial { background: #f59e0b; }
    .status-dot.off     { background: var(--text-dim); }
    .toggle-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .toggle-label { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
    .toggle-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    /* toggle switch */
    .toggle-switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 99px;
      background: var(--border2); cursor: pointer; transition: background .2s;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; transition: transform .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: #5865f2; }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }
    .copy-hint {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px;
      font-family: monospace; font-size: 12px; color: var(--text-dim);
      margin-top: 4px; cursor: pointer; transition: border-color .15s;
    }
    .copy-hint:hover { border-color: var(--primary); }
    .copy-hint svg { width: 12px; height: 12px; flex-shrink: 0; opacity: .6; }
  </style>
</head>
<body>
<div class="layout" id="app"></div>

<script src="/js/api.js"></script>
<script>
requireAdmin();

const DISCORD_ICON = `<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.015.04.038.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`;

let settings = {};

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('admin-connectors')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">Connectors</div>
          <div class="page-sub">Configure external service integrations</div>
        </div>
      </div>
      <div class="content">
        <div class="alert alert-error"   id="pageError"></div>
        <div class="alert alert-success" id="pageSuccess"></div>
        <div id="connectorsContent">
          <div class="empty-state"><span class="spinner"></span></div>
        </div>
      </div>
    </div>`;

  await loadSettings();
}

async function loadSettings() {
  try {
    settings = await API.get('/settings');
    render();
  } catch (e) { showErr(e.message); }
}

function statusBadge() {
  const enabled  = settings.discord_enabled === '1';
  const hasId    = !!(settings.discord_client_id || '').trim();
  const hasSecret= !!(settings.discord_client_secret || '').trim();
  const hasUri   = !!(settings.discord_redirect_uri || '').trim();
  const fullySet = enabled && hasId && hasSecret && hasUri;
  const partSet  = hasId || hasSecret || hasUri;

  if (fullySet) return `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:#4ade80"><span class="status-dot ok"></span>Active</span>`;
  if (partSet)  return `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:#f59e0b"><span class="status-dot partial"></span>Incomplete</span>`;
  return `<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;color:var(--text-dim)"><span class="status-dot off"></span>Not configured</span>`;
}

function callbackUrl() {
  return location.origin + '/api/connectors/discord/callback';
}

function render() {
  const enabled = settings.discord_enabled === '1';
  document.getElementById('connectorsContent').innerHTML = `
    <div class="connector-admin-card">
      <div class="connector-admin-header">
        <div class="connector-service-icon discord">${DISCORD_ICON}</div>
        <div class="connector-header-info">
          <div class="connector-header-name">Discord</div>
          <div class="connector-header-sub">OAuth2 — let users link their Discord account and log in with Discord</div>
        </div>
        ${statusBadge()}
      </div>
      <div class="connector-admin-body">
        <div class="toggle-row">
          <div>
            <div class="toggle-label">Enable Discord login</div>
            <div class="toggle-sub">Shows "Login with Discord" on the sign-in page and the Connectors section in user sidebar</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="discord_enabled" ${enabled ? 'checked' : ''} onchange="toggleChanged()">
            <span class="toggle-track"></span>
          </label>
        </div>

        <div class="form-group">
          <label class="form-label">Client ID</label>
          <input type="text" class="form-input" id="discord_client_id"
            value="${esc(settings.discord_client_id || '')}"
            placeholder="1234567890123456789">
          <div class="form-hint">From your Discord application's OAuth2 page.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Client Secret</label>
          <input type="password" class="form-input" id="discord_client_secret"
            placeholder="${settings.discord_client_secret ? '(saved — leave blank to keep)' : 'Paste your client secret'}">
          <div class="form-hint">Keep this secret. Not shown after saving.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Redirect URI</label>
          <input type="text" class="form-input" id="discord_redirect_uri"
            value="${esc(settings.discord_redirect_uri || '')}"
            placeholder="${esc(callbackUrl())}">
          <div class="form-hint">Must be registered exactly in Discord's OAuth2 Redirects list.</div>
          <div style="margin-top:6px;font-size:12px;color:var(--text-muted)">Your callback URL:</div>
          <div class="copy-hint" onclick="copyCallback(this)" title="Click to copy">
            <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            <span id="callbackUrlText">${esc(callbackUrl())}</span>
          </div>
        </div>

        <div style="background:rgba(88,101,242,.08);border:1px solid rgba(88,101,242,.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:18px">
          <strong style="color:#818cf8">Setup guide:</strong><br>
          1. Go to <a href="https://discord.com/developers/applications" target="_blank" rel="noopener" style="color:#7289da">discord.com/developers</a> → New Application<br>
          2. OAuth2 tab → copy <strong>Client ID</strong> and <strong>Client Secret</strong><br>
          3. Under <strong>Redirects</strong>, add the callback URL above exactly<br>
          4. Paste credentials here and save
        </div>

        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" id="discordSaveBtn" onclick="saveDiscord()">Save</button>
          <button class="btn btn-danger btn-sm" onclick="clearDiscord()" style="opacity:.7">Clear All</button>
        </div>
      </div>
    </div>`;
}

function toggleChanged() {
  // Visual feedback only — saved on Save click
}

function copyCallback(el) {
  const text = document.getElementById('callbackUrlText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const prev = el.querySelector('span').textContent;
    el.querySelector('span').textContent = 'Copied!';
    setTimeout(() => { el.querySelector('span').textContent = prev; }, 1500);
  });
}

async function saveDiscord() {
  const btn = document.getElementById('discordSaveBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  btn.disabled = true;
  try {
    const body = {
      discord_enabled:      document.getElementById('discord_enabled').checked ? '1' : '0',
      discord_client_id:    document.getElementById('discord_client_id').value.trim() || '',
      discord_redirect_uri: document.getElementById('discord_redirect_uri').value.trim() || '',
    };
    const secret = document.getElementById('discord_client_secret').value;
    if (secret) body.discord_client_secret = secret;

    await API.patch('/settings', body);

    // Refresh so status badge and placeholder update
    settings = await API.get('/settings');
    render();
    showOk('Discord settings saved.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save';
    btn.disabled = false;
  }
}

async function clearDiscord() {
  if (!confirm('Clear all Discord OAuth settings? Users will no longer be able to log in with Discord.')) return;
  try {
    await API.patch('/settings', {
      discord_enabled: '0',
      discord_client_id: '',
      discord_client_secret: '',
      discord_redirect_uri: '',
    });
    settings = await API.get('/settings');
    render();
    showOk('Discord connector cleared.');
  } catch (e) { showErr(e.message); }
}

function showErr(msg) { const el = document.getElementById('pageError'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000); }
function showOk(msg)  { const el = document.getElementById('pageSuccess'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 4000); }

init();
</script>
</body>
</html>
