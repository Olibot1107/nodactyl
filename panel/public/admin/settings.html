<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Settings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .toggle-switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 99px; cursor: pointer; transition: background .15s; }
    .toggle-track::after { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .15s; }
    .toggle-switch input:checked + .toggle-track { background: #6366f1; }
    .toggle-switch.orange input:checked + .toggle-track { background: var(--primary); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--primary); background: var(--primary-glow); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .logo-thumb {
      width: 64px; height: 64px;
      border-radius: 12px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #fff;
      overflow: hidden; flex-shrink: 0;
      border: 2px solid var(--border);
    }
  </style>
</head>
<body>
<div class="layout" id="app"></div>

<script src="/js/api.js"></script>
<script>
requireAdmin();

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('admin-settings')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">Settings</div>
          <div class="page-sub">Panel configuration</div>
        </div>
      </div>
      <div class="content">
        <div class="alert alert-error"   id="pageError"></div>
        <div class="alert alert-success" id="pageSuccess"></div>

        <div class="card" style="max-width:520px;margin-bottom:16px">
          <div class="card-title" style="margin-bottom:18px">Branding</div>

          <div class="form-group">
            <label class="form-label">Panel Name</label>
            <input type="text" class="form-input" id="panel_name" placeholder="Nodactyl">
            <div class="form-hint">Shown in the sidebar and page titles.</div>
          </div>

          <!-- Logo section -->
          <div class="form-group">
            <label class="form-label">Logo</label>

            <!-- Upload zone -->
            <div class="upload-zone" id="uploadZone">
              <input type="file" id="logoFile" accept="image/*">
              <div style="pointer-events:none">
                <div style="font-size:22px;margin-bottom:6px">📁</div>
                <div style="font-size:13px;font-weight:600;color:var(--text)">Click or drag an image here</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:3px">PNG, JPG, GIF, SVG · max 2 MB · resized to 128 px</div>
              </div>
            </div>

            <div style="display:flex;align-items:center;gap:8px;margin:10px 0">
              <div style="flex:1;height:1px;background:var(--border)"></div>
              <span style="font-size:11px;color:var(--text-muted)">or type text / emoji / URL</span>
              <div style="flex:1;height:1px;background:var(--border)"></div>
            </div>

            <input type="text" class="form-input" id="panel_logo" placeholder="N  or  🚀  or  https://…/logo.png">
            <div class="form-hint">Single character, emoji, or image URL. Uploading a file above fills this automatically.</div>
          </div>

          <!-- Preview -->
          <div style="margin:4px 0 20px">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Preview</div>
            <div style="display:flex;align-items:center;gap:14px">
              <div class="logo-thumb" id="logoPreview">N</div>
              <div>
                <div style="font-size:18px;font-weight:700" id="namePreview">Nodactyl</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:2px">sidebar logo · 32 px in production</div>
              </div>
            </div>
          </div>

          <div style="display:flex;gap:8px">
            <button class="btn btn-primary" id="saveBtn" onclick="saveSettings()">Save Changes</button>
            <button class="btn btn-ghost" onclick="clearLogo()">Clear Logo</button>
          </div>
        </div>

        <div class="card" style="max-width:520px;margin-bottom:16px">
          <div class="card-title" style="margin-bottom:6px">robots.txt</div>
          <div class="form-hint mb-3">Controls which pages search engines are allowed to crawl. Click a preset to fill the editor.</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
            <button class="btn btn-ghost btn-sm" onclick="applyRobotsTemplate('block-all')">Block all</button>
            <button class="btn btn-ghost btn-sm" onclick="applyRobotsTemplate('allow-all')">Allow all</button>
            <button class="btn btn-ghost btn-sm" onclick="applyRobotsTemplate('google-only')">Google only</button>
            <button class="btn btn-ghost btn-sm" onclick="applyRobotsTemplate('google-bing')">Google + Bing</button>
          </div>
          <textarea class="form-input font-mono" id="robots_txt" rows="6" style="resize:vertical" placeholder="User-agent: *&#10;Disallow: /"></textarea>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-primary" id="saveRobotsBtn" onclick="saveRobots()">Save robots.txt</button>
            <a href="/robots.txt" target="_blank" class="btn btn-ghost" style="font-size:12px">Preview</a>
          </div>
        </div>

        <div class="card" style="max-width:520px;margin-bottom:16px">
          <div class="card-title" style="margin-bottom:6px">API Rate Limits</div>
          <div class="form-hint mb-3">Controls how many requests each API key can make. Changes take effect within 30 seconds without restarting.</div>

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text)">Rate Limiting Enabled</div>
              <div class="form-hint" style="margin:2px 0 0">Disable to allow unlimited requests (not recommended in production)</div>
            </div>
            <label class="toggle-switch orange" style="flex-shrink:0">
              <input type="checkbox" id="api_rate_limit_enabled">
              <span class="toggle-track"></span>
            </label>
          </div>

          <div class="form-group">
            <label class="form-label">Requests per Minute <span style="color:var(--text-muted);font-weight:400">(per API key)</span></label>
            <input type="number" class="form-input" id="api_rate_limit_per_min" min="1" max="10000" placeholder="60">
            <div class="form-hint">Recommended: 60. A 429 is returned when exceeded.</div>
          </div>

          <div class="form-group">
            <label class="form-label">Requests per Hour <span style="color:var(--text-muted);font-weight:400">(per API key)</span></label>
            <input type="number" class="form-input" id="api_rate_limit_per_hour" min="1" max="1000000" placeholder="1000">
            <div class="form-hint">Recommended: 1000.</div>
          </div>

          <button class="btn btn-primary" id="saveRateLimitsBtn" onclick="saveRateLimits()">Save Rate Limits</button>
        </div>

        <div class="card" style="max-width:520px;margin-bottom:16px">
          <div class="card-title" style="margin-bottom:6px">REST API Access</div>
          <div class="form-hint mb-3">Controls whether external REST API requests (<code>/api/v1</code>) are accepted. Disabling blocks all API key requests immediately.</div>

          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text)">API Enabled</div>
              <div class="form-hint" style="margin:2px 0 0">Turn off to reject all external API key requests</div>
            </div>
            <label class="toggle-switch orange" style="flex-shrink:0">
              <input type="checkbox" id="api_enabled" checked>
              <span class="toggle-track"></span>
            </label>
          </div>
          <div style="margin-top:16px">
            <button class="btn btn-primary" id="saveApiBtn" onclick="saveApiSettings()">Save API Settings</button>
          </div>
        </div>

        <div class="card" style="max-width:520px">
          <div class="card-title mb-3">Quick links</div>
          <div style="display:flex;flex-direction:column;gap:8px;font-size:13px">
            <a href="/admin/ranks"       style="color:#a5b4fc">Manage Ranks</a>
            <a href="/admin/presets"     style="color:#a5b4fc">Manage Presets</a>
            <a href="/admin/users"       style="color:#a5b4fc">Manage Users</a>
            <a href="/nodes"             style="color:#a5b4fc">Manage Nodes</a>
            <a href="/admin/connectors"  style="color:#818cf8">Connectors (Discord &amp; GitHub OAuth)</a>
          </div>
        </div>
      </div>
    </div>`;

  await loadSettings();
  setupListeners();
}

async function loadSettings() {
  try {
    const s = await API.get('/settings');
    if (s.panel_name) document.getElementById('panel_name').value = s.panel_name;
    if (s.panel_logo) document.getElementById('panel_logo').value = s.panel_logo;
    document.getElementById('robots_txt').value = s.robots_txt ?? 'User-agent: *\nDisallow: /';
    document.getElementById('api_enabled').checked = (s.api_enabled ?? '1') !== '0';
    document.getElementById('api_rate_limit_enabled').checked = (s.api_rate_limit_enabled ?? '1') !== '0';
    document.getElementById('api_rate_limit_per_min').value  = s.api_rate_limit_per_min  ?? '60';
    document.getElementById('api_rate_limit_per_hour').value = s.api_rate_limit_per_hour ?? '1000';
    updatePreview();
  } catch (e) { showErr(e.message); }
}

async function saveApiSettings() {
  const btn = document.getElementById('saveApiBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  try {
    await API.patch('/settings', { api_enabled: document.getElementById('api_enabled').checked ? '1' : '0' });
    showOk('API settings saved.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save API Settings';
    btn.disabled = false;
  }
}

async function saveRateLimits() {
  const btn = document.getElementById('saveRateLimitsBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  try {
    const perMin  = Math.max(1, parseInt(document.getElementById('api_rate_limit_per_min').value)  || 60);
    const perHour = Math.max(1, parseInt(document.getElementById('api_rate_limit_per_hour').value) || 1000);
    await API.patch('/settings', {
      api_rate_limit_enabled: document.getElementById('api_rate_limit_enabled').checked ? '1' : '0',
      api_rate_limit_per_min:  String(perMin),
      api_rate_limit_per_hour: String(perHour),
    });
    showOk('Rate limit settings saved.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save Rate Limits';
    btn.disabled = false;
  }
}


function setupListeners() {
  document.getElementById('panel_name').addEventListener('input', updatePreview);
  document.getElementById('panel_logo').addEventListener('input', updatePreview);

  const fileInput = document.getElementById('logoFile');
  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
  });
}

async function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { showErr('Please select an image file.'); return; }
  if (file.size > 2 * 1024 * 1024) { showErr('Image must be under 2 MB.'); return; }

  try {
    const dataUrl = await resizeImage(file, 128);
    document.getElementById('panel_logo').value = dataUrl;
    updatePreview();
    showOk('Image ready — click Save Changes to apply.');
  } catch (e) {
    showErr('Could not read image: ' + e.message);
  }
}

function resizeImage(file, maxPx) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ev => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const scale = Math.min(maxPx / img.width, maxPx / img.height, 1);
        const w = Math.round(img.width  * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function isImageSrc(v) {
  return v.startsWith('http') || v.startsWith('/') || v.startsWith('data:');
}

function updatePreview() {
  const name = document.getElementById('panel_name')?.value || 'Nodactyl';
  const logo = document.getElementById('panel_logo')?.value || 'N';
  const lp   = document.getElementById('logoPreview');
  if (!lp) return;
  document.getElementById('namePreview').textContent = name;
  if (isImageSrc(logo)) {
    lp.innerHTML = `<img src="${logo}" style="width:100%;height:100%;object-fit:cover" alt="">`;
  } else {
    lp.textContent = logo || 'N';
  }
}

function clearLogo() {
  document.getElementById('panel_logo').value = '';
  document.getElementById('logoFile').value = '';
  updatePreview();
}

async function saveSettings() {
  const logoVal = document.getElementById('panel_logo').value.trim();
  if (logoVal.startsWith('data:') && logoVal.length > 300000) {
    showErr('Image is too large even after resize. Try a smaller file.');
    return;
  }
  const btn = document.getElementById('saveBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  try {
    const body = { panel_name: document.getElementById('panel_name').value.trim() };
    if (logoVal) body.panel_logo = logoVal;
    await API.patch('/settings', body);
    showOk('Settings saved. Reload the page to see changes everywhere.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save Changes';
    btn.disabled = false;
  }
}

const ROBOTS_TEMPLATES = {
  'block-all':   'User-agent: *\nDisallow: /',
  'allow-all':   'User-agent: *\nDisallow:',
  'google-only': 'User-agent: Googlebot\nDisallow:\n\nUser-agent: *\nDisallow: /',
  'google-bing': 'User-agent: Googlebot\nDisallow:\n\nUser-agent: Bingbot\nDisallow:\n\nUser-agent: *\nDisallow: /',
};

function applyRobotsTemplate(name) {
  const tpl = ROBOTS_TEMPLATES[name];
  if (tpl) document.getElementById('robots_txt').value = tpl;
}

async function saveRobots() {
  const btn = document.getElementById('saveRobotsBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  try {
    await API.patch('/settings', { robots_txt: document.getElementById('robots_txt').value });
    showOk('robots.txt saved.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save robots.txt';
    btn.disabled = false;
  }
}

function showErr(msg) { const el = document.getElementById('pageError'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000); }
function showOk(msg)  { const el = document.getElementById('pageSuccess'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 4000); }

init();
</script>
</body>
</html>
