<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Settings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--primary); background: var(--primary-glow); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .logo-thumb {
      width: 64px; height: 64px;
      border-radius: 12px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #fff;
      overflow: hidden; flex-shrink: 0;
      border: 2px solid var(--border);
    }
  </style>
</head>
<body>
<div class="layout" id="app"></div>

<script src="/js/api.js"></script>
<script>
requireAdmin();

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('admin-settings')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">Settings</div>
          <div class="page-sub">Panel configuration</div>
        </div>
      </div>
      <div class="content">
        <div class="alert alert-error"   id="pageError"></div>
        <div class="alert alert-success" id="pageSuccess"></div>

        <div class="card" style="max-width:520px;margin-bottom:16px">
          <div class="card-title" style="margin-bottom:18px">Branding</div>

          <div class="form-group">
            <label class="form-label">Panel Name</label>
            <input type="text" class="form-input" id="panel_name" placeholder="Nodactyl">
            <div class="form-hint">Shown in the sidebar and page titles.</div>
          </div>

          <!-- Logo section -->
          <div class="form-group">
            <label class="form-label">Logo</label>

            <!-- Upload zone -->
            <div class="upload-zone" id="uploadZone">
              <input type="file" id="logoFile" accept="image/*">
              <div style="pointer-events:none">
                <div style="font-size:22px;margin-bottom:6px">📁</div>
                <div style="font-size:13px;font-weight:600;color:var(--text)">Click or drag an image here</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:3px">PNG, JPG, GIF, SVG · max 2 MB · resized to 128 px</div>
              </div>
            </div>

            <div style="display:flex;align-items:center;gap:8px;margin:10px 0">
              <div style="flex:1;height:1px;background:var(--border)"></div>
              <span style="font-size:11px;color:var(--text-muted)">or type text / emoji / URL</span>
              <div style="flex:1;height:1px;background:var(--border)"></div>
            </div>

            <input type="text" class="form-input" id="panel_logo" placeholder="N  or  🚀  or  https://…/logo.png">
            <div class="form-hint">Single character, emoji, or image URL. Uploading a file above fills this automatically.</div>
          </div>

          <!-- Preview -->
          <div style="margin:4px 0 20px">
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Preview</div>
            <div style="display:flex;align-items:center;gap:14px">
              <div class="logo-thumb" id="logoPreview">N</div>
              <div>
                <div style="font-size:18px;font-weight:700" id="namePreview">Nodactyl</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:2px">sidebar logo · 32 px in production</div>
              </div>
            </div>
          </div>

          <div style="display:flex;gap:8px">
            <button class="btn btn-primary" id="saveBtn" onclick="saveSettings()">Save Changes</button>
            <button class="btn btn-ghost" onclick="clearLogo()">Clear Logo</button>
          </div>
        </div>

        <div class="card" style="max-width:520px;margin-bottom:16px">
          <div class="card-title" style="margin-bottom:6px;display:flex;align-items:center;gap:10px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#7289da"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.015.04.038.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            Discord OAuth
          </div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.6">
            Allows users to link their Discord account and log in with Discord.
            Create an app at <a href="https://discord.com/developers/applications" target="_blank" rel="noopener" style="color:#7289da">discord.com/developers</a>,
            then add your <strong>Redirect URI</strong> under OAuth2 → Redirects.
          </div>

          <div class="form-group" style="display:flex;align-items:center;gap:10px">
            <label class="form-label" style="margin:0;flex-shrink:0">Enable Discord Login</label>
            <input type="checkbox" id="discord_enabled" style="width:16px;height:16px;accent-color:#5865f2;cursor:pointer">
          </div>

          <div class="form-group">
            <label class="form-label">Client ID</label>
            <input type="text" class="form-input" id="discord_client_id" placeholder="1234567890123456789">
            <div class="form-hint">From your Discord application's OAuth2 page.</div>
          </div>
          <div class="form-group">
            <label class="form-label">Client Secret</label>
            <input type="password" class="form-input" id="discord_client_secret" placeholder="••••••••••••••••••••••••••••••••">
            <div class="form-hint">Keep this secret. Stored encrypted on disk.</div>
          </div>
          <div class="form-group">
            <label class="form-label">Redirect URI</label>
            <input type="text" class="form-input" id="discord_redirect_uri" placeholder="https://panel.example.com/api/connectors/discord/callback">
            <div class="form-hint" id="redirectUriHint">Must be registered exactly in Discord's OAuth2 Redirects. Typically: <code>https://your-domain/api/connectors/discord/callback</code></div>
          </div>

          <button class="btn btn-primary" id="discordSaveBtn" onclick="saveDiscord()">Save Discord Settings</button>
        </div>

        <div class="card" style="max-width:520px">
          <div class="card-title mb-3">Quick links</div>
          <div style="display:flex;flex-direction:column;gap:8px;font-size:13px">
            <a href="/admin/ranks"   style="color:#a5b4fc">Manage Ranks</a>
            <a href="/admin/presets" style="color:#a5b4fc">Manage Presets</a>
            <a href="/admin/users"   style="color:#a5b4fc">Manage Users</a>
            <a href="/nodes"         style="color:#a5b4fc">Manage Nodes</a>
          </div>
        </div>
      </div>
    </div>`;

  await loadSettings();
  setupListeners();
}

async function loadSettings() {
  try {
    const s = await API.get('/settings');
    if (s.panel_name) document.getElementById('panel_name').value = s.panel_name;
    if (s.panel_logo) document.getElementById('panel_logo').value = s.panel_logo;
    document.getElementById('discord_enabled').checked  = s.discord_enabled === '1';
    document.getElementById('discord_client_id').value  = s.discord_client_id || '';
    if (s.discord_client_secret) document.getElementById('discord_client_secret').placeholder = '(saved — leave blank to keep)';
    document.getElementById('discord_redirect_uri').value = s.discord_redirect_uri || '';
    updatePreview();
  } catch (e) { showErr(e.message); }
}

async function saveDiscord() {
  const btn = document.getElementById('discordSaveBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  try {
    const body = {
      discord_enabled:      document.getElementById('discord_enabled').checked ? '1' : '0',
      discord_client_id:    document.getElementById('discord_client_id').value.trim() || '',
      discord_redirect_uri: document.getElementById('discord_redirect_uri').value.trim() || '',
    };
    const secret = document.getElementById('discord_client_secret').value;
    if (secret) body.discord_client_secret = secret;
    await API.patch('/settings', body);
    if (!secret) {
      // blank placeholder only if it was already saved
      document.getElementById('discord_client_secret').value = '';
    }
    showOk('Discord settings saved.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save Discord Settings';
    btn.disabled = false;
  }
}

function setupListeners() {
  document.getElementById('panel_name').addEventListener('input', updatePreview);
  document.getElementById('panel_logo').addEventListener('input', updatePreview);

  const fileInput = document.getElementById('logoFile');
  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
  });
}

async function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { showErr('Please select an image file.'); return; }
  if (file.size > 2 * 1024 * 1024) { showErr('Image must be under 2 MB.'); return; }

  try {
    const dataUrl = await resizeImage(file, 128);
    document.getElementById('panel_logo').value = dataUrl;
    updatePreview();
    showOk('Image ready — click Save Changes to apply.');
  } catch (e) {
    showErr('Could not read image: ' + e.message);
  }
}

function resizeImage(file, maxPx) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ev => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const scale = Math.min(maxPx / img.width, maxPx / img.height, 1);
        const w = Math.round(img.width  * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function isImageSrc(v) {
  return v.startsWith('http') || v.startsWith('/') || v.startsWith('data:');
}

function updatePreview() {
  const name = document.getElementById('panel_name')?.value || 'Nodactyl';
  const logo = document.getElementById('panel_logo')?.value || 'N';
  const lp   = document.getElementById('logoPreview');
  if (!lp) return;
  document.getElementById('namePreview').textContent = name;
  if (isImageSrc(logo)) {
    lp.innerHTML = `<img src="${logo}" style="width:100%;height:100%;object-fit:cover" alt="">`;
  } else {
    lp.textContent = logo || 'N';
  }
}

function clearLogo() {
  document.getElementById('panel_logo').value = '';
  document.getElementById('logoFile').value = '';
  updatePreview();
}

async function saveSettings() {
  const logoVal = document.getElementById('panel_logo').value.trim();
  if (logoVal.startsWith('data:') && logoVal.length > 300000) {
    showErr('Image is too large even after resize. Try a smaller file.');
    return;
  }
  const btn = document.getElementById('saveBtn');
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  try {
    const body = { panel_name: document.getElementById('panel_name').value.trim() };
    if (logoVal) body.panel_logo = logoVal;
    await API.patch('/settings', body);
    showOk('Settings saved. Reload the page to see changes everywhere.');
  } catch (e) {
    showErr(e.message);
  } finally {
    btn.innerHTML = 'Save Changes';
    btn.disabled = false;
  }
}

function showErr(msg) { const el = document.getElementById('pageError'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000); }
function showOk(msg)  { const el = document.getElementById('pageSuccess'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 4000); }

init();
</script>
</body>
</html>
