<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Notifications</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout" id="app"></div>

<script src="/js/api.js"></script>
<script>
requireAdmin();

let stats = { total: 0, users: 0 };

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('admin-notifications')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">Notifications</div>
          <div class="page-sub">Broadcast push notifications to all subscribed users</div>
        </div>
      </div>
      <div class="content">
        <div class="alert alert-error"  id="pageError"></div>
        <div class="alert alert-success" id="pageSuccess"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px" id="statsRow">
          <div class="card" style="padding:20px 24px">
            <div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px">Active Subscriptions</div>
            <div style="font-size:32px;font-weight:800;color:var(--text)" id="statTotal">—</div>
          </div>
          <div class="card" style="padding:20px 24px">
            <div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px">Subscribed Users</div>
            <div style="font-size:32px;font-weight:800;color:var(--text)" id="statUsers">—</div>
          </div>
        </div>

        <div class="card" style="padding:24px">
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:18px;text-transform:uppercase;letter-spacing:.05em">Send Broadcast</div>

          <div style="display:flex;flex-direction:column;gap:14px;max-width:560px">
            <div>
              <label class="form-label">Title</label>
              <input class="input" id="notifTitle" type="text" placeholder="e.g. Scheduled maintenance in 10 minutes" maxlength="80">
            </div>
            <div>
              <label class="form-label">Message</label>
              <textarea class="input" id="notifBody" rows="3" placeholder="e.g. The panel will be offline briefly for updates." maxlength="200" style="resize:vertical"></textarea>
            </div>
            <div>
              <label class="form-label">Link (optional)</label>
              <input class="input" id="notifUrl" type="text" placeholder="/dashboard" maxlength="200">
              <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Must start with /. Clicking the notification will open this page.</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
              <button class="btn btn-primary" id="sendBtn" onclick="sendBroadcast()">Send Notification</button>
              <span style="font-size:12px;color:var(--text-muted)" id="sendHint"></span>
            </div>
          </div>
        </div>

        <div class="card" style="padding:20px 24px;margin-top:16px" id="historyCard" style="display:none">
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em">Recent Broadcasts</div>
          <div id="historyList"></div>
        </div>
      </div>
    </div>`;

  loadStats();
}

async function loadStats() {
  try {
    stats = await API.get('/push/stats');
    document.getElementById('statTotal').textContent = stats.total;
    document.getElementById('statUsers').textContent = stats.users;
    if (stats.total === 0) {
      document.getElementById('sendHint').textContent = 'No users have subscribed to push notifications yet.';
    }
  } catch {
    document.getElementById('statTotal').textContent = '?';
    document.getElementById('statUsers').textContent = '?';
  }
}

const history = [];

function addHistory(title, body, result) {
  history.unshift({ title, body, result, at: new Date() });
  const el = document.getElementById('historyCard');
  el.style.display = '';
  document.getElementById('historyList').innerHTML = history.map(h => `
    <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;color:var(--text)">${esc(h.title)}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${esc(h.body)}</div>
      </div>
      <div style="text-align:right;white-space:nowrap;font-size:12px">
        <span style="color:#22c55e;font-weight:600">${h.result.sent} sent</span>
        ${h.result.failed ? `<span style="color:#ef4444;margin-left:6px">${h.result.failed} failed</span>` : ''}
        <div style="color:var(--text-muted);margin-top:2px">${h.at.toLocaleTimeString()}</div>
      </div>
    </div>`).join('');
}

async function sendBroadcast() {
  const title = document.getElementById('notifTitle').value.trim();
  const body  = document.getElementById('notifBody').value.trim();
  const urlRaw = document.getElementById('notifUrl').value.trim();
  const url   = urlRaw && urlRaw.startsWith('/') ? urlRaw : '/dashboard';

  setError('');
  setSuccess('');

  if (!title) return setError('Title is required.');
  if (!body)  return setError('Message is required.');

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  document.getElementById('sendHint').textContent = '';

  try {
    const result = await API.post('/push/broadcast', { title, body, url });
    setSuccess(`Sent to ${result.sent} subscription${result.sent !== 1 ? 's' : ''}${result.failed ? ` (${result.failed} failed)` : ''}.`);
    addHistory(title, body, result);
    document.getElementById('notifTitle').value = '';
    document.getElementById('notifBody').value  = '';
    document.getElementById('notifUrl').value   = '';
    await loadStats();
  } catch (err) {
    setError(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Notification';
  }
}

function setError(msg) {
  const el = document.getElementById('pageError');
  el.textContent = msg;
  el.style.display = msg ? '' : 'none';
}

function setSuccess(msg) {
  const el = document.getElementById('pageSuccess');
  el.textContent = msg;
  el.style.display = msg ? '' : 'none';
}

init();
</script>
</body>
</html>
