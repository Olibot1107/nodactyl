<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl - Server</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout" id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js?v=2"></script>
<script>
requireAuth();

const user = getUser();
const serverId = location.pathname.split('/server/')[1];
let server = null;
let socket = null;
let statsInterval = null;
let logsSubscribed = false;
let logsTailDone = false;
let isTerminalMode = false;
let liveScroll = true;

const UI = {
  arrowLeft: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>',
  folder: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path d="M3 6.5A2.5 2.5 0 015.5 4H9l2 2h7.5A2.5 2.5 0 0121 8.5v8A2.5 2.5 0 0118.5 19h-13A2.5 2.5 0 013 16.5v-10z"/></svg>',
  play: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7z"/></svg>',
  rotate: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-2.64-6.36"/><path d="M21 3v6h-6"/></svg>',
  stop: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>',
  zap: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>',
  trash: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5M14 11v5"/></svg>',
  terminal: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 17l6-6-6-6"/><path d="M12 19h8"/></svg>',
  clear: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>',
  termMode: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 9l4 3-4 3"/><path d="M13 15h4"/></svg>',
  copy: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>',
  live: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>',
  upload: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>',
  download: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  link: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>',
  edit: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
};

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('dashboard')}
    <div class="main">
      <div class="topbar" id="topbar">
        <div class="flex-center gap-2">
          <a class="topbar-link" href="/dashboard">${UI.arrowLeft} Dashboard</a>
          <span style="color:var(--border2);font-size:16px;line-height:1">›</span>
          <span class="page-title">Loading…</span>
        </div>
      </div>
      <div id="serverNavSlot"></div>
      <div class="content" id="content">
        <div class="empty-state"><span class="spinner"></span></div>
      </div>
    </div>`;

  try {
    server = await API.get(`/servers/${serverId}`);
    if (server.status === 'running' && server.terminal_mode) isTerminalMode = true;
    document.getElementById('serverNavSlot').innerHTML = renderServerNav(serverId, 'console');
    render();
    setupConsoleScrollDetect();
    connectSocket();
    startStats();
    if (server.started_at) startUptimeTicker();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><p>${esc(e.message)}</p></div>`;
  }
}

function topbarHtml() {
  return `
    <div class="flex-center gap-2">
      <a class="topbar-link" href="/dashboard">${UI.arrowLeft} Dashboard</a>
      <span style="color:var(--border2);font-size:16px;line-height:1">›</span>
      <span class="page-title">${esc(server.name)}</span>
    </div>
    <div class="flex-center gap-2">
      ${statusBadge(server.status)}
      ${server.suspended ? '<span class="badge badge-warn">Suspended</span>' : ''}
      ${nodeStatusBadge()}
    </div>`;
}

function render() {
  document.getElementById('topbar').innerHTML = topbarHtml();

  document.getElementById('content').innerHTML = `
    <div class="action-bar">
      <div class="action-bar-left">
        <span class="chip font-mono" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(server.image)}">${esc(server.image)}</span>
        <span class="text-muted" style="font-size:11.5px">on ${esc(server.node_name || 'unknown node')}</span>
      </div>
      <div class="flex-center gap-2">
        <div class="service-controls" id="controls">${controlsHtml()}</div>
        ${(user?.role === 'admin' || server?.owner_id === user?.id) && !(server.suspended && user?.role !== 'admin') ? `<div style="width:1px;height:20px;background:var(--border);flex-shrink:0"></div><button class="btn btn-danger btn-sm" onclick="deleteServer()">${UI.trash} Delete</button>` : ''}
      </div>
    </div>

    ${server.suspended ? `<div class="alert alert-error show" style="margin-bottom:16px">This server has been suspended by an administrator. It cannot be started until unsuspended.</div>` : ''}
    <div class="grid-stats mb-4" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">CPU</div>
        <div class="stat-value" id="statCpu">0.0%</div>
        <div class="stat-sub">${server.cpu_limit} core limit</div>
        <div class="bar-wrap"><div class="bar-fill" id="cpuBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Memory</div>
        <div class="stat-value" id="statMem">0 MB</div>
        <div class="stat-sub">of ${server.memory_limit} MB</div>
        <div class="bar-wrap"><div class="bar-fill" id="memBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Disk</div>
        <div class="stat-value" id="statDisk">—</div>
        <div class="stat-sub">${server.disk_limit > 0 ? `of ${server.disk_limit} MB` : 'unlimited'}</div>
        <div class="bar-wrap"><div class="bar-fill" id="diskBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net ↓ Rx</div>
        <div class="stat-value" id="statNetRx">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net ↑ Tx</div>
        <div class="stat-value" id="statNetTx">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Uptime</div>
        <div class="stat-value" id="statUptime">${server.started_at ? '—' : '<span style="color:var(--text-muted)">Offline</span>'}</div>
      </div>
    </div>

    <div class="service-grid">
      <div class="card console-card">
        <div class="card-header">
          <div class="card-title">${UI.terminal} Console <span id="termModeBadge" style="display:none;font-size:10px;font-weight:600;background:var(--primary);color:#fff;border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle;letter-spacing:.04em">TERMINAL MODE</span></div>
          <div class="console-header-actions">
            <button class="btn btn-ghost btn-sm" id="terminalModeBtn" onclick="doTerminal()">${UI.termMode} Terminal</button>
            <button class="btn btn-ghost btn-sm" onclick="copyConsole()" title="Copy all output">${UI.copy} Copy</button>
            <button class="btn btn-ghost btn-sm" onclick="downloadLogs()" title="Download logs as .txt">${UI.download} Download</button>
            <button class="btn btn-ghost btn-sm" onclick="clearConsole()">${UI.clear} Clear</button>
            ${(user?.role === 'admin' || server?.owner_id === user?.id || (Array.isArray(server?.member_permissions) && server.member_permissions.includes('sharelog'))) ? `<button class="btn btn-ghost btn-sm" onclick="openLogShareModal()" title="Share logs">${UI.upload} Share</button>` : ''}
          </div>
        </div>
        <div class="console-wrap" id="consoleOut"></div>
        <div class="console-input-wrap">
          <span class="console-prompt" id="consolePrompt">$</span>
          <input type="text" class="console-input" id="cmdInput" placeholder="${server.status === 'running' ? 'Enter command...' : 'Start the server to send commands'}" ${server.status !== 'running' ? 'disabled' : ''}>
          <button class="btn btn-ghost btn-sm" id="ctrlCBtn" onclick="sendSignal()" style="display:none" title="Send Ctrl+C (interrupt)">^C</button>
          <button class="btn btn-primary btn-sm" id="sendBtn" onclick="sendCommand()" ${server.status !== 'running' ? 'disabled' : ''}>Send</button>
        </div>
      </div>

      <aside class="service-side">
        ${server.suspended && user?.role !== 'admin' ? `
        <div class="quick-card" style="opacity:0.45;cursor:not-allowed;pointer-events:none">
          <span class="quick-icon">${UI.folder}</span>
          <span>
            <span class="quick-title">Files</span>
            <span class="quick-sub">Unavailable while suspended.</span>
          </span>
        </div>` : `
        <a href="/server/${serverId}/files" class="quick-card">
          <span class="quick-icon">${UI.folder}</span>
          <span>
            <span class="quick-title">Files</span>
            <span class="quick-sub">Browse and edit the filesystem, even when stopped.</span>
          </span>
        </a>`}

        <div class="card">
          <div class="card-title mb-4">Details</div>
          <div class="detail-list">
            <div class="detail-row">
              <div class="detail-label">Server ID</div>
              <div class="detail-value" style="display:flex;align-items:center;gap:6px;min-width:0">
                <span class="font-mono" style="font-size:11px;word-break:break-all;flex:1">${esc(server.id)}</span>
                <button class="btn btn-ghost btn-xs" style="flex-shrink:0" onclick="copyText('${esc(server.id)}',this)" title="Copy ID">${UI.copy}</button>
              </div>
            </div>
            <div class="detail-row">
              <div class="detail-label">Node</div>
              <div class="detail-value">${esc(server.node_name || 'Unknown')} ${nodeStatusBadge()}</div>
            </div>
            ${server.description ? `
            <div class="detail-row">
              <div class="detail-label">Description</div>
              <div class="detail-value">${esc(server.description)}</div>
            </div>` : ''}
            <div class="detail-row">
              <div class="detail-label">Created</div>
              <div class="detail-value">${new Date(server.created_at * 1000).toLocaleString()}</div>
            </div>
          </div>
        </div>

        ${server.port_mappings?.length ? (() => {
          const pm = server.port_mappings[0];
          const port = pm.hostPort;
          const tmpl = server.node_ip_address || '';
          const addr = tmpl
            ? (tmpl.includes('{port}') ? tmpl.replace(/\{port\}/g, String(port)) : tmpl + ':' + port)
            : String(port);
          const copyVal = tmpl ? addr : String(port);
          const label = tmpl ? 'Copy Address' : 'Copy Port';
          return `
        <div class="card">
          <div class="card-title mb-4">Connection Info</div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="font-mono" style="font-size:${addr.length > 20 ? '16px' : '22px'};font-weight:700;color:var(--primary);letter-spacing:-0.5px;word-break:break-all">${esc(addr)}</span>
            <div style="font-size:12px;color:var(--text-dim);line-height:1.5">
              ${esc((pm.protocol || 'tcp').toUpperCase())} · port ${esc(String(port))}
              <br><button class="btn btn-ghost btn-xs mt-1" onclick="copyText('${esc(copyVal)}', this)">${label}</button>
            </div>
          </div>
        </div>`;
        })() : ''}

      </aside>
    </div>`;

  document.getElementById('cmdInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); sendCommand(); }
    if (e.key === 'c' && e.ctrlKey) { e.preventDefault(); sendSignal(); }
  });
}

function statusBadge(status) {
  return badgeHtml(status).replace('<span ', '<span data-status-badge ');
}

function nodeStatusBadge() {
  return badgeHtml(server.node_online ? 'online' : 'offline').replace('<span ', '<span data-node-badge ');
}

function updateLiveBits() {
  document.querySelectorAll('[data-status-badge]').forEach(el => { el.outerHTML = statusBadge(server.status); });
  document.querySelectorAll('[data-node-badge]').forEach(el => { el.outerHTML = nodeStatusBadge(); });
  const tb = document.getElementById('topbar');
  if (tb) tb.innerHTML = topbarHtml();

  const controls = document.getElementById('controls');
  if (controls) controls.innerHTML = controlsHtml();

  const input = document.getElementById('cmdInput');
  const sendBtn = document.getElementById('sendBtn');
  const ctrlCBtn = document.getElementById('ctrlCBtn');
  const prompt = document.getElementById('consolePrompt');
  const running = server.status === 'running';
  if (input) {
    input.disabled = !running;
    input.placeholder = running
      ? (isTerminalMode ? 'Enter command (cd persists, Ctrl+C interrupts)...' : 'Enter command...')
      : 'Start the server to send commands';
  }
  if (sendBtn) sendBtn.disabled = !running;
  if (ctrlCBtn) ctrlCBtn.style.display = running && isTerminalMode ? '' : 'none';
  if (prompt) prompt.textContent = isTerminalMode ? '>' : '$';

  if (server.status !== 'running') {
    updateStats({ cpu: 0, memory: 0, memoryLimit: server.memory_limit });
  }

  const termBtn = document.getElementById('terminalModeBtn');
  const termBadge = document.getElementById('termModeBadge');
  const s2 = server.status;
  const canTerm = s2 === 'stopped' && server.node_online && !server.suspended;
  if (termBtn) termBtn.disabled = !canTerm;
  if (termBadge) termBadge.style.display = isTerminalMode && s2 === 'running' ? '' : 'none';
}

function controlsHtml() {
  const s = server.status;
  const offline = !server.node_online;
  const busy = s === 'installing' || s === 'stopping' || s === 'starting';
  const running = s === 'running';
  const susp = !!server.suspended;
  return `
    <button class="btn btn-success btn-sm" onclick="doAction('start')" ${running || busy || offline || susp ? 'disabled' : ''}>${UI.play} Start</button>
    <button class="btn btn-warning btn-sm" onclick="doAction('restart')" ${!running || busy || offline ? 'disabled' : ''}>${UI.rotate} Restart</button>
    <button class="btn btn-ghost btn-sm" onclick="doAction('stop')" ${!running || busy || offline ? 'disabled' : ''}>${UI.stop} Stop</button>
    <button class="btn btn-danger btn-sm" onclick="doAction('kill')" ${!running || busy || offline ? 'disabled' : ''}>${UI.zap} Kill</button>`;
}

const MAX_LOG_LINES = 1500;
let _logQueue = [];
let _logRafPending = false;

function appendLog(raw, isErr) {
  // Normalize \r\n → \n; bare \r (progress overwrites) → keep final segment
  const normalized = String(raw).replace(/\r\n/g, '\n');
  const newlines = normalized.split('\n');
  for (let i = 0; i < newlines.length; i++) {
    if (i === newlines.length - 1 && newlines[i] === '') continue;
    const parts = newlines[i].split('\r');
    const line = parts[parts.length - 1];
    _logQueue.push({ line, isErr: !!isErr });
  }
  if (!_logRafPending) {
    _logRafPending = true;
    requestAnimationFrame(_flushLogs);
  }
}

function _flushLogs() {
  _logRafPending = false;
  const el = document.getElementById('consoleOut');
  if (!el || !_logQueue.length) return;

  const nearBottom = el.scrollHeight - el.clientHeight - el.scrollTop < 150;
  const batch = _logQueue.splice(0);

  const frag = document.createDocumentFragment();
  for (const { line, isErr } of batch) {
    const div = document.createElement('div');
    div.className = 'log-line' + (isErr ? ' stderr' : '');
    div.innerHTML = ansiToHtml(line);
    frag.appendChild(div);
  }
  el.appendChild(frag);

  // Prune oldest lines to stay under cap
  while (el.childElementCount > MAX_LOG_LINES) el.removeChild(el.firstChild);

  if (nearBottom || liveScroll) el.scrollTop = el.scrollHeight;
  if (_logQueue.length) { _logRafPending = true; requestAnimationFrame(_flushLogs); }
}

function copyConsole() {
  const el = document.getElementById('consoleOut');
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).catch(() => {});
}

function downloadLogs() {
  const el = document.getElementById('consoleOut');
  if (!el || !el.innerText.trim()) return;
  const blob = new Blob([el.innerText], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
  a.href = url;
  a.download = `${(server?.name || 'server').replace(/[^a-z0-9]/gi, '-')}-${date}.txt`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function clearConsole() {
  _logQueue = [];
  const el = document.getElementById('consoleOut');
  if (el) el.innerHTML = '';
}

function toggleLiveScroll() {
  liveScroll = !liveScroll;
  const btn = document.getElementById('liveScrollBtn');
  if (btn) {
    btn.style.color = liveScroll ? 'var(--success,#22c55e)' : '';
    btn.title = liveScroll ? 'Live scroll ON — click to pause' : 'Live scroll OFF — click to follow';
  }
  if (liveScroll) {
    const el = document.getElementById('consoleOut');
    if (el) el.scrollTop = el.scrollHeight;
  }
}

function setupConsoleScrollDetect() {
  const el = document.getElementById('consoleOut');
  if (!el) return;
  el.addEventListener('scroll', () => {
    const atBottom = el.scrollHeight - el.clientHeight - el.scrollTop < 150;
    if (!atBottom && liveScroll) {
      liveScroll = false;
      const btn = document.getElementById('liveScrollBtn');
      if (btn) {
        btn.style.color = '';
        btn.title = 'Live scroll OFF — click to follow';
      }
    }
  }, { passive: true });
}

function connectSocket() {
  socket = io({ auth: { token: getToken() } });

  socket.on('connect', () => {
    logsSubscribed = false;
    if (server.status === 'running') {
      if (logsTailDone) {
        // Already showed startup history — just catch a few lines missed during reconnect
        logsSubscribed = true;
        socket.emit('subscribe-logs', { serverId, tail: 15 });
      } else {
        subscribeToLogs();
      }
    }
  });

  socket.on('log', ({ serverId: sid, line }) => {
    if (sid === serverId) appendLog(line);
  });

  socket.on('server-status', ({ serverId: sid, status }) => {
    if (sid !== serverId) return;
    server.status = status;
    if (status === 'running') { server.started_at = Math.floor(Date.now() / 1000); startUptimeTicker(); }
    else if (status === 'stopped' || status === 'error') { server.started_at = null; stopUptimeTicker(); isTerminalMode = false; }
    updateLiveBits();

    if (status === 'running') {
      clearConsole();
      if (isTerminalMode) {
        appendLog('\x1b[36m[Nodactyl] Terminal mode active\x1b[0m');
        // Send a newline after sh has had time to start so the prompt appears immediately
        setTimeout(() => API.post(`/servers/${serverId}/stdin`, { data: '\n' }).catch(() => {}), 1200);
      }
      logsTailDone = false;
      logsSubscribed = false;
      // Small delay so the daemon's activeContainers map is always up-to-date
      // before subscribe-logs fires, regardless of panel-DB update timing.
      setTimeout(subscribeToLogs, 800);
    }
    if (status !== 'running' && logsSubscribed) {
      socket.emit('unsubscribe-logs', { serverId });
      logsSubscribed = false;
      logsTailDone = false;
    }
  });

  socket.on('stats', (data) => {
    if (data.serverId !== serverId) return;
    updateStats(data);
  });

  socket.on('node-status', ({ nodeId, status }) => {
    if (nodeId !== server.node_id) return;
    const wasOnline = server.node_online;
    server.node_online = status === 'online';
    if (wasOnline && !server.node_online && document.hidden && Notification.permission === 'granted') {
      const n = new Notification(`Node offline — ${server.name}`, { body: 'The hosting node went offline.', icon: '/favicon.svg' });
      n.onclick = () => { window.focus(); n.close(); };
    }
    updateLiveBits();
  });
}

function subscribeToLogs() {
  if (logsSubscribed || !socket?.connected) return;
  logsSubscribed = true;
  const tail = logsTailDone ? 0 : 100;
  logsTailDone = true;
  socket.emit('subscribe-logs', { serverId, tail });
}

async function sendCommand() {
  const inp = document.getElementById('cmdInput');
  const cmd = inp?.value.trim();
  if (!cmd || server.status !== 'running') return;
  inp.value = '';
  if (isTerminalMode) {
    // Send as raw stdin — bash (PID 1) receives it, echoes it, and executes it
    // cd persists, running processes receive signals properly
    try { await API.post(`/servers/${serverId}/stdin`, { data: cmd + '\n' }); }
    catch (e) { appendLog(`[Error: ${e.message}]`, true); }
  } else {
    appendLog(`$ ${cmd}`);
    socket.emit('send-command', { serverId, command: cmd });
  }
}

async function sendSignal() {
  if (server.status !== 'running') return;
  appendLog('$ ^C');
  // Write \x03 (ETX) to the container's TTY stdin — the terminal discipline converts
  // it to SIGINT for the foreground process group, same as pressing Ctrl+C in a terminal.
  // This interrupts the current command without sending kill signals to the whole container.
  try { await API.post(`/servers/${serverId}/stdin`, { data: '\x03' }); }
  catch (e) { appendLog(`[Error: ${e.message}]`, true); }
}

async function doAction(action) {
  // Console is cleared by the server-status:'running' event handler (covers start, restart, crash-recovery)
  // Optimistic status — disables buttons immediately
  const expectStopped = new Set(['stop', 'kill', 'sigint', 'sigterm']);
  if (expectStopped.has(action)) server.status = 'stopping';
  else if (action === 'restart') server.status = 'stopping';
  else if (action === 'start') server.status = 'starting';
  updateLiveBits();

  try {
    await API.post(`/servers/${serverId}/action`, { action });
    // Panel responds immediately; Socket.IO drives actual status updates
  } catch (e) {
    try { const s = await API.get(`/servers/${serverId}`); server.status = s.status; } catch {}
    updateLiveBits();
    appendLog(`[Error: ${e.message}]`, true);
  }
}

async function doTerminal() {
  if (server.status !== 'stopped') return;
  server.status = 'starting';
  isTerminalMode = true;
  updateLiveBits();
  try {
    await API.post(`/servers/${serverId}/action`, { action: 'start', terminalMode: true });
  } catch (e) {
    isTerminalMode = false;
    try { const s = await API.get(`/servers/${serverId}`); server.status = s.status; } catch {}
    updateLiveBits();
    appendLog(`[Error: ${e.message}]`, true);
  }
}

async function deleteServer() {
  if (!confirm(`Delete "${server.name}"? This will stop and remove the container.`)) return;
  try {
    await API.delete(`/servers/${serverId}`);
    window.location.href = '/dashboard';
  } catch (e) {
    alert(e.message);
  }
}

let uptimeInterval = null;

function fmtUptime(secs) {
  if (!secs || secs < 0) return '0s';
  const d = Math.floor(secs / 86400), h = Math.floor((secs % 86400) / 3600),
        m = Math.floor((secs % 3600) / 60), s = secs % 60;
  if (d) return `${d}d ${h}h ${m}m`;
  if (h) return `${h}h ${m}m ${s}s`;
  if (m) return `${m}m ${s}s`;
  return `${s}s`;
}

function startUptimeTicker() {
  stopUptimeTicker();
  if (!server.started_at) return;
  function tick() {
    const el = document.getElementById('statUptime');
    if (!el) return;
    el.textContent = fmtUptime(Math.floor(Date.now() / 1000) - server.started_at);
  }
  tick();
  uptimeInterval = setInterval(tick, 1000);
}

function stopUptimeTicker() {
  if (uptimeInterval) { clearInterval(uptimeInterval); uptimeInterval = null; }
  const el = document.getElementById('statUptime');
  if (el) el.innerHTML = '<span style="font-size:13px;color:var(--text-muted)">Offline</span>';
}

async function startStats() {
  async function tick() {
    if (server.status !== 'running' || !server.node_online) return;
    try {
      const stats = await API.get(`/servers/${serverId}/stats`);
      updateStats(stats);
    } catch {}
  }
  tick();
  statsInterval = setInterval(tick, 5000);
}

function fmtBytes(bytes) {
  if (bytes == null) return '—';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}

function updateStats(stats) {
  const cpuEl = document.getElementById('statCpu');
  const memEl = document.getElementById('statMem');
  const diskEl = document.getElementById('statDisk');
  const cpuBar = document.getElementById('cpuBar');
  const memBar = document.getElementById('memBar');
  const diskBar = document.getElementById('diskBar');
  if (!cpuEl) return;

  const cpu = parseFloat(stats.cpu || 0);
  const mem = parseFloat(stats.memory || 0);
  const memLimit = parseFloat(stats.memoryLimit || server.memory_limit);
  const memPct = memLimit > 0 ? (mem / memLimit) * 100 : 0;

  const diskUsedBytes = stats.diskUsed != null ? stats.diskUsed : null;
  const diskLimitMb = stats.diskLimit || server.disk_limit || 0;
  const diskUsedMb = diskUsedBytes != null ? diskUsedBytes / 1024 / 1024 : null;
  const diskPct = diskLimitMb > 0 && diskUsedMb != null ? (diskUsedMb / diskLimitMb) * 100 : 0;

  cpuEl.textContent = cpu.toFixed(1) + '%';
  memEl.textContent = mem.toFixed(0) + ' MB';
  if (diskEl) diskEl.textContent = diskUsedMb != null ? fmtBytes(diskUsedBytes) : '—';

  if (cpuBar) {
    cpuBar.style.width = Math.min(cpu, 100) + '%';
    cpuBar.className = `bar-fill${cpu > 80 ? ' danger' : cpu > 60 ? ' warn' : ''}`;
  }
  if (memBar) {
    memBar.style.width = Math.min(memPct, 100) + '%';
    memBar.className = `bar-fill${memPct > 80 ? ' danger' : memPct > 60 ? ' warn' : ''}`;
  }
  if (diskBar) {
    diskBar.style.width = Math.min(diskPct, 100) + '%';
    diskBar.className = `bar-fill${diskPct > 80 ? ' danger' : diskPct > 60 ? ' warn' : ''}`;
  }

  const rxEl = document.getElementById('statNetRx');
  const txEl = document.getElementById('statNetTx');
  if (rxEl) rxEl.textContent = stats.network ? fmtBytes(stats.network.rx) : '—';
  if (txEl) txEl.textContent = stats.network ? fmtBytes(stats.network.tx) : '—';
}

window.addEventListener('beforeunload', () => {
  clearInterval(statsInterval);
  if (socket && logsSubscribed) socket.emit('unsubscribe-logs', { serverId });
});

// ── Log sharing ───────────────────────────────────────────────────────────────

function openLogShareModal() {
  let modal = document.getElementById('logShareModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'logShareModal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(2px)';
    modal.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border2);border-radius:14px;width:760px;max-width:94vw;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7)">

        <div style="padding:16px 18px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
          <div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px">${UI.upload} Share Logs</div>
          <button onclick="document.getElementById('logShareModal').remove()" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;line-height:1;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='none'">&times;</button>
        </div>

        <div style="padding:0 18px 16px;flex-shrink:0">
          <input id="logShareLabel" class="form-input" placeholder="Label (optional)" style="width:100%;margin-bottom:8px">
          <select id="logShareTtl" class="form-select" style="width:100%;margin-bottom:8px">
            <option value="3600">Expires in 1 hour</option>
            <option value="21600">Expires in 6 hours</option>
            <option value="86400">Expires in 1 day</option>
            <option value="259200">Expires in 3 days</option>
            <option value="604800" selected>Expires in 7 days (max)</option>
          </select>
          <button class="btn btn-primary" onclick="uploadLogShare()" id="uploadLogBtn" style="width:100%">${UI.upload} Share current console output</button>
          <div id="logShareError" style="display:none;margin-top:8px;font-size:12px;color:var(--danger)"></div>
          <div id="logShareSuccess" style="display:none;margin-top:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:500" id="logShareExpiry">Link ready</div>
            <div style="display:flex;gap:6px">
              <input id="logShareUrl" class="form-input" readonly style="flex:1;font-size:11.5px;font-family:monospace;background:var(--bg2)">
              <button class="btn btn-ghost btn-sm" onclick="copyLogUrl(this)" style="flex-shrink:0">${UI.copy}</button>
              <a id="logShareOpenBtn" href="#" target="_blank" class="btn btn-ghost btn-sm" style="flex-shrink:0">${UI.link}</a>
            </div>
          </div>
        </div>

        <div style="flex:1;overflow-y:auto;border-top:1px solid var(--border);padding:14px 18px">
          <div style="font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text-dim);margin-bottom:10px" id="logShareListHeader">SHARES</div>
          <div id="logShareList"><div style="font-size:12.5px;color:var(--text-muted)">Loading…</div></div>
        </div>

      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  }
  loadLogShares();
}

async function uploadLogShare() {
  const consoleEl = document.getElementById('consoleOut');
  const content = consoleEl ? consoleEl.innerText : '';
  const errEl = document.getElementById('logShareError');
  const successEl = document.getElementById('logShareSuccess');
  errEl.style.display = 'none';
  if (!content.trim()) { errEl.textContent = 'Console is empty — nothing to share.'; errEl.style.display = ''; return; }
  const label = document.getElementById('logShareLabel').value.trim() || null;
  const ttl_seconds = parseInt(document.getElementById('logShareTtl').value) || 604800;
  const btn = document.getElementById('uploadLogBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Uploading…';
  successEl.style.display = 'none';
  try {
    const result = await API.post('/servers/' + serverId + '/log-shares', { content, label, ttl_seconds });
    const url = location.origin + '/logs/' + result.id;
    document.getElementById('logShareUrl').value = url;
    document.getElementById('logShareOpenBtn').href = url;
    const expiryEl = document.getElementById('logShareExpiry');
    if (expiryEl) expiryEl.textContent = 'Link ready — ' + document.getElementById('logShareTtl').options[document.getElementById('logShareTtl').selectedIndex].text.toLowerCase();
    successEl.style.display = '';
    document.getElementById('logShareLabel').value = '';
    loadLogShares();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = '';
  } finally {
    btn.disabled = false;
    btn.innerHTML = UI.upload + ' Share current console output';
  }
}

function copyLogUrl(btn) {
  const url = document.getElementById('logShareUrl').value;
  navigator.clipboard.writeText(url).catch(() => {});
  const prev = btn.innerHTML;
  btn.textContent = '✓';
  setTimeout(() => { btn.innerHTML = prev; }, 1500);
}

async function loadLogShares() {
  const el = document.getElementById('logShareList');
  const hdr = document.getElementById('logShareListHeader');
  if (!el) return;
  try {
    const shares = await API.get('/servers/' + serverId + '/log-shares');
    if (hdr) hdr.textContent = 'SHARES (' + shares.length + '/5)';
    if (!shares.length) {
      el.innerHTML = '<div style="font-size:12.5px;color:var(--text-dim);padding:8px 0">No shares yet.</div>';
      return;
    }
    el.innerHTML = shares.map(function(s) {
      const url = location.origin + '/logs/' + s.id;
      const expiresIn = fmtLogExpiry(s.expires_at);
      const views = (s.view_count || 0) + ' view' + (s.view_count === 1 ? '' : 's');
      return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">'
        + '<div style="flex:1;min-width:0;cursor:pointer" onclick="window.open(\'' + url + '\',\'_blank\')">'
        + '<div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)">' + esc(s.label || 'Untitled') + '</div>'
        + '<div style="font-size:11px;color:var(--text-dim);margin-top:3px">' + expiresIn + ' · ' + views + '</div>'
        + '</div>'
        + '<button class="btn btn-ghost btn-xs" title="Copy link" onclick="copyShareUrl(\'' + url + '\',this)" style="flex-shrink:0">' + UI.copy + '</button>'
        + '<button class="btn btn-ghost btn-xs" title="Redact lines" onclick="openRedactView(\'' + s.id + '\',\'' + esc(s.label || 'Untitled').replace(/'/g, "\\'") + '\')" style="flex-shrink:0">' + UI.edit + '</button>'
        + '<button class="btn btn-ghost btn-xs" title="Delete" onclick="deleteLogShare(\'' + s.id + '\',this)" style="flex-shrink:0;color:var(--text-muted)" onmouseover="this.style.color=\'var(--danger)\'" onmouseout="this.style.color=\'var(--text-muted)\'">' + UI.trash + '</button>'
        + '</div>';
    }).join('');
  } catch (e) {
    el.innerHTML = '<div style="font-size:12.5px;color:var(--danger)">' + esc(e.message) + '</div>';
  }
}

function copyShareUrl(url, btn) {
  navigator.clipboard.writeText(url).catch(() => {});
  const prev = btn.innerHTML;
  btn.textContent = '✓';
  setTimeout(() => { btn.innerHTML = prev; }, 1500);
}

function fmtLogExpiry(ts) {
  const diff = ts - Math.floor(Date.now() / 1000);
  if (diff <= 0) return 'Expired';
  const d = Math.floor(diff / 86400), h = Math.floor((diff % 86400) / 3600);
  if (d) return d + 'd ' + h + 'h left';
  return h + 'h left';
}

async function deleteLogShare(shareId, btn) {
  const row = btn.closest('div[style*="border-bottom"]');
  const prev = btn.innerHTML;
  btn.textContent = 'Sure?';
  btn.style.color = 'var(--danger)';
  btn.onclick = null;
  const undo = setTimeout(() => {
    btn.innerHTML = prev;
    btn.style.color = 'var(--text-muted)';
    btn.onclick = function() { deleteLogShare(shareId, btn); };
  }, 2500);
  btn.addEventListener('click', async function confirm() {
    clearTimeout(undo);
    btn.removeEventListener('click', confirm);
    try {
      await API.delete('/servers/' + serverId + '/log-shares/' + shareId);
      if (row) row.remove();
      const successEl = document.getElementById('logShareSuccess');
      const urlEl = document.getElementById('logShareUrl');
      if (successEl && urlEl && urlEl.value.includes(shareId)) successEl.style.display = 'none';
      const remaining = document.querySelectorAll('#logShareList > div[style*="border-bottom"]').length;
      const hdr = document.getElementById('logShareListHeader');
      if (hdr) hdr.textContent = 'SHARES (' + remaining + '/5)';
      if (!remaining) document.getElementById('logShareList').innerHTML = '<div style="font-size:12.5px;color:var(--text-dim);padding:8px 0">No shares yet.</div>';
    } catch (e) { loadLogShares(); }
  }, { once: true });
}

async function openRedactView(sid, label) {
  const modal = document.getElementById('logShareModal');
  if (!modal) return;
  const inner = modal.firstElementChild;
  const origHtml = inner.innerHTML;

  inner.innerHTML = '<div style="padding:40px;text-align:center"><span class="spinner"></span></div>';

  let lines;
  try {
    const res = await fetch('/api/log-shares/' + sid);
    if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).error) || 'Not found');
    const share = await res.json();
    lines = share.content.split('\n');
  } catch(e) {
    inner.innerHTML = origHtml;
    loadLogShares();
    alert('Could not load: ' + e.message);
    return;
  }

  const markedLines = new Set();

  function renderRedact() {
    inner.innerHTML = ''
      + '<div style="padding:14px 18px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border)">'
      +   '<button id="redactBackBtn" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:12px;display:flex;align-items:center;gap:4px" onmouseover="this.style.color=\'var(--text)\'" onmouseout="this.style.color=\'var(--text-muted)\'">← Back</button>'
      +   '<span style="font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(label) + '</span>'
      +   '<button onclick="document.getElementById(\'logShareModal\').remove()" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;line-height:1;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'none\'">&times;</button>'
      + '</div>'
      + '<div style="padding:7px 18px;font-size:11px;background:rgba(249,115,22,.06);border-bottom:1px solid rgba(249,115,22,.15);flex-shrink:0">'
      +   '<span style="color:#fb923c;font-weight:600">Click lines to redact them.</span> <span style="color:var(--text-muted)">They\'ll show as blurred red. Click again to undo.</span>'
      + '</div>'
      + '<div id="redactLines" style="flex:1;overflow-y:auto;padding:6px 0;font-family:\'Cascadia Code\',Consolas,monospace;font-size:11.5px;background:var(--bg2)">'
      + lines.map(function(line, i) {
          const fixed = line.trim() === '[REDACTED]';
          const isMarked = markedLines.has(i);
          const bg = isMarked ? 'rgba(239,68,68,.1)' : '';
          const color = (fixed || isMarked) ? '#f87171' : 'var(--text-muted)';
          const blur = (fixed || isMarked) ? 'blur(4px)' : 'none';
          return '<div data-ridx="' + i + '"' + (fixed ? ' data-fixed="1"' : '') + ' class="' + (isMarked ? 'r-marked' : '') + '" style="display:flex;gap:0;padding:1px 0;cursor:' + (fixed ? 'default' : 'pointer') + ';background:' + bg + '"'
            + (fixed ? '' : ' onmouseover="if(!this.dataset.fixed&&!this.classList.contains(\'r-marked\'))this.style.background=\'rgba(249,115,22,.07)\'" onmouseout="if(!this.classList.contains(\'r-marked\'))this.style.background=\'\'"')
            + '>'
            + '<span style="min-width:38px;color:#3d444d;text-align:right;padding-right:10px;user-select:none;font-size:10.5px;padding-top:1px;flex-shrink:0">' + (i + 1) + '</span>'
            + '<span class="r-content" style="flex:1;white-space:pre-wrap;word-break:break-all;color:' + color + ';filter:' + blur + ';user-select:' + (fixed ? 'none' : 'auto') + '">' + esc(line) + '</span>'
            + '</div>';
        }).join('')
      + '</div>'
      + '<div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0">'
      +   '<button class="btn btn-ghost btn-sm" id="redactCancelBtn">Cancel</button>'
      +   '<button class="btn btn-primary btn-sm" id="redactSaveBtn">Save</button>'
      + '</div>';

    inner.querySelector('#redactLines').addEventListener('click', function(e) {
      const el = e.target.closest('[data-ridx]');
      if (!el || el.dataset.fixed === '1') return;
      const idx = parseInt(el.dataset.ridx);
      const content = el.querySelector('.r-content');
      if (markedLines.has(idx)) {
        markedLines.delete(idx);
        el.classList.remove('r-marked');
        el.style.background = '';
        if (content) { content.style.color = 'var(--text-muted)'; content.style.filter = 'none'; }
      } else {
        markedLines.add(idx);
        el.classList.add('r-marked');
        el.style.background = 'rgba(239,68,68,.1)';
        if (content) { content.style.color = '#f87171'; content.style.filter = 'blur(4px)'; }
      }
    });

    inner.querySelector('#redactBackBtn').addEventListener('click', goBack);
    inner.querySelector('#redactCancelBtn').addEventListener('click', goBack);
    inner.querySelector('#redactSaveBtn').addEventListener('click', doSave);
  }

  function goBack() {
    inner.innerHTML = origHtml;
    loadLogShares();
  }

  async function doSave() {
    if (!markedLines.size && !confirm('No lines marked — save anyway?')) return;
    const btn = inner.querySelector('#redactSaveBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    const newLines = lines.map(function(line, i) {
      return markedLines.has(i) ? '[REDACTED]' : line;
    });
    try {
      const res = await fetch('/api/log-shares/' + sid, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
        body: JSON.stringify({ content: newLines.join('\n') }),
      });
      if (!res.ok) {
        const d = await res.json().catch(function() { return {}; });
        alert(d.error || 'Failed to save');
        if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
        return;
      }
      lines = newLines;
      markedLines.clear();
      renderRedact();
    } catch(e) {
      alert('Failed to save: ' + e.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
    }
  }

  renderRedact();
}

init();
