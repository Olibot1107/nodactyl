<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl - Server</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout" id="app"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script>
requireAuth();

const user = getUser();
const serverId = location.pathname.split('/server/')[1];
let server = null;
let socket = null;
let statsInterval = null;
let logsSubscribed = false;
let logsTailDone = false;

const UI = {
  arrowLeft: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>',
  folder: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path d="M3 6.5A2.5 2.5 0 015.5 4H9l2 2h7.5A2.5 2.5 0 0121 8.5v8A2.5 2.5 0 0118.5 19h-13A2.5 2.5 0 013 16.5v-10z"/></svg>',
  play: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7z"/></svg>',
  rotate: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-2.64-6.36"/><path d="M21 3v6h-6"/></svg>',
  stop: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>',
  zap: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>',
  trash: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5M14 11v5"/></svg>',
  terminal: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 17l6-6-6-6"/><path d="M12 19h8"/></svg>',
  clear: '<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>',
};

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('dashboard')}
    <div class="main">
      <div class="topbar" id="topbar">
        <div class="flex-center gap-2">
          <a class="topbar-link" href="/dashboard">${UI.arrowLeft} Dashboard</a>
          <span style="color:var(--border2);font-size:16px;line-height:1">›</span>
          <span class="page-title">Loading…</span>
        </div>
      </div>
      <div id="serverNavSlot"></div>
      <div class="content" id="content">
        <div class="empty-state"><span class="spinner"></span></div>
      </div>
    </div>`;

  try {
    server = await API.get(`/servers/${serverId}`);
    document.getElementById('serverNavSlot').innerHTML = renderServerNav(serverId, 'console');
    render();
    connectSocket();
    startStats();
    if (server.started_at) startUptimeTicker();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><p>${esc(e.message)}</p></div>`;
  }
}

function topbarHtml() {
  return `
    <div class="flex-center gap-2">
      <a class="topbar-link" href="/dashboard">${UI.arrowLeft} Dashboard</a>
      <span style="color:var(--border2);font-size:16px;line-height:1">›</span>
      <span class="page-title">${esc(server.name)}</span>
    </div>
    <div class="flex-center gap-2">
      ${statusBadge(server.status)}
      ${server.suspended ? '<span class="badge badge-warn">Suspended</span>' : ''}
      ${nodeStatusBadge()}
    </div>`;
}

function render() {
  document.getElementById('topbar').innerHTML = topbarHtml();

  document.getElementById('content').innerHTML = `
    <div class="action-bar">
      <div class="action-bar-left">
        <span class="chip font-mono" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(server.image)}">${esc(server.image)}</span>
        <span class="text-muted" style="font-size:11.5px">on ${esc(server.node_name || 'unknown node')}</span>
      </div>
      <div class="flex-center gap-2">
        <div class="service-controls" id="controls">${controlsHtml()}</div>
        ${(user?.role === 'admin' || server?.owner_id === user?.id) && !(server.suspended && user?.role !== 'admin') ? `<div style="width:1px;height:20px;background:var(--border);flex-shrink:0"></div><button class="btn btn-danger btn-sm" onclick="deleteServer()">${UI.trash} Delete</button>` : ''}
      </div>
    </div>

    ${server.suspended ? `<div class="alert alert-error show" style="margin-bottom:16px">This server has been suspended by an administrator. It cannot be started until unsuspended.</div>` : ''}
    <div class="grid-stats mb-4" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">CPU</div>
        <div class="stat-value" id="statCpu">0.0%</div>
        <div class="stat-sub">${server.cpu_limit} core limit</div>
        <div class="bar-wrap"><div class="bar-fill" id="cpuBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Memory</div>
        <div class="stat-value" id="statMem">0 MB</div>
        <div class="stat-sub">of ${server.memory_limit} MB</div>
        <div class="bar-wrap"><div class="bar-fill" id="memBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Disk</div>
        <div class="stat-value" id="statDisk">—</div>
        <div class="stat-sub">${server.disk_limit > 0 ? `of ${server.disk_limit} MB` : 'unlimited'}</div>
        <div class="bar-wrap"><div class="bar-fill" id="diskBar" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net ↓ Rx</div>
        <div class="stat-value" id="statNetRx">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net ↑ Tx</div>
        <div class="stat-value" id="statNetTx">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Uptime</div>
        <div class="stat-value" id="statUptime">${server.started_at ? '—' : '<span style="color:var(--text-muted)">Offline</span>'}</div>
      </div>
    </div>

    <div class="service-grid">
      <div class="card console-card">
        <div class="card-header">
          <div class="card-title">${UI.terminal} Console</div>
          <div class="console-header-actions">
            <button class="btn btn-ghost btn-sm" onclick="clearConsole()">${UI.clear} Clear</button>
          </div>
        </div>
        <div class="console-wrap" id="consoleOut"></div>
        <div class="console-input-wrap">
          <span class="console-prompt">$</span>
          <input type="text" class="console-input" id="cmdInput" placeholder="${server.status === 'running' ? 'Enter command...' : 'Start the server to send commands'}" ${server.status !== 'running' ? 'disabled' : ''}>
          <button class="btn btn-primary btn-sm" onclick="sendCommand()" ${server.status !== 'running' ? 'disabled' : ''}>Send</button>
        </div>
      </div>

      <aside class="service-side">
        ${server.suspended && user?.role !== 'admin' ? `
        <div class="quick-card" style="opacity:0.45;cursor:not-allowed;pointer-events:none">
          <span class="quick-icon">${UI.folder}</span>
          <span>
            <span class="quick-title">Files</span>
            <span class="quick-sub">Unavailable while suspended.</span>
          </span>
        </div>` : `
        <a href="/server/${serverId}/files" class="quick-card">
          <span class="quick-icon">${UI.folder}</span>
          <span>
            <span class="quick-title">Files</span>
            <span class="quick-sub">Browse and edit the filesystem, even when stopped.</span>
          </span>
        </a>`}

        <div class="card">
          <div class="card-title mb-4">Details</div>
          <div class="detail-list">
            <div class="detail-row">
              <div class="detail-label">Server ID</div>
              <div class="detail-value font-mono" style="font-size:11px;word-break:break-all">${esc(server.id)}</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">Node</div>
              <div class="detail-value">${esc(server.node_name || 'Unknown')} ${nodeStatusBadge()}</div>
            </div>
            ${server.description ? `
            <div class="detail-row">
              <div class="detail-label">Description</div>
              <div class="detail-value">${esc(server.description)}</div>
            </div>` : ''}
            <div class="detail-row">
              <div class="detail-label">Created</div>
              <div class="detail-value">${new Date(server.created_at * 1000).toLocaleString()}</div>
            </div>
          </div>
        </div>

        ${server.port_mappings?.length ? `
        <div class="card">
          <div class="card-title mb-4">Connection Port</div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span style="font-size:28px;font-weight:700;color:var(--primary);letter-spacing:-1px">${esc(String(server.port_mappings[0].hostPort))}</span>
            <div style="font-size:12px;color:var(--text-dim);line-height:1.5">
              ${esc((server.port_mappings[0].protocol || 'tcp').toUpperCase())} · container port ${esc(String(server.port_mappings[0].containerPort))}
              <br><button class="btn btn-ghost btn-xs mt-1" onclick="copyText('${esc(String(server.port_mappings[0].hostPort))}', this)">Copy Port</button>
            </div>
          </div>
        </div>` : ''}
      </aside>
    </div>`;

  document.getElementById('cmdInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); sendCommand(); }
    if (e.key === 'c' && e.ctrlKey) { e.preventDefault(); sendSignal(); }
  });
}

function statusBadge(status) {
  return badgeHtml(status).replace('<span ', '<span data-status-badge ');
}

function nodeStatusBadge() {
  return badgeHtml(server.node_online ? 'online' : 'offline').replace('<span ', '<span data-node-badge ');
}

function updateLiveBits() {
  document.querySelectorAll('[data-status-badge]').forEach(el => { el.outerHTML = statusBadge(server.status); });
  document.querySelectorAll('[data-node-badge]').forEach(el => { el.outerHTML = nodeStatusBadge(); });
  const tb = document.getElementById('topbar');
  if (tb) tb.innerHTML = topbarHtml();

  const controls = document.getElementById('controls');
  if (controls) controls.innerHTML = controlsHtml();

  const input = document.getElementById('cmdInput');
  const sendBtn = input?.parentElement?.querySelector('button');
  if (input) {
    input.disabled = server.status !== 'running';
    input.placeholder = server.status === 'running' ? 'Enter command...' : 'Start the server to send commands';
  }
  if (sendBtn) sendBtn.disabled = server.status !== 'running';

  if (server.status !== 'running') updateStats({ cpu: 0, memory: 0, memoryLimit: server.memory_limit });
}

function controlsHtml() {
  const s = server.status;
  const offline = !server.node_online;
  const busy = s === 'installing' || s === 'stopping' || s === 'starting';
  const running = s === 'running';
  const susp = !!server.suspended;
  return `
    <button class="btn btn-success btn-sm" onclick="doAction('start')" ${running || busy || offline || susp ? 'disabled' : ''}>${UI.play} Start</button>
    <button class="btn btn-warning btn-sm" onclick="doAction('restart')" ${!running || busy || offline ? 'disabled' : ''}>${UI.rotate} Restart</button>
    <button class="btn btn-ghost btn-sm" onclick="doAction('stop')" ${!running || busy || offline ? 'disabled' : ''}>${UI.stop} Stop</button>
    <button class="btn btn-danger btn-sm" onclick="doAction('kill')" ${!running || busy || offline ? 'disabled' : ''}>${UI.zap} Kill</button>`;
}

const MAX_LOG_LINES = 1500;
let _logQueue = [];
let _logRafPending = false;

function appendLog(raw, isErr) {
  // Normalize \r\n → \n; bare \r (progress overwrites) → keep final segment
  const normalized = String(raw).replace(/\r\n/g, '\n');
  const newlines = normalized.split('\n');
  for (let i = 0; i < newlines.length; i++) {
    if (i === newlines.length - 1 && newlines[i] === '') continue;
    const parts = newlines[i].split('\r');
    const line = parts[parts.length - 1];
    _logQueue.push({ line, isErr: !!isErr });
  }
  if (!_logRafPending) {
    _logRafPending = true;
    requestAnimationFrame(_flushLogs);
  }
}

function _flushLogs() {
  _logRafPending = false;
  const el = document.getElementById('consoleOut');
  if (!el || !_logQueue.length) return;

  const nearBottom = el.scrollHeight - el.clientHeight - el.scrollTop < 150;
  const batch = _logQueue.splice(0);

  const frag = document.createDocumentFragment();
  for (const { line, isErr } of batch) {
    const div = document.createElement('div');
    div.className = 'log-line' + (isErr ? ' stderr' : '');
    div.innerHTML = ansiToHtml(line);
    frag.appendChild(div);
  }
  el.appendChild(frag);

  // Prune oldest lines to stay under cap
  while (el.childElementCount > MAX_LOG_LINES) el.removeChild(el.firstChild);

  if (nearBottom) el.scrollTop = el.scrollHeight;
  if (_logQueue.length) { _logRafPending = true; requestAnimationFrame(_flushLogs); }
}

function clearConsole() {
  _logQueue = [];
  const el = document.getElementById('consoleOut');
  if (el) el.innerHTML = '';
}

function connectSocket() {
  socket = io({ auth: { token: getToken() } });

  socket.on('connect', () => {
    logsSubscribed = false;
    if (server.status === 'running') {
      if (logsTailDone) {
        // Already showed startup history — just catch a few lines missed during reconnect
        logsSubscribed = true;
        socket.emit('subscribe-logs', { serverId, tail: 15 });
      } else {
        subscribeToLogs();
      }
    }
  });

  socket.on('log', ({ serverId: sid, line }) => {
    if (sid === serverId) appendLog(line);
  });

  socket.on('server-status', ({ serverId: sid, status }) => {
    if (sid !== serverId) return;
    server.status = status;
    if (status === 'running') { server.started_at = Math.floor(Date.now() / 1000); startUptimeTicker(); }
    else if (status === 'stopped' || status === 'error') { server.started_at = null; stopUptimeTicker(); }
    updateLiveBits();

    if (status === 'running') {
      clearConsole();
      logsTailDone = false;
      logsSubscribed = false;
      // Small delay so the daemon's activeContainers map is always up-to-date
      // before subscribe-logs fires, regardless of panel-DB update timing.
      setTimeout(subscribeToLogs, 800);
    }
    if (status !== 'running' && logsSubscribed) {
      socket.emit('unsubscribe-logs', { serverId });
      logsSubscribed = false;
      logsTailDone = false;
    }
  });

  socket.on('stats', (data) => {
    if (data.serverId !== serverId) return;
    updateStats(data);
  });

  socket.on('node-status', ({ nodeId, status }) => {
    if (nodeId !== server.node_id) return;
    server.node_online = status === 'online';
    updateLiveBits();
  });
}

function subscribeToLogs() {
  if (logsSubscribed || !socket?.connected) return;
  logsSubscribed = true;
  const tail = logsTailDone ? 0 : 100;
  logsTailDone = true;
  socket.emit('subscribe-logs', { serverId, tail });
}

function sendCommand() {
  const inp = document.getElementById('cmdInput');
  const cmd = inp?.value.trim();
  if (!cmd || server.status !== 'running') return;
  appendLog(`$ ${cmd}`);
  socket.emit('send-command', { serverId, command: cmd });
  inp.value = '';
}

async function sendSignal() {
  if (server.status !== 'running') return;
  appendLog('$ ^C');
  // Write \x03 (ETX) to the container's TTY stdin — the terminal discipline converts
  // it to SIGINT for the foreground process group, same as pressing Ctrl+C in a terminal.
  // This interrupts the current command without sending kill signals to the whole container.
  try { await API.post(`/servers/${serverId}/stdin`, { data: '\x03' }); }
  catch (e) { appendLog(`[Error: ${e.message}]`, true); }
}

async function doAction(action) {
  // Console is cleared by the server-status:'running' event handler (covers start, restart, crash-recovery)
  // Optimistic status — disables buttons immediately
  const expectStopped = new Set(['stop', 'kill', 'sigint', 'sigterm']);
  if (expectStopped.has(action)) server.status = 'stopping';
  else if (action === 'restart') server.status = 'stopping';
  else if (action === 'start') server.status = 'starting';
  updateLiveBits();

  try {
    await API.post(`/servers/${serverId}/action`, { action });
    // Panel responds immediately; Socket.IO drives actual status updates
  } catch (e) {
    try { const s = await API.get(`/servers/${serverId}`); server.status = s.status; } catch {}
    updateLiveBits();
    appendLog(`[Error: ${e.message}]`, true);
  }
}

async function deleteServer() {
  if (!confirm(`Delete "${server.name}"? This will stop and remove the container.`)) return;
  try {
    await API.delete(`/servers/${serverId}`);
    window.location.href = '/dashboard';
  } catch (e) {
    alert(e.message);
  }
}

let uptimeInterval = null;

function fmtUptime(secs) {
  if (!secs || secs < 0) return '0s';
  const d = Math.floor(secs / 86400), h = Math.floor((secs % 86400) / 3600),
        m = Math.floor((secs % 3600) / 60), s = secs % 60;
  if (d) return `${d}d ${h}h ${m}m`;
  if (h) return `${h}h ${m}m ${s}s`;
  if (m) return `${m}m ${s}s`;
  return `${s}s`;
}

function startUptimeTicker() {
  stopUptimeTicker();
  if (!server.started_at) return;
  function tick() {
    const el = document.getElementById('statUptime');
    if (!el) return;
    el.textContent = fmtUptime(Math.floor(Date.now() / 1000) - server.started_at);
  }
  tick();
  uptimeInterval = setInterval(tick, 1000);
}

function stopUptimeTicker() {
  if (uptimeInterval) { clearInterval(uptimeInterval); uptimeInterval = null; }
  const el = document.getElementById('statUptime');
  if (el) el.innerHTML = '<span style="font-size:13px;color:var(--text-muted)">Offline</span>';
}

async function startStats() {
  async function tick() {
    if (server.status !== 'running' || !server.node_online) return;
    try {
      const stats = await API.get(`/servers/${serverId}/stats`);
      updateStats(stats);
    } catch {}
  }
  tick();
  statsInterval = setInterval(tick, 5000);
}

function fmtBytes(bytes) {
  if (bytes == null) return '—';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}

function updateStats(stats) {
  const cpuEl = document.getElementById('statCpu');
  const memEl = document.getElementById('statMem');
  const diskEl = document.getElementById('statDisk');
  const cpuBar = document.getElementById('cpuBar');
  const memBar = document.getElementById('memBar');
  const diskBar = document.getElementById('diskBar');
  if (!cpuEl) return;

  const cpu = parseFloat(stats.cpu || 0);
  const mem = parseFloat(stats.memory || 0);
  const memLimit = parseFloat(stats.memoryLimit || server.memory_limit);
  const memPct = memLimit > 0 ? (mem / memLimit) * 100 : 0;

  const diskUsedBytes = stats.diskUsed != null ? stats.diskUsed : null;
  const diskLimitMb = stats.diskLimit || server.disk_limit || 0;
  const diskUsedMb = diskUsedBytes != null ? diskUsedBytes / 1024 / 1024 : null;
  const diskPct = diskLimitMb > 0 && diskUsedMb != null ? (diskUsedMb / diskLimitMb) * 100 : 0;

  cpuEl.textContent = cpu.toFixed(1) + '%';
  memEl.textContent = mem.toFixed(0) + ' MB';
  if (diskEl) diskEl.textContent = diskUsedMb != null ? fmtBytes(diskUsedBytes) : '—';

  if (cpuBar) {
    cpuBar.style.width = Math.min(cpu, 100) + '%';
    cpuBar.className = `bar-fill${cpu > 80 ? ' danger' : cpu > 60 ? ' warn' : ''}`;
  }
  if (memBar) {
    memBar.style.width = Math.min(memPct, 100) + '%';
    memBar.className = `bar-fill${memPct > 80 ? ' danger' : memPct > 60 ? ' warn' : ''}`;
  }
  if (diskBar) {
    diskBar.style.width = Math.min(diskPct, 100) + '%';
    diskBar.className = `bar-fill${diskPct > 80 ? ' danger' : diskPct > 60 ? ' warn' : ''}`;
  }

  const rxEl = document.getElementById('statNetRx');
  const txEl = document.getElementById('statNetTx');
  if (rxEl) rxEl.textContent = stats.network ? fmtBytes(stats.network.rx) : '—';
  if (txEl) txEl.textContent = stats.network ? fmtBytes(stats.network.tx) : '—';
}

window.addEventListener('beforeunload', () => {
  clearInterval(statsInterval);
  if (socket && logsSubscribed) socket.emit('unsubscribe-logs', { serverId });
});

init();
</script>
</body>
</html>
