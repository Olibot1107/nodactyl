<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Connectors</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .connector-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      max-width: 480px;
      transition: border-color .15s;
    }
    .connector-card.connected {
      border-color: rgba(88,101,242,.4);
    }
    .connector-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .connector-icon.discord { background: #5865f2; }
    .connector-body { flex: 1; min-width: 0; }
    .connector-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .connector-status { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .connector-status .linked-name { color: #7289da; font-weight: 600; }
    .connector-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .badge-connected { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: rgba(88,101,242,.15); color: #7289da; border: 1px solid rgba(88,101,242,.3); font-weight: 600; }
    .badge-disconnected { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); font-weight: 600; }
    .alert-banner {
      max-width: 480px;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert-banner.show { display: block; }
    .alert-banner.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: #4ade80; }
    .alert-banner.error   { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
  </style>
</head>
<body>
<div class="layout" id="app"></div>

<script src="/js/api.js"></script>
<script>
requireAuth();

const DISCORD_SVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.015.04.038.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`;

let connectorStatus = null;

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('connectors')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">Connectors</div>
          <div class="page-sub">Link external accounts to your profile</div>
        </div>
      </div>
      <div class="content">
        <div class="alert-banner success" id="bannerSuccess"></div>
        <div class="alert-banner error"   id="bannerError"></div>
        <div id="connectorsList">
          <div class="empty-state"><span class="spinner"></span></div>
        </div>
      </div>
    </div>`;

  // Handle query params from OAuth redirect
  const params = new URLSearchParams(window.location.search);
  if (params.get('linked') === '1') showBanner('success', 'Discord account linked successfully!');
  if (params.get('error')) {
    const msgs = {
      not_configured:      'Discord is not configured. Ask an admin to set it up.',
      invalid_state:       'Session expired. Please try again.',
      already_linked_other:'This Discord account is already linked to a different user.',
      access_denied:       'Discord authorization was denied.',
    };
    showBanner('error', msgs[params.get('error')] || 'Something went wrong: ' + params.get('error'));
  }
  if (params.toString()) history.replaceState({}, '', '/connectors');

  await loadStatus();
}

function showBanner(type, msg) {
  const el = document.getElementById('banner' + (type === 'success' ? 'Success' : 'Error'));
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 6000);
}

async function loadStatus() {
  try {
    connectorStatus = await API.get('/connectors/status');
    renderConnectors();
  } catch (e) {
    document.getElementById('connectorsList').innerHTML = `<div class="empty-state"><p>${esc(e.message)}</p></div>`;
  }
}

function renderConnectors() {
  const { discord } = connectorStatus;
  const cards = [];

  if (discord.enabled) {
    const isConnected = discord.linked;
    cards.push(`
      <div class="connector-card ${isConnected ? 'connected' : ''}">
        <div class="connector-icon discord">${DISCORD_SVG}</div>
        <div class="connector-body">
          <div class="connector-name" style="display:flex;align-items:center;gap:8px">
            Discord
            ${isConnected
              ? `<span class="badge-connected">Connected</span>`
              : `<span class="badge-disconnected">Not connected</span>`}
          </div>
          <div class="connector-status">
            ${isConnected
              ? `Logged in as <span class="linked-name">${esc(discord.username || 'Unknown')}</span>`
              : 'Link your Discord account to enable Discord login'}
          </div>
        </div>
        <div class="connector-actions">
          ${isConnected
            ? `<button class="btn btn-danger btn-sm" onclick="unlinkDiscord()">Unlink</button>`
            : `<button class="btn btn-primary btn-sm" style="background:#5865f2;border-color:#5865f2" onclick="linkDiscord()">Connect</button>`}
        </div>
      </div>
      <div style="max-width:480px;margin-top:12px;font-size:12px;color:var(--text-dim);line-height:1.6">
        ${isConnected
          ? 'You can use <strong style="color:var(--text-muted)">Login with Discord</strong> on the sign-in page to access your account.'
          : 'Once connected, you can use Discord to log in without typing your password.'}
      </div>`);
  }

  if (cards.length === 0) {
    document.getElementById('connectorsList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">—</div>
        <p>No connectors are configured. Ask an admin to set them up in Settings.</p>
      </div>`;
    return;
  }

  document.getElementById('connectorsList').innerHTML = cards.join('<div style="height:16px"></div>');
}

function linkDiscord() {
  window.location.href = '/api/connectors/discord/authorize?action=link';
}

async function unlinkDiscord() {
  if (!confirm('Unlink your Discord account? You will no longer be able to log in with Discord.')) return;
  try {
    await API.delete('/connectors/discord');
    await loadStatus();
    showBanner('success', 'Discord account unlinked.');
  } catch (e) {
    showBanner('error', e.message);
  }
}

init();
</script>
</body>
</html>
