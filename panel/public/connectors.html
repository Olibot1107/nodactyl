<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl — Connectors</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .connector-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      max-width: 480px;
      transition: border-color .15s;
    }
    .connector-card.connected {
      border-color: rgba(88,101,242,.4);
    }
    .connector-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .connector-icon.discord { background: #5865f2; }
    .connector-body { flex: 1; min-width: 0; }
    .connector-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .connector-status { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .connector-status .linked-name { color: #7289da; font-weight: 600; }
    .connector-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .badge-connected { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: rgba(88,101,242,.15); color: #7289da; border: 1px solid rgba(88,101,242,.3); font-weight: 600; }
    .badge-disconnected { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); font-weight: 600; }
    .alert-banner {
      max-width: 480px;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .alert-banner.show { display: block; }
    .alert-banner.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: #4ade80; }
    .alert-banner.error   { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
  </style>
</head>
<body>
<div class="layout" id="app"></div>

<script src="/js/api.js"></script>
<script>
requireAuth();

const DISCORD_SVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.015.04.038.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`;
const GITHUB_SVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>`;

let connectorStatus = null;

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = `
    ${renderSidebar('connectors')}
    <div class="main">
      <div class="topbar">
        <div>
          <div class="page-title">Connectors</div>
          <div class="page-sub">Link external accounts to your profile</div>
        </div>
      </div>
      <div class="content">
        <div class="alert-banner success" id="bannerSuccess"></div>
        <div class="alert-banner error"   id="bannerError"></div>
        <div id="connectorsList">
          <div class="empty-state"><span class="spinner"></span></div>
        </div>
      </div>
    </div>`;

  // Handle query params from OAuth redirect
  const params = new URLSearchParams(window.location.search);
  const linkedProvider = params.get('linked');
  if (linkedProvider) {
    const name = { discord: 'Discord', github: 'GitHub' }[linkedProvider] || linkedProvider;
    showBanner('success', `${name} account linked successfully!`);
  }
  if (params.get('error')) {
    const provider = params.get('provider') || '';
    const providerName = { discord: 'Discord', github: 'GitHub' }[provider] || 'Account';
    const msgs = {
      not_configured:       'This connector is not configured. Ask an admin to set it up.',
      invalid_state:        'Session expired. Please try again.',
      already_linked_other: `This ${providerName} account is already linked to a different user.`,
      access_denied:        'Authorization was denied.',
    };
    showBanner('error', msgs[params.get('error')] || 'Something went wrong: ' + params.get('error'));
  }
  if (params.toString()) history.replaceState({}, '', '/connectors');

  await loadStatus();
}

function showBanner(type, msg) {
  const el = document.getElementById('banner' + (type === 'success' ? 'Success' : 'Error'));
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 6000);
}

async function loadStatus() {
  try {
    connectorStatus = await API.get('/connectors/status');
    renderConnectors();
  } catch (e) {
    document.getElementById('connectorsList').innerHTML = `<div class="empty-state"><p>${esc(e.message)}</p></div>`;
  }
}

function connectorCard({ id, name, svg, colorStyle, isConnected, username, linkFn, unlinkFn, blurb }) {
  return `
    <div class="connector-card ${isConnected ? 'connected' : ''}">
      <div class="connector-icon" style="${colorStyle}">${svg}</div>
      <div class="connector-body">
        <div class="connector-name" style="display:flex;align-items:center;gap:8px">
          ${name}
          ${isConnected
            ? `<span class="badge-connected">Connected</span>`
            : `<span class="badge-disconnected">Not connected</span>`}
        </div>
        <div class="connector-status">
          ${isConnected
            ? `Logged in as <span class="linked-name">${esc(username || 'Unknown')}</span>`
            : blurb}
        </div>
      </div>
      <div class="connector-actions">
        ${isConnected
          ? `<button class="btn btn-danger btn-sm" onclick="${unlinkFn}()">Unlink</button>`
          : `<button class="btn btn-primary btn-sm" style="${colorStyle.replace('background','background')}" onclick="${linkFn}()">Connect</button>`}
      </div>
    </div>
    <div style="max-width:480px;margin-top:12px;font-size:12px;color:var(--text-dim);line-height:1.6">
      ${isConnected
        ? `You can use <strong style="color:var(--text-muted)">Login with ${name}</strong> on the sign-in page to access your account.`
        : 'Once connected, you can use it to log in without typing your password.'}
    </div>`;
}

function renderConnectors() {
  const { discord, github } = connectorStatus;
  const cards = [];

  if (discord.enabled) {
    cards.push(connectorCard({
      name: 'Discord', svg: DISCORD_SVG,
      colorStyle: 'background:#5865f2',
      isConnected: discord.linked, username: discord.username,
      linkFn: 'linkDiscord', unlinkFn: 'unlinkDiscord',
      blurb: 'Link your Discord account to enable Discord login',
    }));
  }

  if (github.enabled) {
    cards.push(connectorCard({
      name: 'GitHub', svg: GITHUB_SVG,
      colorStyle: 'background:#24292f',
      isConnected: github.linked, username: github.username,
      linkFn: 'linkGithub', unlinkFn: 'unlinkGithub',
      blurb: 'Link your GitHub account to enable GitHub login',
    }));
  }

  if (cards.length === 0) {
    document.getElementById('connectorsList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">—</div>
        <p>No connectors are configured. Ask an admin to set them up in Settings.</p>
      </div>`;
    return;
  }

  document.getElementById('connectorsList').innerHTML = cards.join('<div style="height:16px"></div>');
}

async function linkDiscord() {
  await fetch('/api/auth/set-cookie', { method: 'POST', headers: { Authorization: 'Bearer ' + getToken() } }).catch(() => {});
  window.location.href = '/api/connectors/discord/authorize?action=link';
}
async function unlinkDiscord() {
  if (!confirm('Unlink your Discord account? You will no longer be able to log in with Discord.')) return;
  try {
    await API.delete('/connectors/discord');
    await loadStatus();
    showBanner('success', 'Discord account unlinked.');
  } catch (e) { showBanner('error', e.message); }
}

async function linkGithub() {
  await fetch('/api/auth/set-cookie', { method: 'POST', headers: { Authorization: 'Bearer ' + getToken() } }).catch(() => {});
  window.location.href = '/api/connectors/github/authorize?action=link';
}
async function unlinkGithub() {
  if (!confirm('Unlink your GitHub account? You will no longer be able to log in with GitHub.')) return;
  try {
    await API.delete('/connectors/github');
    await loadStatus();
    showBanner('success', 'GitHub account unlinked.');
  } catch (e) { showBanner('error', e.message); }
}

init();
</script>
</body>
</html>
