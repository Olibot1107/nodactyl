<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodactyl - Server Settings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .perm-pill { display: inline-flex; cursor: pointer; user-select: none; }
    .perm-pill input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .perm-pill-btn {
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: background 0.13s, border-color 0.13s, color 0.13s;
    }
    .perm-pill input:checked + .perm-pill-btn {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .perm-pill:hover .perm-pill-btn { border-color: var(--primary); color: var(--primary); }
    .perm-pill input:checked ~ .perm-pill-btn,
    .perm-pill:hover input:checked + .perm-pill-btn { color: #fff; }
  </style>
</head>
<body>
<div class="layout" id="app"></div>

<script src="/js/api.js"></script>
<script>
requireAuth();

const serverId = location.pathname.match(/^\/server\/([^/]+)/)?.[1] || '';
let server = null;

const UI = {
  back: `<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>`,
  save: `<svg class="icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5V3z"/><path d="M8 3v6h8V3"/><path d="M8 21v-7h8v7"/></svg>`,
  info: `<svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" width="13" height="13" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`,
};

async function init() {
  await loadPanelSettings();
  document.getElementById('app').innerHTML = buildShell();

  try {
    server = await API.get(`/servers/${serverId}`);
    renderTopbar();
    document.getElementById('serverNavSlot').innerHTML = renderServerNav(serverId, 'settings');
    if (server.suspended && getUser()?.role !== 'admin') {
      document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon" style="font-size:28px">⚠</div><p>This server is suspended. Settings are unavailable until an admin unsuspends it.</p></div>`;
      return;
    }
    document.getElementById('content').innerHTML = buildContent();
    populateForm();
    attachListeners();
    if (getUser()?.role === 'admin' || server.owner_id === getUser()?.id) loadMembers();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><p>${esc(e.message)}</p></div>`;
  }
}

function buildShell() {
  return `
    ${renderSidebar('dashboard')}
    <div class="main">
      <div class="topbar" id="topbar">
        <div class="flex-center gap-2">
          <a class="topbar-link" href="/dashboard">${UI.back} Dashboard</a>
          <span style="color:var(--border2);font-size:16px;line-height:1">›</span>
          <span class="page-title">Loading…</span>
          <span style="color:var(--border2);font-size:16px;line-height:1">›</span>
          <span class="text-muted" style="font-size:13px">Settings</span>
        </div>
      </div>
      <div id="serverNavSlot"></div>
      <div class="content" id="content">
        <div class="empty-state"><span class="spinner"></span></div>
      </div>
    </div>`;
}

function renderTopbar() {
  document.getElementById('topbar').innerHTML = `
    <div class="flex-center gap-2">
      <a class="topbar-link" href="/dashboard">${UI.back} Dashboard</a>
      <span style="color:var(--border2);font-size:16px;line-height:1">›</span>
      <a class="topbar-link" href="/server/${serverId}">${esc(server.name)}</a>
      <span style="color:var(--border2);font-size:16px;line-height:1">›</span>
      <span class="page-title">Settings</span>
    </div>
    <div class="flex-center gap-2">
      ${badgeHtml(server.status)}
    </div>`;
}

function buildContent() {
  const isAdmin = getUser()?.role === 'admin';
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

      <!-- Left column -->
      <div>
        <div class="card mb-4">
          <div class="card-title mb-4">General</div>
          <div class="form-group mb-3">
            <label class="form-label">Name</label>
            <input class="form-input" id="fieldName" value="${esc(server.name)}" placeholder="Server name">
          </div>
          <div class="form-group mb-3">
            <label class="form-label">Description <span class="text-muted">(optional)</span></label>
            <textarea class="form-input" id="fieldDesc" rows="2" placeholder="What is this server for?">${esc(server.description || '')}</textarea>
          </div>
          <div class="form-group mb-0">
            <label class="form-label">Startup Command <span class="text-muted">(optional)</span></label>
            <input class="form-input font-mono" id="fieldStartup" value="${esc(server.startup_command || '')}" placeholder="e.g. node server.js">
            <div class="form-hint mt-2">${UI.info} Runs as <code style="font-size:11px;background:var(--bg3);padding:1px 4px;border-radius:3px">/bin/sh -c &lt;command&gt;</code> inside the container. Leave blank to use the image default.</div>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-title mb-4">Environment Variables</div>
          <div id="envList"></div>
          <button class="btn btn-ghost btn-sm mt-3" type="button" onclick="addEnvRow()">+ Add Variable</button>
          <div class="form-hint mt-2">Changes take effect after restarting the server.</div>
        </div>

        <div class="card mb-4">
          <div class="card-title mb-2">Secrets</div>
          <div class="form-hint mb-4">${UI.info} Secret values are write-only — they are never shown after saving. Leave the value blank to keep an existing secret unchanged.</div>
          <div id="secretList"></div>
          <button class="btn btn-ghost btn-sm mt-3" type="button" onclick="addSecretRow()">+ Add Secret</button>
          <div class="form-hint mt-2">Secrets are injected as env vars at startup, alongside regular variables.</div>
        </div>

        <div id="settingsAlert" class="alert mb-3" style="display:none"></div>
        <div class="flex-center gap-2 mb-4">
          <button class="btn btn-primary" id="saveBtn" onclick="saveSettings()">${UI.save} Save Changes</button>
          <button class="btn btn-ghost" onclick="location.href='/server/${serverId}'">Cancel</button>
        </div>
      </div>

      <!-- Right column -->
      <div>
        <div class="card mb-4">
          <div class="card-title mb-4">Notifications</div>
          ${buildNotifCard()}
        </div>

        ${(isAdmin || server.owner_id === getUser()?.id) ? `
        <div class="card mb-4" id="membersCard">
          <div class="card-title mb-1">Access &amp; Members</div>
          <div class="text-muted mb-4" style="font-size:12.5px">Share this server with other users and control what they can do.</div>
          <div id="membersList"><div class="text-muted" style="font-size:13px">Loading...</div></div>
          <div class="mt-4" style="border-top:1px solid var(--border);padding-top:16px">
            <div class="form-label mb-2">Add member</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
              <input class="form-input" id="addMemberUser" placeholder="username" style="width:160px">
              <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
                <label class="perm-pill"><input type="checkbox" id="permConsole" checked><span class="perm-pill-btn">Console</span></label>
                <label class="perm-pill"><input type="checkbox" id="permFiles"><span class="perm-pill-btn">Files</span></label>
                <label class="perm-pill"><input type="checkbox" id="permSettings"><span class="perm-pill-btn">Settings</span></label>
                <label class="perm-pill"><input type="checkbox" id="permPower"><span class="perm-pill-btn">Power</span></label>
                <label class="perm-pill"><input type="checkbox" id="permSharelog"><span class="perm-pill-btn">Share Logs</span></label>
              </div>
              <button class="btn btn-primary btn-sm" onclick="addMember()">Add</button>
            </div>
            <div id="memberError" class="alert alert-error mt-2" style="display:none"></div>
          </div>
        </div>
        ` : ''}

        <div class="card" style="border-color:var(--danger-muted,#ef444422)">
          <div class="card-title mb-1" style="color:var(--danger)">Danger Zone</div>
          <div class="text-muted mb-4" style="font-size:12.5px">These actions are irreversible.</div>
          ${isAdmin ? `
          <div class="form-group mb-4">
            <label class="form-label mb-2">Server Details (read-only)</label>
            <div class="detail-list">
              <div class="detail-row">
                <div class="detail-label">Server ID</div>
                <div class="detail-value font-mono" style="font-size:11px;word-break:break-all">${esc(server.id)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Image</div>
                <div class="detail-value font-mono" style="font-size:11px;word-break:break-all">${esc(server.image)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Node</div>
                <div class="detail-value">${esc(server.node_name || 'Unknown')}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Memory</div>
                <div class="detail-value">${esc(String(server.memory_limit))} MB</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">CPU</div>
                <div class="detail-value">${esc(String(server.cpu_limit))} cores</div>
              </div>
            </div>
          </div>` : ''}
          ${(isAdmin || server.owner_id === getUser()?.id) ? `
          <div class="form-group mb-4" style="border-top:1px solid var(--border);padding-top:16px;margin-top:4px">
            <label class="form-label mb-2">Transfer Ownership</label>
            ${server.transfer_to_user_id ? `
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 12px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:8px">
              <span style="font-size:13px;flex:1">Pending — waiting for <b>${esc(server.transfer_to_username || '...')}</b> to accept.</span>
              <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="cancelTransfer()">Cancel</button>
            </div>` : `
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <input class="form-input" id="transferUsername" placeholder="New owner username" style="width:200px">
              <button class="btn btn-warning btn-sm" onclick="transferOwnership()">Transfer</button>
            </div>
            <div class="form-hint mt-2">${UI.info} The new owner will receive a request and must accept before ownership changes.</div>`}
            <div id="transferAlert" class="alert mt-2" style="display:none"></div>
          </div>` : ''}
          <div>
            <button class="btn btn-danger btn-sm" onclick="deleteServer()">Delete Server</button>
          </div>
        </div>
      </div>

    </div>`;
}

function buildNotifCard() {
  const cfg = server.discord_config || {};
  const events = cfg.events?.length ? cfg.events : ['running', 'stopped', 'error'];
  const chk = (e) => events.includes(e) ? 'checked' : '';
  return `
    <div class="form-label mb-3" style="text-transform:uppercase;font-size:11px;letter-spacing:.06em;color:var(--text-muted)">Discord</div>

    <div class="form-group mb-3">
      <label class="form-label">Webhook URL <span class="text-muted">(optional)</span></label>
      <input class="form-input font-mono" id="fieldWebhook" value="${esc(server.discord_webhook || '')}" placeholder="https://discord.com/api/webhooks/...">
      <div class="form-hint mt-2">${UI.info} Leave blank to disable Discord notifications.</div>
    </div>
    <div class="form-row mb-3">
      <div class="form-group mb-0">
        <label class="form-label">Bot Display Name <span class="text-muted">(optional)</span></label>
        <input class="form-input" id="fieldBotName" value="${esc(cfg.username || '')}" placeholder="Nodactyl">
      </div>
      <div class="form-group mb-0">
        <label class="form-label">Ping / Mention <span class="text-muted">(optional)</span></label>
        <input class="form-input font-mono" id="fieldMention" value="${esc(cfg.mention || '')}" placeholder="@everyone">
      </div>
    </div>
    <div class="form-group mb-0">
      <label class="form-label mb-2">Notify on</label>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="evtRunning" ${chk('running')} style="accent-color:var(--primary)"> Server Online</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="evtStopped" ${chk('stopped')} style="accent-color:var(--primary)"> Server Offline</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="evtError" ${chk('error')} style="accent-color:var(--primary)"> Error</label>
      </div>
    </div>`;
}

let envCount = 0;

function addEnvRow(key = '', value = '') {
  const id = ++envCount;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-top:6px';
  div.innerHTML = `
    <input type="text" class="form-input" id="ek_${id}" placeholder="KEY" value="${esc(key)}" style="flex:1;font-family:monospace">
    <span class="text-muted">=</span>
    <input type="text" class="form-input" id="ev_${id}" placeholder="value" value="${esc(value)}" style="flex:2">
    <button onclick="this.parentNode.remove()" class="btn btn-ghost btn-sm" style="flex-shrink:0;padding:5px 8px" type="button">✕</button>`;
  document.getElementById('envList').appendChild(div);
}

function getEnvVars() {
  const envs = [];
  document.querySelectorAll('[id^="ek_"]').forEach(el => {
    const id = el.id.slice(3);
    const key = el.value.trim();
    const value = document.getElementById(`ev_${id}`)?.value ?? '';
    if (key) envs.push({ key, value });
  });
  return envs;
}

let secretCount = 0;

function addSecretRow(key = '', existing = false) {
  const id = ++secretCount;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-top:6px';
  div.dataset.secretId = id;
  div.innerHTML = `
    <input type="text" class="form-input" id="sk_${id}" placeholder="SECRET_KEY" value="${esc(key)}" ${existing ? 'readonly style="flex:1;font-family:monospace;opacity:.7"' : 'style="flex:1;font-family:monospace"'}>
    <span class="text-muted">=</span>
    <input type="password" class="form-input" id="sv_${id}" placeholder="${existing ? 'leave blank to keep' : 'value'}" style="flex:2">
    <button onclick="this.parentNode.remove()" class="btn btn-ghost btn-sm" style="flex-shrink:0;padding:5px 8px" type="button">✕</button>`;
  document.getElementById('secretList').appendChild(div);
}

function getSecretVars() {
  const secrets = [];
  document.querySelectorAll('[data-secret-id]').forEach(div => {
    const id = div.dataset.secretId;
    const key = document.getElementById(`sk_${id}`)?.value.trim();
    const value = document.getElementById(`sv_${id}`)?.value ?? '';
    if (key) secrets.push({ key, value });
  });
  return secrets;
}

function populateForm() {
  (server.env_vars || []).forEach(e => addEnvRow(e.key, e.value));
  (server.secret_vars || []).forEach(e => addSecretRow(e.key, true));
}

function attachListeners() {
  document.getElementById('fieldName')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveSettings(); }
  });
  document.getElementById('fieldStartup')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveSettings(); }
  });
}

const ALL_PERMS = ['console', 'files', 'settings', 'power', 'sharelog'];
const PERM_LABELS = { console: 'Console', files: 'Files', settings: 'Settings', power: 'Power', sharelog: 'Share Logs' };

function memberAvatarHtml(m, size = 32) {
  const radius = size <= 28 ? '6px' : '8px';
  const inner = m.avatar
    ? `<img src="${esc(m.avatar)}" style="width:100%;height:100%;object-fit:cover;border-radius:${radius}" alt="">`
    : `<span style="font-size:${Math.floor(size * 0.44)}px;font-weight:600;line-height:1">${esc(m.username[0].toUpperCase())}</span>`;
  return `<div style="width:${size}px;height:${size}px;background:var(--primary);border-radius:${radius};display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;color:#fff">${inner}</div>`;
}

async function loadMembers() {
  const el = document.getElementById('membersList');
  if (!el) return;
  try {
    const members = await API.get(`/servers/${serverId}/members`);
    if (!members.length) { el.innerHTML = '<div class="text-muted" style="font-size:13px">No members yet.</div>'; return; }
    el.innerHTML = members.map(m => `
      <div class="member-row" data-uid="${m.user_id}" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        ${memberAvatarHtml(m)}
        <div style="min-width:110px">
          <div style="font-size:13px;font-weight:500;line-height:1.2">${esc(m.username)}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${esc(m.email)}</div>
        </div>
        <div style="flex:1;display:flex;gap:4px;flex-wrap:wrap">
          ${ALL_PERMS.map(p => `
            <label class="perm-pill">
              <input type="checkbox" class="mperm-${m.user_id}" data-perm="${p}" ${m.permissions.includes(p) ? 'checked' : ''}>
              <span class="perm-pill-btn">${PERM_LABELS[p]}</span>
            </label>`).join('')}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-primary btn-sm" style="font-size:11px" onclick="saveMemberPerms('${m.user_id}')">Save</button>
          <button class="btn btn-ghost btn-sm" style="font-size:11px;color:var(--danger)" onclick="removeMember('${m.user_id}')">Remove</button>
        </div>
      </div>`).join('');
  } catch (e) { el.innerHTML = `<div class="text-muted" style="font-size:13px">${esc(e.message)}</div>`; }
}

async function saveMemberPerms(userId) {
  const checked = [...document.querySelectorAll(`[data-uid="${userId}"] [data-perm]:checked`)].map(el => el.dataset.perm);
  try {
    await API.patch(`/servers/${serverId}/members/${userId}`, { permissions: checked });
    const row = document.querySelector(`.member-row[data-uid="${userId}"]`);
    if (row) { const btn = row.querySelector('.btn-primary'); if (btn) { btn.textContent = 'Saved ✓'; setTimeout(() => btn.textContent = 'Save', 1500); } }
  } catch (e) { alert(e.message); }
}

async function addMember() {
  const username = document.getElementById('addMemberUser').value.trim();
  const errEl = document.getElementById('memberError');
  errEl.style.display = 'none';
  if (!username) { errEl.textContent = 'Enter a username.'; errEl.style.display = ''; return; }
  const permissions = ALL_PERMS.filter(p => document.getElementById('perm'+p[0].toUpperCase()+p.slice(1))?.checked);
  try {
    await API.post(`/servers/${serverId}/members`, { username, permissions });
    document.getElementById('addMemberUser').value = '';
    loadMembers();
  } catch (e) { errEl.textContent = e.message; errEl.style.display = ''; }
}

async function removeMember(userId) {
  if (!confirm('Remove this member?')) return;
  try { await API.delete(`/servers/${serverId}/members/${userId}`); loadMembers(); }
  catch (e) { alert(e.message); }
}

async function saveSettings() {
  const name = document.getElementById('fieldName').value.trim();
  const description = document.getElementById('fieldDesc').value.trim();
  const startup_command = document.getElementById('fieldStartup').value.trim();
  const discord_webhook = document.getElementById('fieldWebhook').value.trim();
  const alertEl = document.getElementById('settingsAlert');
  const btn = document.getElementById('saveBtn');

  if (!name) {
    showAlert('error', 'Name is required.');
    return;
  }

  if (discord_webhook && !/^https:\/\/discord(app)?\.com\/api\/webhooks\//.test(discord_webhook)) {
    showAlert('error', 'Invalid Discord webhook URL. Must start with https://discord.com/api/webhooks/');
    return;
  }

  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  alertEl.style.display = 'none';

  const discord_config = {
    username: document.getElementById('fieldBotName')?.value.trim() || null,
    mention: document.getElementById('fieldMention')?.value.trim() || null,
    events: [
      document.getElementById('evtRunning')?.checked && 'running',
      document.getElementById('evtStopped')?.checked && 'stopped',
      document.getElementById('evtError')?.checked && 'error',
    ].filter(Boolean),
  };

  const body = { name, description, startup_command, env_vars: getEnvVars(), secret_vars: getSecretVars(), discord_webhook: discord_webhook || null, discord_config };

  try {
    const updated = await API.patch(`/servers/${serverId}/settings`, body);
    server.name = name;
    server.description = description;
    server.startup_command = startup_command;
    server.discord_webhook = discord_webhook || null;
    server.discord_config = discord_config;
    server.secret_vars = updated.secret_vars || [];
    // Re-render secrets list to reflect saved keys (with blank values)
    document.getElementById('secretList').innerHTML = '';
    secretCount = 0;
    server.secret_vars.forEach(e => addSecretRow(e.key, true));
    renderTopbar();
    showAlert('success', 'Settings saved.');
  } catch (e) {
    showAlert('error', e.message);
  } finally {
    btn.innerHTML = `${UI.save} Save Changes`;
    btn.disabled = false;
  }
}

async function deleteServer() {
  if (!confirm(`Delete "${server.name}"?\n\nThis will stop and permanently remove the container and all its data.`)) return;
  try {
    await API.delete(`/servers/${serverId}`);
    window.location.href = '/dashboard';
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

async function transferOwnership() {
  const username = document.getElementById('transferUsername')?.value.trim();
  const alertEl = document.getElementById('transferAlert');
  if (!alertEl) return;
  alertEl.style.display = 'none';
  if (!username) { alertEl.className = 'alert alert-error show'; alertEl.textContent = 'Enter a username.'; alertEl.style.display = ''; return; }
  if (!confirm(`Send a transfer request for "${server.name}" to "${username}"?\n\nOwnership won't change until they accept.`)) return;
  try {
    await API.post(`/servers/${serverId}/transfer`, { username });
    server.transfer_to_user_id = '(pending)';
    server.transfer_to_username = username;
    document.getElementById('content').innerHTML = buildContent();
    populateForm();
    attachListeners();
    if (getUser()?.role === 'admin' || server.owner_id === getUser()?.id) loadMembers();
    const a = document.getElementById('transferAlert');
    if (a) { a.className = 'alert alert-success show'; a.textContent = `Transfer request sent to ${username}.`; a.style.display = ''; }
  } catch (e) {
    alertEl.className = 'alert alert-error show';
    alertEl.textContent = e.message;
    alertEl.style.display = '';
  }
}

async function cancelTransfer() {
  if (!confirm('Cancel the pending transfer request?')) return;
  const alertEl = document.getElementById('transferAlert');
  try {
    await API.delete(`/servers/${serverId}/transfer`);
    server.transfer_to_user_id = null;
    server.transfer_to_username = null;
    document.getElementById('content').innerHTML = buildContent();
    populateForm();
    attachListeners();
    if (getUser()?.role === 'admin' || server.owner_id === getUser()?.id) loadMembers();
  } catch (e) {
    if (alertEl) { alertEl.className = 'alert alert-error show'; alertEl.textContent = e.message; alertEl.style.display = ''; }
  }
}

function showAlert(type, msg) {
  const el = document.getElementById('settingsAlert');
  el.className = `alert alert-${type === 'error' ? 'error' : 'success'} show`;
  el.style.display = '';
  el.textContent = msg;
  if (type === 'success') setTimeout(() => { el.style.display = 'none'; }, 3000);
}

init();
</script>
</body>
