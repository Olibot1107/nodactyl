<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-left {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      justify-content: flex-end;
      gap: 0;
      padding: 36px;
    }

    .auth-left-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 0;
    }

    .auth-deco-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,.04) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
    }

    .auth-deco-glow {
      position: absolute;
      top: -120px;
      left: -80px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(249,115,22,.08) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .auth-brand {
      margin-bottom: auto;
    }

    .auth-terminal {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Cascadia Code','Fira Code',Consolas,monospace;
      font-size: 11.5px;
      line-height: 1.8;
      color: var(--text-dim);
      margin: 28px 0;
      position: relative;
    }

    .auth-terminal-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .term-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .term-dot:nth-child(1) { background: #ef4444; }
    .term-dot:nth-child(2) { background: #f59e0b; }
    .term-dot:nth-child(3) { background: #22c55e; }

    .term-title {
      margin-left: 4px;
      font-size: 10.5px;
      color: var(--text-muted);
    }

    .term-line { display: flex; gap: 8px; }
    .term-prompt { color: #f97316; }
    .term-ok { color: #22c55e; }
    .term-dim { color: var(--text-muted); }

    .auth-statement {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .auth-statement strong {
      color: var(--text-dim);
      font-weight: 600;
    }

    .auth-box h1 {
      font-size: 20px;
      letter-spacing: -.35px;
    }

    .auth-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .strength-track {
      margin-top: 7px;
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .22s ease, background-color .22s ease;
      width: 0;
    }
    .strength-text {
      font-size: 11px;
      margin-top: 4px;
      color: var(--text-muted);
      transition: color .22s ease;
    }
    .username-status {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0;
      margin-left: 2px;
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-deco-grid"></div>
    <div class="auth-deco-glow"></div>
    <div class="auth-left-inner">
      <div class="auth-brand">
        <div class="auth-brand" style="display:flex;align-items:center;gap:11px;margin-bottom:0">
          <div class="logo-icon" id="brandLogo" style="overflow:hidden">N</div>
          <div class="auth-brand-name" id="brandName">Nodactyl</div>
        </div>
      </div>

      <div class="auth-terminal">
        <div class="auth-terminal-bar">
          <span class="term-dot"></span>
          <span class="term-dot"></span>
          <span class="term-dot"></span>
          <span class="term-title">node-1 — bash</span>
        </div>
        <div class="term-line"><span class="term-prompt">$</span><span>nodactyl deploy minecraft</span></div>
        <div class="term-line"><span class="term-ok">✓</span><span>image pulled</span></div>
        <div class="term-line"><span class="term-ok">✓</span><span>container created</span></div>
        <div class="term-line"><span class="term-ok">✓</span><span>server online on :25565</span></div>
        <div class="term-line" style="margin-top:6px"><span class="term-prompt">$</span><span style="opacity:.35">_</span></div>
      </div>

      <div class="auth-statement">
        Deploy and manage game servers<br>
        <strong>in seconds, not hours.</strong>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <h1>Create account</h1>
      <p class="auth-sub" style="margin-bottom:20px">Get started with your own servers.</p>

      <div class="alert alert-error" id="regError"></div>
      <div class="alert alert-success" id="regSuccess"></div>

      <div id="oauthSection" style="display:none">
        <div id="discordRegSection" style="display:none">
          <button onclick="registerWithDiscord()" class="btn btn-ghost w-full" style="justify-content:center;gap:8px;padding:9px;margin-bottom:8px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:#7289da"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.015.04.038.05a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
            Sign up with Discord
          </button>
        </div>
        <div id="githubRegSection" style="display:none">
          <button onclick="registerWithGithub()" class="btn btn-ghost w-full" style="justify-content:center;gap:8px;padding:9px;margin-bottom:8px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
            Sign up with GitHub
          </button>
        </div>
        <div class="auth-divider"></div>
        <p style="font-size:12px;color:var(--text-muted);text-align:center;margin:0 0 16px">or create with email and password</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:5px">
            Username
            <span class="username-status" id="usernameStatus"></span>
          </label>
          <input type="text" class="form-input" id="username" autocomplete="username" placeholder="choose-a-username" minlength="3" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-input" id="email" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" autocomplete="new-password" placeholder="••••••••" minlength="8" required>
          <div id="strengthWrap" style="display:none">
            <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-text" id="strengthText"></div>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:18px">
          <label class="form-label">Confirm password</label>
          <input type="password" class="form-input" id="confirm" autocomplete="new-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:9px" id="regBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  // Handle OAuth redirect-back (Discord/GitHub registration flow lands here via /login?oauth_token,
  // but errors from the register flow redirect back to this page)
  (function() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('oauth_error')) {
      history.replaceState({}, '', '/register');
      const msgs = {
        registration_closed: 'Registration is currently closed.',
        email_taken: 'An account with that email already exists. Try logging in instead.',
        suspended: 'This account has been suspended.',
        not_configured: 'OAuth is not configured on this panel.',
      };
      const err = document.getElementById('regError');
      err.textContent = msgs[params.get('oauth_error')] || 'OAuth sign-up failed. Please try again.';
      err.classList.add('show');
    }
  })();

  fetch('/api/settings/public').then(r => r.json()).then(s => {
    if (s.panel_name) {
      document.getElementById('brandName').textContent = s.panel_name;
      document.title = 'Create Account — ' + s.panel_name;
    }
    if (s.panel_logo) {
      const el = document.getElementById('brandLogo');
      if (s.panel_logo.startsWith('http') || s.panel_logo.startsWith('/') || s.panel_logo.startsWith('data:')) {
        el.innerHTML = `<img src="${s.panel_logo}" style="width:100%;height:100%;object-fit:cover;border-radius:9px" alt="">`;
      } else {
        el.textContent = s.panel_logo;
      }
    }
    let showOauth = false;
    if (s.discord_enabled === '1') { document.getElementById('discordRegSection').style.display = ''; showOauth = true; }
    if (s.github_enabled  === '1') { document.getElementById('githubRegSection').style.display  = ''; showOauth = true; }
    if (showOauth) document.getElementById('oauthSection').style.display = '';
  }).catch(() => {});

  function registerWithDiscord() { window.location.href = '/api/connectors/discord/authorize?action=register'; }
  function registerWithGithub()  { window.location.href = '/api/connectors/github/authorize?action=register'; }

  // ── Password strength ─────────────────────────────────────────────────────
  (function () {
    const LEVELS = [
      { label: 'Too short',  color: '#ef4444', pct: 10 },
      { label: 'Weak',       color: '#ef4444', pct: 25 },
      { label: 'Fair',       color: '#f97316', pct: 50 },
      { label: 'Good',       color: '#eab308', pct: 75 },
      { label: 'Strong',     color: '#22c55e', pct: 100 },
    ];
    function score(pw) {
      if (!pw) return -1;
      if (pw.length < 8) return 0;
      let s = 1;
      if (pw.length >= 12) s++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
      if (/[0-9]/.test(pw)) s++;
      if (/[^A-Za-z0-9]/.test(pw)) s++;
      return Math.min(s, 4);
    }
    const input = document.getElementById('password');
    const wrap  = document.getElementById('strengthWrap');
    const fill  = document.getElementById('strengthFill');
    const text  = document.getElementById('strengthText');
    input.addEventListener('input', () => {
      const s = score(input.value);
      if (s === -1) { wrap.style.display = 'none'; return; }
      wrap.style.display = '';
      const lvl = LEVELS[s];
      fill.style.width = lvl.pct + '%';
      fill.style.backgroundColor = lvl.color;
      text.textContent = lvl.label;
      text.style.color = lvl.color;
    });
  })();

  // ── Username availability ─────────────────────────────────────────────────
  (function () {
    const input  = document.getElementById('username');
    const status = document.getElementById('usernameStatus');
    let timer = null;
    let lastChecked = '';

    input.addEventListener('input', () => {
      clearTimeout(timer);
      const val = input.value.trim();
      if (val === lastChecked) return;
      if (val.length < 3) { status.textContent = ''; return; }
      status.style.color = 'var(--text-muted)';
      status.textContent = 'checking…';
      timer = setTimeout(async () => {
        lastChecked = val;
        try {
          const r = await fetch('/api/auth/check-username?username=' + encodeURIComponent(val));
          if (input.value.trim() !== val) return; // stale
          if (!r.ok) { status.textContent = ''; return; }
          const d = await r.json();
          if (d.available) {
            status.style.color = '#22c55e';
            status.textContent = '✓ available';
          } else {
            status.style.color = '#ef4444';
            status.textContent = '✗ taken';
          }
        } catch { status.textContent = ''; }
      }, 480);
    });
  })();

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('regBtn');
    const errEl = document.getElementById('regError');
    const okEl  = document.getElementById('regSuccess');
    errEl.classList.remove('show');
    okEl.classList.remove('show');

    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.classList.add('show');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span> Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      okEl.textContent = 'Account created! Redirecting to login...';
      okEl.classList.add('show');
      document.getElementById('registerForm').reset();
      setTimeout(() => window.location.href = '/login', 1800);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.add('show');
      btn.innerHTML = 'Create Account';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
